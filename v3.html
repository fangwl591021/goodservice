<script>
  // 初始資料
  var v3Items = [
    { img: 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png', desc: '商品標題建議兩行內，呈現最美觀的比例。', price: '500', btnText: '買', data: 'buy_01' },
    { img: 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png', desc: '緊湊型佈局：Padding 已由 10px 縮減至 5px。', price: '380', btnText: '買', data: 'buy_02' }
  ];

  var v3Socials = [
    { type: 'YT', u: 'https://youtube.com' },
    { type: 'FB', u: 'https://facebook.com' },
    { type: 'LINE', u: 'https://line.me' }
  ];

  var v3LoadedFromProject = false;

  const V3_ICONS = {
    "YT": "https://aiwe.cc/wp-content/uploads/2026/02/87e6f8054bd3672f2885e38bddb112e2.png",
    "FB": "https://aiwe.cc/wp-content/uploads/2026/02/3986d1fd62384c8cdaa0e7c82f2740d1.png",
    "IG": "https://aiwe.cc/wp-content/uploads/2026/02/0089b4a4960e49eba9140544307711c6.png",
    "LINE": "https://aiwe.cc/wp-content/uploads/2026/02/b75a5831fd553c7130aeafbb9783cf79.png",
    "MAP": "https://aiwe.cc/wp-content/uploads/2026/02/5af1a3a285c2bdee4192223e31e1f833.png",
    "TEL": "https://aiwe.cc/wp-content/uploads/2026/02/7254567388850a6b4d77b75208ebd4b8.png"
  };

  const V3_TEXT_SIZES = { "giga": "sm", "mega": "xs", "kilo": "xxs" };
  const V3_SOCIAL_LIMITS = { "giga": 6, "mega": 5, "kilo": 4 };

  function getV3El(id) {
    return document.getElementById(id);
  }

  function safeVal(id, fallback) {
    var el = getV3El(id);
    return el ? el.value : fallback;
  }

  function sanitizeUri(u) {
    let t = (u || "").trim();
    if (!t) return "https://line.me";
    if (!t.match(/^(https?|tel|line):/i)) return "https://" + t;
    return t;
  }

  function detectV3IconTypeByUrl(url) {
    var found = Object.keys(V3_ICONS).find(function(k) {
      return V3_ICONS[k] === url;
    });
    return found || "LINE";
  }

  function parsePriceTextToValue(priceText) {
    if (!priceText) return "";
    return String(priceText)
      .replace(/NT\$\s*/i, "")
      .replace(/[^\d.,-]/g, "")
      .trim();
  }

  function getHeroUrlFromJson(json) {
    if (!json || !json.hero) return "";
    if (json.hero.type === "image") return json.hero.url || "";
    if (json.hero.type === "box" && Array.isArray(json.hero.contents) && json.hero.contents[0]) {
      return json.hero.contents[0].url || "";
    }
    return "";
  }

  function uploadV3Image(input, targetId, idx) {
    if (!input.files[0]) return;
    if (typeof toggleLoader === 'function') toggleLoader(true);

    var reader = new FileReader();
    reader.onload = function(e) {
      google.script.run.withSuccessHandler(function(res) {
        if (typeof toggleLoader === 'function') toggleLoader(false);
        if (res.success) {
          if (idx !== undefined) {
            v3Items[idx].img = res.url;
            renderV3ItemsUI();
          } else {
            var el = document.getElementById(targetId);
            if (el) el.value = res.url;
            generateFlexJson_v3();
          }
        }
      }).uploadImageToDrive(e.target.result, input.files[0].name);
    };
    reader.readAsDataURL(input.files[0]);
  }

  function addV3Item() {
    if (v3Items.length >= 8) return;
    v3Items.push({
      img: 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png',
      desc: '新商品描述...',
      price: '0',
      btnText: '買',
      data: 'buy_new'
    });
    renderV3ItemsUI();
  }

  function removeV3Item(idx) {
    if (v3Items.length <= 1) return;
    v3Items.splice(idx, 1);
    renderV3ItemsUI();
  }

  function addV3Social() {
    var sizeEl = document.getElementById('v3-f-bubble-size');
    var limit = V3_SOCIAL_LIMITS[sizeEl ? sizeEl.value : 'mega'];
    if (v3Socials.length >= limit) return;
    v3Socials.push({ type: 'LINE', u: 'https://line.me' });
    renderV2SocialUI_V3();
  }

  function renderV3ItemsUI() {
    var container = document.getElementById('v3-items-container');
    if (!container) return;

    container.innerHTML = '';

    v3Items.forEach(function(item, idx) {
      var div = document.createElement('div');
      div.className = "p-4 bg-slate-50 border border-slate-200 rounded-xl relative shadow-sm";

      div.innerHTML =
        '<div class="flex justify-between items-center mb-2">' +
          '<span class="text-[9px] font-black text-slate-400">ITEM 0' + (idx + 1) + '</span>' +
          '<button onclick="removeV3Item(' + idx + ')" class="text-red-400 font-bold">×</button>' +
        '</div>' +
        '<div class="grid grid-cols-[80px_1fr] gap-4">' +
          '<div>' +
            '<div class="w-20 h-20 bg-white rounded overflow-hidden mb-2 border shadow-inner">' +
              '<img src="' + item.img + '" class="w-full h-full object-cover">' +
            '</div>' +
            '<button onclick="document.getElementById(\'file-v3-' + idx + '\').click()" class="w-full bg-white border text-[9px] font-bold py-1 rounded">換圖</button>' +
            '<input type="file" id="file-v3-' + idx + '" class="hidden" onchange="uploadV3Image(this, null, ' + idx + ')">' +
          '</div>' +
          '<div class="flex flex-col gap-2">' +
            '<div>' +
              '<label class="text-[9px] font-bold text-slate-500">標題</label>' +
              '<textarea oninput="v3Items[' + idx + '].desc=this.value;generateFlexJson_v3()" class="input-field text-[11px] h-12">' + (item.desc || '') + '</textarea>' +
            '</div>' +
            '<div class="grid grid-cols-3 gap-2">' +
              '<div>' +
                '<label class="text-[9px] font-bold text-slate-500">價格</label>' +
                '<input type="text" value="' + (item.price || '') + '" oninput="v3Items[' + idx + '].price=this.value;generateFlexJson_v3()" class="input-field text-[11px]">' +
              '</div>' +
              '<div>' +
                '<label class="text-[9px] font-bold text-slate-500">按鈕</label>' +
                '<input type="text" value="' + (item.btnText || '') + '" oninput="v3Items[' + idx + '].btnText=this.value;generateFlexJson_v3()" class="input-field text-[11px]">' +
              '</div>' +
              '<div>' +
                '<label class="text-[9px] font-bold text-slate-500">Data</label>' +
                '<input type="text" value="' + (item.data || '') + '" oninput="v3Items[' + idx + '].data=this.value;generateFlexJson_v3()" class="input-field text-[11px] font-mono">' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      container.appendChild(div);
    });

    generateFlexJson_v3();
  }

  function renderV2SocialUI_V3() {
    var container = document.getElementById('v3-social-list');
    if (!container) return;

    container.innerHTML = '';

    v3Socials.forEach(function(s, idx) {
      var div = document.createElement('div');
      div.className = "p-2 bg-white border rounded-lg relative shadow-sm";

      var options = Object.keys(V3_ICONS).map(function(k) {
        return '<option value="' + k + '" ' + (s.type == k ? 'selected' : '') + '>' + k + '</option>';
      }).join('');

      div.innerHTML =
        '<button onclick="v3Socials.splice(' + idx + ',1);renderV2SocialUI_V3()" class="absolute top-1 right-2 text-red-300">×</button>' +
        '<select class="w-full text-[10px] mb-1 font-bold" onchange="v3Socials[' + idx + '].type=this.value;generateFlexJson_v3()">' + options + '</select>' +
        '<input type="text" value="' + (s.u || '') + '" class="input-field text-[9px] p-1" oninput="v3Socials[' + idx + '].u=this.value;generateFlexJson_v3()">';

      container.appendChild(div);
    });

    generateFlexJson_v3();
  }

  function updateV3SizeWarning(currentSize) {
    var warning = getV3El('v3-size-warning');
    if (!warning) return;

    var limit = V3_SOCIAL_LIMITS[currentSize] || 5;
    if (v3Socials.length > limit) {
      warning.style.display = 'block';
      warning.innerText = '⚠️ 當前尺寸僅顯示前 ' + limit + ' 個社群 icon';
    } else {
      warning.style.display = 'none';
    }
  }

  function generateFlexJson_v3() {
    var heroUrl = safeVal('v3-f-hero-url', 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png');
    var btnColor = safeVal('v3-f-btn-color', '#0000FF');
    var btnTxtColor = safeVal('v3-f-btn-txt-color', '#FFFFFF');
    var bubbleSize = safeVal('v3-f-bubble-size', 'mega');
    var fontSize = V3_TEXT_SIZES[bubbleSize] || "xs";
    var socialLimit = V3_SOCIAL_LIMITS[bubbleSize] || 5;

    updateV3SizeWarning(bubbleSize);

    // 1. 模擬器同步
    if (getV3El('v3-mock-hero')) getV3El('v3-mock-hero').src = heroUrl;

    var mockBody = getV3El('v3-mock-body');
    if (mockBody) {
      mockBody.innerHTML = '';
      v3Items.forEach(function(item) {
        var d = document.createElement('div');
        d.style.cssText = "display:flex; padding:5px 10px; border-bottom:1px solid #f1f5f9; align-items:center;";
        d.innerHTML =
          '<img src="' + item.img + '" style="width:40px; height:40px; object-fit:cover; border-radius:4px; margin-right:12px;">' +
          '<div style="flex:1;">' +
            '<div style="font-size:10px; font-weight:bold; color:#1e293b; line-height:1.2; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">' + (item.desc || '') + '</div>' +
            '<div style="font-size:10px; color:#ef4444; font-weight:900; margin-top:2px;">NT$ ' + (item.price || '') + '</div>' +
          '</div>' +
          '<div style="width:32px; height:32px; background:' + btnColor + '; color:' + btnTxtColor + '; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; flex-shrink:0; margin-left:10px;">' + (item.btnText || '') + '</div>';
        mockBody.appendChild(d);
      });
    }

    var mockSoc = getV3El('v3-mock-socials');
    if (mockSoc) {
      mockSoc.innerHTML = '';
      v3Socials.slice(0, socialLimit).forEach(function(s) {
        var img = document.createElement('img');
        img.src = V3_ICONS[s.type];
        img.style.cssText = "width:20px;height:20px;object-fit:contain;";
        mockSoc.appendChild(img);
      });
    }

    // 2. JSON 構建
    var bodyContents = v3Items.map(function(item, idx) {
      var row = {
        "type": "box",
        "layout": "horizontal",
        "paddingAll": "5px",
        "contents": [
          {
            "type": "image",
            "url": item.img,
            "size": "sm",
            "aspectMode": "cover",
            "aspectRatio": "1:1",
            "flex": 1
          },
          {
            "type": "box",
            "layout": "vertical",
            "flex": 4,
            "offsetStart": "8px",
            "contents": [
              {
                "type": "text",
                "text": item.desc,
                "size": fontSize,
                "wrap": true,
                "color": "#111111",
                "weight": "bold"
              },
              {
                "type": "text",
                "text": "NT$ " + item.price,
                "weight": "bold",
                "size": fontSize,
                "color": "#FF0000",
                "margin": "xs"
              }
            ]
          },
          {
            "type": "box",
            "layout": "vertical",
            "width": "36px",
            "height": "36px",
            "backgroundColor": btnColor,
            "cornerRadius": "100px",
            "justifyContent": "center",
            "alignItems": "center",
            "flex": 0,
            "contents": [
              {
                "type": "text",
                "text": item.btnText,
                "color": btnTxtColor,
                "size": "sm",
                "weight": "bold",
                "align": "center"
              }
            ],
            "action": {
              "type": "postback",
              "data": item.data
            }
          }
        ]
      };

      return idx < v3Items.length - 1
        ? [row, { "type": "separator", "color": "#F0F0F0" }]
        : [row];
    }).flat();

    bodyContents.push({
      "type": "box",
      "layout": "vertical",
      "height": "10px",
      "contents": []
    });

    var flex = {
      "type": "bubble",
      "size": bubbleSize,
      "hero": {
        "type": "box",
        "layout": "vertical",
        "paddingAll": "0px",
        "contents": [
          {
            "type": "image",
            "url": heroUrl,
            "size": "full",
            "aspectRatio": "12:5",
            "aspectMode": "cover"
          }
        ]
      },
      "body": {
        "type": "box",
        "layout": "vertical",
        "paddingAll": "0px",
        "contents": bodyContents
      },
      "footer": {
        "type": "box",
        "layout": "horizontal",
        "paddingAll": "10px",
        "contents": v3Socials.slice(0, socialLimit).map(function(s) {
          return {
            "type": "image",
            "url": V3_ICONS[s.type],
            "size": "xs",
            "aspectRatio": "1:1",
            "animated": true,
            "action": {
              "type": "uri",
              "uri": s.u || "https://line.me"
            }
          };
        }),
        "justifyContent": "center",
        "spacing": "lg"
      }
    };

    var out = getV3El('json-output');
    if (out) out.value = JSON.stringify(flex, null, 2);
  }

  function parseV3ItemsFromJson(json) {
    var result = [];
    var bodyContents = (json && json.body && Array.isArray(json.body.contents)) ? json.body.contents : [];

    bodyContents.forEach(function(node) {
      if (!node || node.type !== 'box' || node.layout !== 'horizontal' || !Array.isArray(node.contents)) return;
      if (node.contents.length < 3) return;

      var imgNode = node.contents[0] || {};
      var textBox = node.contents[1] || {};
      var btnBox = node.contents[2] || {};

      var descText = "";
      var priceText = "";
      if (Array.isArray(textBox.contents)) {
        descText = textBox.contents[0] ? (textBox.contents[0].text || "") : "";
        priceText = textBox.contents[1] ? (textBox.contents[1].text || "") : "";
      }

      var btnText = "";
      if (Array.isArray(btnBox.contents) && btnBox.contents[0]) {
        btnText = btnBox.contents[0].text || "";
      }

      var dataValue = "";
      if (btnBox.action) {
        if (btnBox.action.type === 'postback') dataValue = btnBox.action.data || "";
        else if (btnBox.action.type === 'uri') dataValue = btnBox.action.uri || "";
      }

      result.push({
        img: imgNode.url || 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png',
        desc: descText,
        price: parsePriceTextToValue(priceText),
        btnText: btnText,
        data: dataValue
      });
    });

    return result;
  }

  function parseV3SocialsFromJson(json) {
    var result = [];
    var footerContents = (json && json.footer && Array.isArray(json.footer.contents)) ? json.footer.contents : [];

    footerContents.forEach(function(node) {
      if (!node || node.type !== 'image') return;
      result.push({
        type: detectV3IconTypeByUrl(node.url || ""),
        u: (node.action && node.action.uri) ? node.action.uri : "https://line.me"
      });
    });

    return result;
  }

  window.loadFlexMenuV3_Data = function(name, json) {
    v3LoadedFromProject = true;

    if (getV3El('save-filename')) getV3El('save-filename').value = name || "";

    // 基本欄位回填
    var heroUrl = getHeroUrlFromJson(json);
    if (getV3El('v3-f-hero-url')) {
      getV3El('v3-f-hero-url').value = heroUrl || 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png';
    }

    if (getV3El('v3-f-bubble-size')) {
      getV3El('v3-f-bubble-size').value = json && json.size ? json.size : 'mega';
    }

    // 從第一個商品按鈕回填按鈕顏色
    var parsedItems = parseV3ItemsFromJson(json);
    if (parsedItems.length > 0) {
      v3Items = parsedItems;

      var firstRow = (json && json.body && Array.isArray(json.body.contents))
        ? json.body.contents.find(function(node) {
            return node && node.type === 'box' && node.layout === 'horizontal' && Array.isArray(node.contents) && node.contents[2];
          })
        : null;

      if (firstRow && firstRow.contents[2]) {
        var btnBox = firstRow.contents[2];
        var btnTextNode = (btnBox.contents && btnBox.contents[0]) ? btnBox.contents[0] : null;

        if (getV3El('v3-f-btn-color')) {
          getV3El('v3-f-btn-color').value = btnBox.backgroundColor || '#0000FF';
        }
        if (getV3El('v3-f-btn-txt-color')) {
          getV3El('v3-f-btn-txt-color').value = (btnTextNode && btnTextNode.color) ? btnTextNode.color : '#FFFFFF';
        }
      }
    } else {
      v3Items = [{
        img: 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png',
        desc: '商品標題建議兩行內，呈現最美觀的比例。',
        price: '500',
        btnText: '買',
        data: 'buy_01'
      }];
    }

    var parsedSocials = parseV3SocialsFromJson(json);
    v3Socials = parsedSocials.length > 0 ? parsedSocials : [
      { type: 'YT', u: 'https://youtube.com' },
      { type: 'FB', u: 'https://facebook.com' },
      { type: 'LINE', u: 'https://line.me' }
    ];

    renderV3ItemsUI();
    renderV2SocialUI_V3();
    generateFlexJson_v3();
  };

  window.loadFlexTemplate_v3 = function() {
    if (v3LoadedFromProject) return;

    if (getV3El('v3-f-hero-url') && !getV3El('v3-f-hero-url').value) {
      getV3El('v3-f-hero-url').value = 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png';
    }
    if (getV3El('v3-f-btn-color') && !getV3El('v3-f-btn-color').value) {
      getV3El('v3-f-btn-color').value = '#0000FF';
    }
    if (getV3El('v3-f-btn-txt-color') && !getV3El('v3-f-btn-txt-color').value) {
      getV3El('v3-f-btn-txt-color').value = '#FFFFFF';
    }
    if (getV3El('v3-f-bubble-size') && !getV3El('v3-f-bubble-size').value) {
      getV3El('v3-f-bubble-size').value = 'mega';
    }

    v3Items = [
      { img: 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png', desc: '商品標題建議兩行內，呈現最美觀的比例。', price: '500', btnText: '買', data: 'buy_01' },
      { img: 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png', desc: '緊湊型佈局：Padding 已由 10px 縮減至 5px。', price: '380', btnText: '買', data: 'buy_02' }
    ];

    v3Socials = [
      { type: 'YT', u: 'https://youtube.com' },
      { type: 'FB', u: 'https://facebook.com' },
      { type: 'LINE', u: 'https://line.me' }
    ];

    renderV3ItemsUI();
    renderV2SocialUI_V3();
    generateFlexJson_v3();
  };

  setTimeout(function() {
    window.loadFlexTemplate_v3();
  }, 300);
</script>
