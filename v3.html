<script>
  function uploadV3Image(input, targetId, idx) {
    if (!input.files || !input.files[0]) return;

    var file = input.files[0];

    if (typeof toggleLoader === 'function') toggleLoader(true);

    var reader = new FileReader();
    reader.onload = function(e) {
      var base64Data = e.target.result;

      fetchApi('uploadImageToDrive', {
        base64Data: base64Data,
        filename: file.name
      })
      .then(function(res) {
        if (typeof toggleLoader === 'function') toggleLoader(false);

        if (!res || !res.success) {
          alert('圖片上傳失敗：' + (res && res.msg ? res.msg : '未知錯誤'));
          return;
        }

        if (idx !== undefined && idx !== null) {
          v3Items[idx].img = res.url;
          renderV3ItemsUI();
        } else {
          var el = document.getElementById(targetId);
          if (el) el.value = res.url;
          generateFlexJson_v3();
        }
      })
      .catch(function(err) {
        if (typeof toggleLoader === 'function') toggleLoader(false);
        alert('圖片上傳失敗，請檢查網路或 API 連線');
        console.error(err);
      });
    };

    reader.readAsDataURL(file);
  }
</script>
