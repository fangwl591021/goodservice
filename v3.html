<div id="v3-workspace" class="workspace-hidden flex h-full w-full bg-white">
  <div class="flex h-full w-full">
    
    <!-- 1. 模擬器預覽區 -->
    <div style="width:360px; background:#EBEEF2; border-right:1px solid #e5e7eb; padding:20px; display:flex; flex-direction:column; align-items:center; overflow-y:auto; flex-shrink:0;" class="no-scrollbar">
      <div style="font-size:10px; font-weight:900; color:#64748b; margin-bottom:15px; letter-spacing:0.1em; text-transform:uppercase;">Live Preview V3</div>
      
      <div id="v3-mock-bubble" style="width:100%; background:#fff; border-radius:1rem; box-shadow:0 20px 40px -10px rgba(0,0,0,0.2); overflow:hidden; border:4px solid #1e293b; display:flex; flex-direction:column;">
        <!-- Hero 區 -->
        <div style="width:100%; aspect-ratio:12/5; background:#f1f5f9; overflow:hidden;">
          <img id="v3-mock-hero" src="https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <!-- Body 區 -->
        <div id="v3-mock-body" style="padding:0px; background:#fff;"></div>
        <!-- Footer 區 -->
        <div style="padding:8px; border-top:1px solid #f1f5f9; display:flex; justify-content:center; gap:8px; background:#fff;" id="v3-mock-socials"></div>
      </div>
      <div id="v3-size-warning" style="margin-top:12px; font-size:10px; color:#ef4444; font-weight:bold; display:none;">⚠️ 當前尺寸限制按鈕數量</div>
    </div>

    <!-- 2. 編輯表單區 -->
    <div class="flex-1 overflow-y-auto p-10 bg-white no-scrollbar">
      <div style="max-width:650px; margin:0 auto;">
        <h2 style="font-size:24px; font-weight:bold; color:#1e293b; margin-bottom:4px;">商品列表編輯器 (V3)</h2>
        <p style="font-size:11px; color:#94a3b8; font-weight:bold; text-transform:uppercase; margin-bottom:30px; border-bottom:1px solid #F1F5F9; padding-bottom:10px;">Compact Layout Mode v6.3</p>
        
        <div style="display:flex; flex-direction:column; gap:30px;">
          <!-- 1. 基礎與樣式 -->
          <section style="background:#f8fafc; padding:20px; border-radius:12px; border:2px solid #e2e8f0;">
            <h4 style="font-size:12px; font-weight:900; color:#54C061; margin-bottom:15px; text-transform:uppercase;">1. 基礎與按鈕顏色</h4>
            <div style="display:grid; grid-template-columns:2fr 1fr 1fr; gap:15px; margin-bottom:15px;">
              <div>
                <label class="text-[10px] font-bold text-slate-500 block mb-1">主圖網址</label>
                <input type="text" id="v3-f-hero-url" class="input-field" value="https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png" oninput="generateFlexJson_v3()">
              </div>
              <div>
                <label class="text-[10px] font-bold text-slate-500 block mb-1">按鈕底色</label>
                <input type="color" id="v3-f-btn-color" value="#0000FF" style="width:100%; height:38px; cursor:pointer;" oninput="generateFlexJson_v3()">
              </div>
              <div>
                <label class="text-[10px] font-bold text-slate-500 block mb-1">按鈕文字</label>
                <input type="color" id="v3-f-btn-txt-color" value="#FFFFFF" style="width:100%; height:38px; cursor:pointer;" oninput="generateFlexJson_v3()">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="text-[10px] font-bold text-slate-500 block mb-1">顯示尺寸 (Size)</label>
                <select id="v3-f-bubble-size" class="input-field font-bold" onchange="generateFlexJson_v3()">
                  <option value="giga">giga (大)</option>
                  <option value="mega" selected>mega (中)</option>
                  <option value="kilo">kilo (小)</option>
                </select>
              </div>
              <div class="flex items-end">
                <label class="btn-line w-full py-2.5 flex items-center justify-center cursor-pointer text-xs font-bold">
                  上傳主圖
                  <input type="file" style="display:none" onchange="uploadV3Image(this, 'v3-f-hero-url')">
                </label>
              </div>
            </div>
          </section>

          <!-- 2. 商品管理 -->
          <section>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
              <h4 style="font-size:12px; font-weight:900; color:#54C061; text-transform:uppercase;">2. 商品項目管理 (緊湊版)</h4>
              <button onclick="addV3Item()" id="v3-add-btn" class="bg-[#54C061] text-white px-4 py-1.5 rounded-md text-[10px] font-black shadow-sm">＋ 新增商品</button>
            </div>
            <div id="v3-items-container" style="display:flex; flex-direction:column; gap:15px;"></div>
          </section>

          <!-- 3. 社群連結 -->
          <section style="padding-bottom:100px;">
             <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
               <h4 style="font-size:12px; font-weight:900; color:#54C061; text-transform:uppercase;">3. 底部社群 (Size: XS)</h4>
               <button onclick="addV3Social()" id="v3-add-social-btn" class="bg-slate-800 text-white px-3 py-1 rounded text-[10px] font-black">＋ 新增 Icon</button>
             </div>
             <div id="v3-social-list" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
          </section>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 初始資料
  var v3Items = [
    { img: 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png', desc: '商品標題建議兩行內，呈現最美觀的比例。', price: '500', btnText: '買', data: 'buy_01' },
    { img: 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png', desc: '緊湊型佈局：Padding 已由 10px 縮減至 5px。', price: '380', btnText: '買', data: 'buy_02' }
  ];

  var v3Socials = [
    { type: 'YT', u: 'https://youtube.com' },
    { type: 'FB', u: 'https://facebook.com' },
    { type: 'LINE', u: 'https://line.me' }
  ];

  // 避免載入專案後又被 setTimeout 預設模板覆蓋
  var v3SkipNextAutoInit = false;

  const V3_ICONS = { 
    "YT": "https://aiwe.cc/wp-content/uploads/2026/02/87e6f8054bd3672f2885e38bddb112e2.png", 
    "FB": "https://aiwe.cc/wp-content/uploads/2026/02/3986d1fd62384c8cdaa0e7c82f2740d1.png", 
    "IG": "https://aiwe.cc/wp-content/uploads/2026/02/0089b4a4960e49eba9140544307711c6.png", 
    "LINE": "https://aiwe.cc/wp-content/uploads/2026/02/b75a5831fd553c7130aeafbb9783cf79.png", 
    "MAP": "https://aiwe.cc/wp-content/uploads/2026/02/5af1a3a285c2bdee4192223e31e1f833.png", 
    "TEL": "https://aiwe.cc/wp-content/uploads/2026/02/7254567388850a6b4d77b75208ebd4b8.png" 
  };

  const V3_TEXT_SIZES = { "giga": "sm", "mega": "xs", "kilo": "xxs" };
  const V3_SOCIAL_LIMITS = { "giga": 6, "mega": 5, "kilo": 4 };

  function getUploadApi() {
    if (typeof fetchApi === 'function') return fetchApi;
    if (window.parent && typeof window.parent.fetchApi === 'function') return window.parent.fetchApi;
    return null;
  }

  function detectV3IconTypeByUrl(url) {
    var found = Object.keys(V3_ICONS).find(function(k) {
      return V3_ICONS[k] === url;
    });
    return found || 'LINE';
  }

  function sanitizeUri(u) {
    var t = (u || '').trim();
    if (!t) return 'https://line.me';
    if (!/^(https?|tel|line):/i.test(t)) return 'https://' + t;
    return t;
  }

  function parsePriceTextToValue(priceText) {
    if (!priceText) return '';
    return String(priceText)
      .replace(/NT\$\s*/i, '')
      .replace(/[^\d.,-]/g, '')
      .trim();
  }

  function getHeroUrlFromJson(json) {
    if (!json || !json.hero) return '';
    if (json.hero.type === 'box' && Array.isArray(json.hero.contents) && json.hero.contents[0]) {
      return json.hero.contents[0].url || '';
    }
    if (json.hero.url) return json.hero.url || '';
    return '';
  }

  function updateV3SizeWarning(size) {
    var warning = document.getElementById('v3-size-warning');
    if (!warning) return;

    var limit = V3_SOCIAL_LIMITS[size] || 5;
    if (v3Socials.length > limit) {
      warning.style.display = 'block';
      warning.innerText = '⚠️ 當前尺寸僅顯示前 ' + limit + ' 個社群 icon';
    } else {
      warning.style.display = 'none';
    }
  }

  function uploadV3Image(input, targetId, idx) {
    if (!input.files || !input.files[0]) return;

    var file = input.files[0];
    var apiFn = getUploadApi();

    if (!apiFn) {
      alert('找不到 fetchApi，請從主控台進入 V3');
      return;
    }

    if (typeof toggleLoader === 'function') toggleLoader(true);

    var reader = new FileReader();
    reader.onload = function(e) {
      apiFn('uploadImageToDrive', {
        base64Data: e.target.result,
        filename: file.name
      })
      .then(function(res) {
        if (typeof toggleLoader === 'function') toggleLoader(false);

        if (!res || !res.success) {
          alert('圖片上傳失敗：' + ((res && (res.msg || res.error)) || '未知錯誤'));
          return;
        }

        if (typeof idx === 'number') {
          v3Items[idx].img = res.url;
          renderV3ItemsUI();
        } else {
          var el = document.getElementById(targetId);
          if (el) el.value = res.url;
          generateFlexJson_v3();
        }
      })
      .catch(function(err) {
        if (typeof toggleLoader === 'function') toggleLoader(false);
        console.error('uploadV3Image error:', err);
        alert('圖片上傳失敗，請檢查 Worker / GAS / 網路');
      });
    };

    reader.readAsDataURL(file);
  }

  function addV3Item() {
    if (v3Items.length >= 8) return;
    v3Items.push({
      img: 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png',
      desc: '新商品描述...',
      price: '0',
      btnText: '買',
      data: 'buy_new'
    });
    renderV3ItemsUI();
  }

  function removeV3Item(idx) {
    if (v3Items.length <= 1) return;
    v3Items.splice(idx, 1);
    renderV3ItemsUI();
  }

  function addV3Social() {
    var sizeEl = document.getElementById('v3-f-bubble-size');
    var limit = V3_SOCIAL_LIMITS[sizeEl ? sizeEl.value : 'mega'];
    if (v3Socials.length >= limit) return;
    v3Socials.push({ type: 'LINE', u: 'https://line.me' });
    renderV2SocialUI_V3();
  }

  function renderV3ItemsUI() {
    var container = document.getElementById('v3-items-container');
    if (!container) return;

    container.innerHTML = '';

    v3Items.forEach(function(item, idx) {
      var div = document.createElement('div');
      div.className = "p-4 bg-slate-50 border border-slate-200 rounded-xl relative shadow-sm";
      div.innerHTML =
        '<div class="flex justify-between items-center mb-2">' +
          '<span class="text-[9px] font-black text-slate-400">ITEM 0' + (idx + 1) + '</span>' +
          '<button onclick="removeV3Item(' + idx + ')" class="text-red-400 font-bold">×</button>' +
        '</div>' +
        '<div class="grid grid-cols-[80px_1fr] gap-4">' +
          '<div>' +
            '<div class="w-20 h-20 bg-white rounded overflow-hidden mb-2 border shadow-inner">' +
              '<img src="' + item.img + '" class="w-full h-full object-cover">' +
            '</div>' +
            '<button onclick="document.getElementById(\'file-v3-' + idx + '\').click()" class="w-full bg-white border text-[9px] font-bold py-1 rounded">換圖</button>' +
            '<input type="file" id="file-v3-' + idx + '" class="hidden" onchange="uploadV3Image(this, null, ' + idx + ')">' +
          '</div>' +
          '<div class="flex flex-col gap-2">' +
            '<div>' +
              '<label class="text-[9px] font-bold text-slate-500">標題</label>' +
              '<textarea oninput="v3Items[' + idx + '].desc=this.value;generateFlexJson_v3()" class="input-field text-[11px] h-12">' + (item.desc || '') + '</textarea>' +
            '</div>' +
            '<div class="grid grid-cols-3 gap-2">' +
              '<div>' +
                '<label class="text-[9px] font-bold text-slate-500">價格</label>' +
                '<input type="text" value="' + (item.price || '') + '" oninput="v3Items[' + idx + '].price=this.value;generateFlexJson_v3()" class="input-field text-[11px]">' +
              '</div>' +
              '<div>' +
                '<label class="text-[9px] font-bold text-slate-500">按鈕</label>' +
                '<input type="text" value="' + (item.btnText || '') + '" oninput="v3Items[' + idx + '].btnText=this.value;generateFlexJson_v3()" class="input-field text-[11px]">' +
              '</div>' +
              '<div>' +
                '<label class="text-[9px] font-bold text-slate-500">Data</label>' +
                '<input type="text" value="' + (item.data || '') + '" oninput="v3Items[' + idx + '].data=this.value;generateFlexJson_v3()" class="input-field text-[11px] font-mono">' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      container.appendChild(div);
    });

    generateFlexJson_v3();
  }

  function renderV2SocialUI_V3() {
    var container = document.getElementById('v3-social-list');
    if (!container) return;

    container.innerHTML = '';

    v3Socials.forEach(function(s, idx) {
      var div = document.createElement('div');
      div.className = "p-2 bg-white border rounded-lg relative shadow-sm";
      var options = Object.keys(V3_ICONS).map(function(k) {
        return '<option value="' + k + '" ' + (s.type == k ? 'selected' : '') + '>' + k + '</option>';
      }).join('');
      div.innerHTML =
        '<button onclick="v3Socials.splice(' + idx + ',1);renderV2SocialUI_V3()" class="absolute top-1 right-2 text-red-300">×</button>' +
        '<select class="w-full text-[10px] mb-1 font-bold" onchange="v3Socials[' + idx + '].type=this.value;generateFlexJson_v3()">' + options + '</select>' +
        '<input type="text" value="' + (s.u || '') + '" class="input-field text-[9px] p-1" oninput="v3Socials[' + idx + '].u=this.value;generateFlexJson_v3()">';
      container.appendChild(div);
    });

    generateFlexJson_v3();
  }

  function generateFlexJson_v3() {
    const getVal = function(id) {
      var el = document.getElementById(id);
      return el ? el.value : '';
    };

    var heroUrl = getVal('v3-f-hero-url') || 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png';
    var btnColor = getVal('v3-f-btn-color') || '#0000FF';
    var btnTxtColor = getVal('v3-f-btn-txt-color') || '#FFFFFF';
    var bubbleSize = getVal('v3-f-bubble-size') || 'mega';
    var fontSize = V3_TEXT_SIZES[bubbleSize] || 'xs';
    var socialLimit = V3_SOCIAL_LIMITS[bubbleSize] || 5;

    updateV3SizeWarning(bubbleSize);

    // 1. 模擬器同步
    if (document.getElementById('v3-mock-hero')) {
      document.getElementById('v3-mock-hero').src = heroUrl;
    }

    var mockBody = document.getElementById('v3-mock-body');
    if (mockBody) {
      mockBody.innerHTML = '';
      v3Items.forEach(function(item) {
        var d = document.createElement('div');
        d.style.cssText = "display:flex; padding:5px 10px; border-bottom:1px solid #f1f5f9; align-items:center;";
        d.innerHTML =
          '<img src="' + item.img + '" style="width:40px; height:40px; object-fit:cover; border-radius:4px; margin-right:12px;">' +
          '<div style="flex:1;"><div style="font-size:10px; font-weight:bold; color:#1e293b; line-height:1.2; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">' + item.desc + '</div><div style="font-size:10px; color:#ef4444; font-weight:900; margin-top:2px;">NT$ ' + item.price + '</div></div>' +
          '<div style="width:32px; height:32px; background:' + btnColor + '; color:' + btnTxtColor + '; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; flex-shrink:0; margin-left:10px;">' + item.btnText + '</div>';
        mockBody.appendChild(d);
      });
    }

    var mockSoc = document.getElementById('v3-mock-socials');
    if (mockSoc) {
      mockSoc.innerHTML = '';
      v3Socials.slice(0, socialLimit).forEach(function(s) {
        var img = document.createElement('img');
        img.src = V3_ICONS[s.type];
        img.style.cssText = "width:20px;height:20px;object-fit:contain;";
        mockSoc.appendChild(img);
      });
    }

    // 2. JSON 構建
    var bodyContents = v3Items.map(function(item, idx) {
      var row = {
        "type": "box",
        "layout": "horizontal",
        "paddingAll": "5px",
        "contents": [
          { "type": "image", "url": item.img, "size": "sm", "aspectMode": "cover", "aspectRatio": "1:1", "flex": 1 },
          {
            "type": "box",
            "layout": "vertical",
            "flex": 4,
            "offsetStart": "8px",
            "contents": [
              { "type": "text", "text": item.desc, "size": fontSize, "wrap": true, "color": "#111111", "weight": "bold" },
              { "type": "text", "text": "NT$ " + item.price, "weight": "bold", "size": fontSize, "color": "#FF0000", "margin": "xs" }
            ]
          },
          {
            "type": "box",
            "layout": "vertical",
            "width": "36px",
            "height": "36px",
            "backgroundColor": btnColor,
            "cornerRadius": "100px",
            "justifyContent": "center",
            "alignItems": "center",
            "flex": 0,
            "contents": [
              { "type": "text", "text": item.btnText, "color": btnTxtColor, "size": "sm", "weight": "bold", "align": "center" }
            ],
            "action": { "type": "postback", "data": item.data }
          }
        ]
      };
      return idx < v3Items.length - 1 ? [row, { "type": "separator", "color": "#F0F0F0" }] : [row];
    }).flat();

    bodyContents.push({ "type": "box", "layout": "vertical", "height": "10px", "contents": [] });

    var flex = {
      "type": "bubble",
      "size": bubbleSize,
      "hero": {
        "type": "box",
        "layout": "vertical",
        "paddingAll": "0px",
        "contents": [
          { "type": "image", "url": heroUrl, "size": "full", "aspectRatio": "12:5", "aspectMode": "cover" }
        ]
      },
      "body": { "type": "box", "layout": "vertical", "paddingAll": "0px", "contents": bodyContents },
      "footer": {
        "type": "box",
        "layout": "horizontal",
        "paddingAll": "10px",
        "contents": v3Socials.slice(0, socialLimit).map(function(s) {
          return {
            "type": "image",
            "url": V3_ICONS[s.type],
            "size": "xs",
            "aspectRatio": "1:1",
            "animated": true,
            "action": { "type": "uri", "uri": sanitizeUri(s.u) }
          };
        }),
        "justifyContent": "center",
        "spacing": "lg"
      }
    };

    var out = document.getElementById('json-output');
    if (out) out.value = JSON.stringify(flex, null, 2);
  }

  function parseV3ItemsFromJson(j) {
    var result = [];
    var bodyContents = (j && j.body && Array.isArray(j.body.contents)) ? j.body.contents : [];

    bodyContents.forEach(function(node) {
      if (!node || node.type !== 'box' || node.layout !== 'horizontal' || !Array.isArray(node.contents) || node.contents.length < 3) {
        return;
      }

      var imgNode = node.contents[0] || {};
      var textBox = node.contents[1] || {};
      var btnBox = node.contents[2] || {};

      var descText = '';
      var priceText = '';
      if (Array.isArray(textBox.contents)) {
        descText = textBox.contents[0] ? (textBox.contents[0].text || '') : '';
        priceText = textBox.contents[1] ? (textBox.contents[1].text || '') : '';
      }

      var btnText = '';
      if (Array.isArray(btnBox.contents) && btnBox.contents[0]) {
        btnText = btnBox.contents[0].text || '';
      }

      var dataValue = '';
      if (btnBox.action) {
        if (btnBox.action.type === 'postback') dataValue = btnBox.action.data || '';
        else if (btnBox.action.type === 'uri') dataValue = btnBox.action.uri || '';
      }

      result.push({
        img: imgNode.url || 'https://scdn.line-apps.com/n/channel_devcenter/img/fx/01_1_cafe.png',
        desc: descText,
        price: parsePriceTextToValue(priceText),
        btnText: btnText,
        data: dataValue
      });
    });

    return result;
  }

  function parseV3SocialsFromJson(j) {
    var result = [];
    var footerContents = (j && j.footer && Array.isArray(j.footer.contents)) ? j.footer.contents : [];

    footerContents.forEach(function(node) {
      if (!node || node.type !== 'image') return;
      result.push({
        type: detectV3IconTypeByUrl(node.url || ''),
        u: (node.action && node.action.uri) ? node.action.uri : 'https://line.me'
      });
    });

    return result;
  }

  window.loadFlexMenuV3_Data = function(n, j) {
    v3SkipNextAutoInit = true;

    if (document.getElementById('save-filename')) {
      document.getElementById('save-filename').value = n || '';
    }

    // Hero
    var heroUrl = getHeroUrlFromJson(j);
    if (heroUrl && document.getElementById('v3-f-hero-url')) {
      document.getElementById('v3-f-hero-url').value = heroUrl;
    }

    // Size
    if (j && j.size && document.getElementById('v3-f-bubble-size')) {
      document.getElementById('v3-f-bubble-size').value = j.size;
    }

    // Items
    var parsedItems = parseV3ItemsFromJson(j);
    if (parsedItems.length > 0) {
      v3Items = parsedItems;
    }

    // Button colors from first row
    try {
      var firstRow = (j && j.body && Array.isArray(j.body.contents))
        ? j.body.contents.find(function(node) {
            return node && node.type === 'box' && node.layout === 'horizontal' && Array.isArray(node.contents) && node.contents[2];
          })
        : null;

      if (firstRow && firstRow.contents[2]) {
        var btnBox = firstRow.contents[2];
        var btnTextNode = (btnBox.contents && btnBox.contents[0]) ? btnBox.contents[0] : null;

        if (document.getElementById('v3-f-btn-color')) {
          document.getElementById('v3-f-btn-color').value = btnBox.backgroundColor || '#0000FF';
        }
        if (document.getElementById('v3-f-btn-txt-color')) {
          document.getElementById('v3-f-btn-txt-color').value = (btnTextNode && btnTextNode.color) ? btnTextNode.color : '#FFFFFF';
        }
      }
    } catch (e) {
      console.warn('V3 btn color parse failed:', e);
    }

    // Socials
    var parsedSocials = parseV3SocialsFromJson(j);
    if (parsedSocials.length > 0) {
      v3Socials = parsedSocials;
    }

    renderV3ItemsUI();
    renderV2SocialUI_V3();
    generateFlexJson_v3();
  };
