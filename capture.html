<div id="capture-workspace" class="workspace-hidden flex-1 w-full h-full overflow-y-auto bg-gray-50 pb-20">
  <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md overflow-hidden mt-10">
    <div class="p-6 md:p-8">
      <div class="flex items-center space-x-3 mb-6">
        <div class="bg-[#54C061] p-2 rounded-lg shadow-sm">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 tracking-wider">LINE VOOM 貼文抓取工具</h1>
      </div>

      <!-- 輸入表單 -->
      <div class="flex flex-col md:flex-row gap-3">
        <input type="text" id="voomUrl" placeholder="請貼上 LINE VOOM 貼文網址 (例如: https://linevoom.line.me/...)" 
               class="flex-1 w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-[#54C061] font-mono text-sm transition">
        <button id="fetchVoomBtn" onclick="fetchVoomData()" 
                class="w-full md:w-auto px-8 py-3 bg-[#54C061] hover:bg-green-600 text-white font-bold rounded-lg shadow transition flex items-center justify-center gap-2">
          <span>解析貼文</span>
          <!-- 載入動畫 -->
          <svg id="voomLoadingSpinner" class="animate-spin hidden h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </div>
      
      <!-- 錯誤提示區 -->
      <div id="voomErrorMsg" class="hidden mt-4 p-4 bg-rose-50 text-rose-600 font-bold rounded-lg text-sm border border-rose-200 shadow-sm"></div>

      <!-- 結果展示區 -->
      <div id="voomResultContainer" class="hidden mt-8 space-y-6">
        <div class="border-t border-gray-100 pt-6">
          <h2 class="text-lg font-black text-gray-700 mb-4 flex items-center gap-3">
            <span class="bg-blue-100 text-blue-800 text-xs px-3 py-1 rounded-md shadow-sm" id="postTypeBadge">類型</span>
            解析結果
          </h2>
          
          <!-- 影片展示區塊 -->
          <div id="voomVideoSection" class="hidden mb-6 bg-slate-50 rounded-xl p-5 border border-slate-200">
            <h3 class="font-bold text-slate-700 mb-3 flex items-center gap-2"><span class="text-lg">🎥</span> 影片內容</h3>
            <div class="aspect-w-16 aspect-h-9 bg-black rounded-lg overflow-hidden flex justify-center mb-4 shadow-inner">
              <video id="voomVideoPlayer" controls class="max-h-[400px] object-contain w-full" src=""></video>
            </div>
            <div class="text-sm text-gray-600 bg-white p-4 rounded-lg border border-slate-100 shadow-sm space-y-3">
              <div class="flex items-start md:items-center gap-3 flex-col md:flex-row">
                <strong class="whitespace-nowrap text-slate-800">影片網址:</strong> 
                <a id="voomVideoUrlLink" href="#" target="_blank" class="text-sky-500 truncate hover:underline flex-1 w-full md:w-auto font-mono text-xs"></a>
                <button onclick="copyToClipboardVoom(document.getElementById('voomVideoUrlLink').href, this)" class="px-4 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-md text-xs transition-colors shrink-0">複製網址</button>
              </div>
              <div class="flex items-start md:items-center gap-3 flex-col md:flex-row">
                <strong class="whitespace-nowrap text-slate-800">縮圖網址:</strong> 
                <a id="voomVideoThumbLink" href="#" target="_blank" class="text-sky-500 truncate hover:underline flex-1 w-full md:w-auto font-mono text-xs"></a>
                <button id="voomVideoThumbCopyBtn" onclick="copyToClipboardVoom(document.getElementById('voomVideoThumbLink').href, this)" class="px-4 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-md text-xs transition-colors shrink-0">複製網址</button>
              </div>
              <div id="voomVideoDimensions" class="mt-2 pt-2 border-t border-slate-100"></div>
            </div>
          </div>

          <!-- 圖片展示區塊 -->
          <div id="voomImageSection" class="hidden">
            <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2"><span class="text-lg">🖼️</span> 圖片內容 (<span id="voomImageCount" class="text-[#54C061]">0</span> 張)</h3>
            <div id="voomImageGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
              <!-- 動態生成 -->
            </div>
          </div>

        </div>

        <!-- 原始 JSON 資料 -->
        <details class="group bg-slate-50 rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <summary class="cursor-pointer p-4 font-bold text-slate-700 flex justify-between items-center hover:bg-slate-100 transition-colors select-none">
            查看原始 JSON 結構
            <svg class="w-5 h-5 text-slate-400 group-open:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </summary>
          <div class="p-5 border-t border-slate-200 bg-white">
            <pre id="voomJsonOutput" class="text-[11px] text-slate-600 overflow-x-auto whitespace-pre-wrap break-all font-mono"></pre>
          </div>
        </details>
      </div>

    </div>
  </div>
</div>

<script>
  function copyToClipboardVoom(text, btnElement) {
    if (!text || text === '#' || text === '無縮圖') return;
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed"; textArea.style.top = "0"; textArea.style.left = "0"; textArea.style.opacity = "0";
    document.body.appendChild(textArea);
    textArea.focus(); textArea.select();
    try {
      if (document.execCommand('copy')) {
        const originalText = btnElement.innerText;
        btnElement.innerText = '已複製!';
        btnElement.classList.add('bg-[#54C061]', 'text-white');
        btnElement.classList.remove('bg-slate-100', 'text-slate-600', 'hover:bg-slate-200');
        setTimeout(() => {
          btnElement.innerText = originalText;
          btnElement.classList.remove('bg-[#54C061]', 'text-white');
          btnElement.classList.add('bg-slate-100', 'text-slate-600', 'hover:bg-slate-200');
        }, 2000);
      }
    } catch (err) { alert('複製失敗，請手動複製'); }
    document.body.removeChild(textArea);
  }

  function fetchVoomData() {
    const urlInput = document.getElementById('voomUrl').value.trim();
    if (!urlInput) { showVoomError('請輸入網址！'); return; }

    document.getElementById('fetchVoomBtn').disabled = true;
    document.getElementById('voomLoadingSpinner').classList.remove('hidden');
    document.getElementById('voomErrorMsg').classList.add('hidden');
    document.getElementById('voomResultContainer').classList.add('hidden');
    
    document.getElementById('voomVideoSection').classList.add('hidden');
    document.getElementById('voomImageSection').classList.add('hidden');
    document.getElementById('voomImageGrid').innerHTML = '';

    google.script.run
      .withSuccessHandler(onVoomSuccess)
      .withFailureHandler(onVoomFailure)
      .getLineVoomMedia(urlInput);
  }

  function onVoomSuccess(data) {
    document.getElementById('fetchVoomBtn').disabled = false;
    document.getElementById('voomLoadingSpinner').classList.add('hidden');

    if (!data.success) { showVoomError('抓取失敗：' + (data.error || '未知錯誤')); return; }

    document.getElementById('voomResultContainer').classList.remove('hidden');
    document.getElementById('voomJsonOutput').textContent = JSON.stringify(data, null, 2);

    const typeMap = { 'VIDEO': '影片貼文', 'IMAGE': '圖片貼文', 'MIXED': '圖影混合', 'UNKNOWN': '未知類型' };
    document.getElementById('postTypeBadge').textContent = typeMap[data.type] || data.type;

    if (data.video) {
      document.getElementById('voomVideoSection').classList.remove('hidden');
      const videoPlayer = document.getElementById('voomVideoPlayer');
      videoPlayer.src = data.video.videoUrl;
      
      document.getElementById('voomVideoUrlLink').href = data.video.videoUrl;
      document.getElementById('voomVideoUrlLink').textContent = data.video.videoUrl;
      
      if(data.video.thumbnailUrl) {
        document.getElementById('voomVideoThumbLink').href = data.video.thumbnailUrl;
        document.getElementById('voomVideoThumbLink').textContent = data.video.thumbnailUrl;
        document.getElementById('voomVideoThumbCopyBtn').classList.remove('hidden');
      } else {
        document.getElementById('voomVideoThumbLink').textContent = '無縮圖';
        document.getElementById('voomVideoThumbLink').removeAttribute('href');
        document.getElementById('voomVideoThumbCopyBtn').classList.add('hidden');
      }

      const w = data.video.width || '未知';
      const h = data.video.height || '未知';
      const dimElement = document.getElementById('voomVideoDimensions');
      dimElement.innerHTML = `<span class="inline-block bg-slate-200 text-slate-700 rounded px-2 py-1 text-xs font-bold shadow-sm">偵測尺寸: ${w} x ${h}</span>`;

      videoPlayer.onloadedmetadata = function() {
        if (this.videoWidth && this.videoHeight) {
          dimElement.innerHTML = `<span class="inline-block bg-green-100 text-green-800 border border-green-200 rounded px-2 py-1 text-xs font-bold shadow-sm">真實畫質: ${this.videoWidth} x ${this.videoHeight}</span>`;
        }
      };
    }

    if (data.images && data.images.length > 0) {
      document.getElementById('voomImageSection').classList.remove('hidden');
      document.getElementById('voomImageCount').textContent = data.images.length;
      
      const grid = document.getElementById('voomImageGrid');
      data.images.forEach((img, index) => {
        const w = img.width || '未知'; const h = img.height || '未知';
        const card = document.createElement('div');
        card.className = "bg-white border-2 border-slate-100 rounded-xl overflow-hidden shadow-sm flex flex-col hover:shadow-md transition-shadow";
        card.innerHTML = `
          <div class="bg-slate-800 flex-1 flex items-center justify-center p-4 relative min-h-[200px]">
            <img src="${img.url}" class="max-h-60 object-contain rounded drop-shadow-lg" onerror="this.src=''; this.onerror=null; this.alt='圖片無法在外部顯示';">
            <span class="absolute top-3 left-3 bg-black/60 text-white text-[10px] font-bold px-2 py-1 rounded-md backdrop-blur-sm">#${index + 1}</span>
          </div>
          <div class="p-4 bg-white border-t border-slate-100 text-sm text-slate-600 space-y-3">
            <div class="flex justify-between items-center">
              <span class="inline-block bg-slate-100 text-slate-500 font-bold border border-slate-200 rounded px-2 py-1 text-[10px]">尺寸: ${w} x ${h}</span>
              <button onclick="copyToClipboardVoom('${img.url}', this)" class="px-3 py-1.5 bg-slate-100 hover:bg-[#54C061] hover:text-white text-slate-600 font-bold rounded-md text-[10px] transition-colors shadow-sm">複製網址</button>
            </div>
            <p class="truncate text-[11px] font-mono"><a href="${img.url}" target="_blank" class="text-sky-500 hover:underline flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>開啟原圖連結</a></p>
          </div>
        `;
        grid.appendChild(card);
      });
    }
  }

  function onVoomFailure(error) {
    document.getElementById('fetchVoomBtn').disabled = false;
    document.getElementById('voomLoadingSpinner').classList.add('hidden');
    showVoomError('與伺服器連線發生錯誤：' + error.message);
  }

  function showVoomError(msg) {
    const errDiv = document.getElementById('voomErrorMsg');
    errDiv.textContent = msg;
    errDiv.classList.remove('hidden');
    document.getElementById('voomResultContainer').classList.add('hidden');
  }
</script>
