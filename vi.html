                  <span style="font-size:10px; font-weight:900; color:#94a3b8;">Button 03</span>
                  <div style="display:flex; gap:12px;">
                    <div style="display:flex; align-items:center; gap:6px;"><label style="font-size:9px;">底</label><input type="color" id="v1-f-b3-color" value="#111111" style="width:32px; height:20px; border:none; padding:0; cursor:pointer;" oninput="generateFlexJson_v1()"></div>
                    <div style="display:flex; align-items:center; gap:6px;"><label style="font-size:9px;">字</label><input type="color" id="v1-f-b3-txt-color" value="#FFFFFF" style="width:32px; height:20px; border:none; padding:0; cursor:pointer;" oninput="generateFlexJson_v1()"></div>
                  </div>
                </div>
                <div style="display:flex; gap:12px;">
                  <input type="text" id="v1-f-b3-text" class="input-field w-1/3 font-bold" placeholder="文字" oninput="generateFlexJson_v1()">
                  <input type="text" id="v1-f-b3-url" class="input-field flex-1" placeholder="URL" oninput="generateFlexJson_v1()">
                </div>
              </div>
            </div>
          </section>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const V1_ICONS = {
    "TEL": "https://aiwe.cc/wp-content/uploads/2026/02/7254567388850a6b4d77b75208ebd4b8.png",
    "FB": "https://aiwe.cc/wp-content/uploads/2026/02/3986d1fd62384c8cdaa0e7c82f2740d1.png",
    "LINE@": "https://aiwe.cc/wp-content/uploads/2025/12/673ea1e705f2c04b01c2385856676a9a.png",
    "COMMUNITY": "https://aiwe.cc/wp-content/uploads/2026/02/90135b795720ba34d79f122bbc8d7d81.png",
    "IG": "https://aiwe.cc/wp-content/uploads/2026/02/0089b4a4960e49eba9140544307711c6.png",
    "LINE": "https://aiwe.cc/wp-content/uploads/2026/02/b75a5831fd553c7130aeafbb9783cf79.png",
    "YT": "https://aiwe.cc/wp-content/uploads/2026/02/87e6f8054bd3672f2885e38bddb112e2.png",
    "MAP": "https://aiwe.cc/wp-content/uploads/2026/02/5af1a3a285c2bdee4192223e31e1f833.png"
  };

  const V1_SIZE_MAP = { "nano":"40%", "micro":"50%", "deca":"60%", "hecto":"70%", "kilo":"80%", "mega":"90%", "giga":"100%" };

  function setBubbleSize(size) {
    document.getElementById('v1-f-bubble-size').value = size;
    document.querySelectorAll('#v1-size-pills span').forEach(el => {
      const active = el.dataset.size === size;
      el.style.background = active ? '#6366f1' : '#fff';
      el.style.color = active ? '#fff' : '#94a3b8';
      el.style.borderColor = active ? '#6366f1' : '#d1d5db';
      el.textContent = active ? size + ' ✓' : el.dataset.size;
    });
    generateFlexJson_v1();
  }

  function initSizePills() {
    const pills = document.getElementById('v1-size-pills');
    if (!pills) return;
    pills.addEventListener('click', (e) => {
      if (e.target.dataset.size) setBubbleSize(e.target.dataset.size);
    });
  }

  function onIconTypeChange(idx) {
    const type = document.getElementById(`v1-f-s${idx}-type`).value;
    const wrap = document.getElementById(`v1-f-s${idx}-map-wrap`);
    const input = document.getElementById(`v1-f-s${idx}-url`);
    if(type==='MAP') {
      wrap.style.display='block'; input.readOnly=true; input.style.background='#f1f5f9';
      input.value = addrToMapUrl(document.getElementById(`v1-f-s${idx}-map-addr`).value);
    } else {
      wrap.style.display='none'; input.readOnly=false; input.style.background='#fff';
    }
    generateFlexJson_v1();
  }

  function onMapAddrInput(idx) {
    document.getElementById(`v1-f-s${idx}-url`).value = addrToMapUrl(document.getElementById(`v1-f-s${idx}-map-addr`).value);
    generateFlexJson_v1();
  }

  function addrToMapUrl(addr) { return addr ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(addr) : ''; }

  const V1_DEF_DATA = {
    v: "https://obs.line-scdn.net/h9B3GDtq9emxVUmlibAR9FXJqcUNxVSB-WgQhQ3s9MF5IeHN9YC5OU1BhRFVzUVE5SQdJA3hcU11Ca1U4YANWUkNhUBtIRVZ5WRNZV3tbORs/mp4",
    p: "https://upload.cc/i1/2022/07/29/ygc1lF.png", aspect: "1040:748", size: "giga", globalBg: "#FFFFFF",
    title: "請輸入姓名或公司名稱", titleColor: "#111111", titleAlign: "start",
    desc: "✨一行建議16個字\n✨可以簡介公司或是活動內容\n✨四到六排的高度較為適中，不建議太長\n✨多分享、多收穫", descColor: "#666666",
    s: [ {t:"TEL", u:"tel:0912345678"}, {t:"FB", u:"https://www.facebook.com"}, {t:"IG", u:"https://www.instagram.com"}, {t:"YT", u:"https://www.youtube.com"} ],
    b: [ {t:"預約服務", u:"https://line.me", c:"#111111", tc:"#FFFFFF"}, {t:"官方網站", u:"https://line.me", c:"#111111", tc:"#FFFFFF"}, {t:"加入好友", u:"https://line.me", c:"#111111", tc:"#FFFFFF"} ]
  };

  window.loadFlexMenuV1_Data = function(name, json) {
    document.getElementById('save-filename').value = name;
    document.getElementById('v1-f-video-url').value = json.hero?.url || "";
    document.getElementById('v1-f-preview-url').value = json.hero?.previewUrl || "";
    document.getElementById('v1-f-aspect-ratio').value = json.hero?.aspectRatio || "1040:748";
    const bSize = json.size || "giga";
    setBubbleSize(bSize);

    const body = json.body;
    if (body) {
      document.getElementById('v1-f-global-bg').value = body.backgroundColor || "#FFFFFF";
      const contents = body.contents || [];
      const titleComp = contents.find(c => c.type === 'text' && c.weight === 'bold');
      const descComp = contents.find(c => c.type === 'text' && c.weight !== 'bold');
      const iconBox = contents.find(c => c.type === 'box' && c.layout === 'horizontal');

      document.getElementById('v1-f-title').value = titleComp?.text || "";
      document.getElementById('v1-f-title-color').value = titleComp?.color || "#111111";
      document.getElementById('v1-f-title-align').value = titleComp?.align || "start";
      document.getElementById('v1-f-desc').value = descComp?.text || "";
      document.getElementById('v1-f-desc-color').value = descComp?.color || "#666666";

      if (iconBox && iconBox.contents) {
        iconBox.contents.forEach((icon, idx) => {
          if (idx < 4) {
            const type = Object.keys(V1_ICONS).find(k => V1_ICONS[k] === icon.url) || "FB";
            document.getElementById(`v1-f-s${idx+1}-type`).value = type;
            document.getElementById(`v1-f-s${idx+1}-url`).value = icon.action?.uri || "";
            onIconTypeChange(idx+1);
          }
        });
      }
    }
    if (json.footer && json.footer.contents) {
      json.footer.contents.forEach((box, idx) => {
        if (idx < 3) {
          const btnTxt = box.contents?.[0];
          document.getElementById(`v1-f-b${idx+1}-text`).value = btnTxt?.text || "";
          document.getElementById(`v1-f-b${idx+1}-url`).value = box.action?.uri || "";
          document.getElementById(`v1-f-b${idx+1}-color`).value = box.backgroundColor || "#111111";
          document.getElementById(`v1-f-b${idx+1}-txt-color`).value = btnTxt?.color || "#FFFFFF";
        }
      });
    }
    generateFlexJson_v1();
  };

  window.loadFlexTemplate_v1 = function() {
    const d = V1_DEF_DATA;
    if(!document.getElementById('v1-f-video-url').value) {
      document.getElementById('v1-f-video-url').value = d.v;
      document.getElementById('v1-f-preview-url').value = d.p;
      document.getElementById('v1-f-aspect-ratio').value = d.aspect;
      setBubbleSize(d.size);
      document.getElementById('v1-f-global-bg').value = d.globalBg;
      document.getElementById('v1-f-title').value = d.title;
      document.getElementById('v1-f-title-color').value = d.titleColor;
      document.getElementById('v1-f-title-align').value = d.titleAlign;
      document.getElementById('v1-f-desc').value = d.desc;
      document.getElementById('v1-f-desc-color').value = d.descColor;
      for(let i=1; i<=4; i++) {
        document.getElementById(`v1-f-s${i}-type`).value = d.s[i-1].t;
        document.getElementById(`v1-f-s${i}-url`).value = d.s[i-1].u;
        onIconTypeChange(i);
      }
      for(let i=1; i<=3; i++) {
        document.getElementById(`v1-f-b${i}-text`).value = d.b[i-1].t;
        document.getElementById(`v1-f-b${i}-url`).value = d.b[i-1].u;
        document.getElementById(`v1-f-b${i}-color`).value = d.b[i-1].c;
        document.getElementById(`v1-f-b${i}-txt-color`).value = d.b[i-1].tc;
      }
    }
    initSizePills();
    generateFlexJson_v1();
  };

  function generateFlexJson_v1() {
    const vUrl = document.getElementById('v1-f-video-url').value;
    const pUrl = document.getElementById('v1-f-preview-url').value;
    const aspect = document.getElementById('v1-f-aspect-ratio').value || "1040:748";
    const size = document.getElementById('v1-f-bubble-size').value || "giga";
    const globalBg = document.getElementById('v1-f-global-bg').value;
    const titleVal = document.getElementById('v1-f-title').value;
    const titleCol = document.getElementById('v1-f-title-color').value;
    const titleAlign = document.getElementById('v1-f-title-align').value;
    const descVal = document.getElementById('v1-f-desc').value;
    const descCol = document.getElementById('v1-f-desc-color').value;

    document.getElementById('v1-mock-bubble').style.width = V1_SIZE_MAP[size];
    document.getElementById('v1-mock-hero').style.aspectRatio = aspect.replace(':', '/');
    const vp = document.getElementById('v1-mock-video-player');
    const pi = document.getElementById('v1-mock-preview-img');
    const em = document.getElementById('v1-mock-empty');
    const playIcon = document.getElementById('v1-play-icon');
    vp.style.display = 'none'; pi.style.display = 'none'; em.style.display = 'none'; playIcon.style.display = 'none';
    if(vUrl && vUrl.trim()!=='') { 
        vp.src = vUrl; vp.style.display = 'block'; vp.play().catch(e=>{}); 
        playIcon.style.display = 'block';
    } 
    else if(pUrl && pUrl.trim()!=='') { pi.src = pUrl; pi.style.display = 'block'; } else { em.style.display = 'block'; }

    document.getElementById('v1-mock-title').innerText = titleVal;
    document.getElementById('v1-mock-title').style.color = titleCol;
    document.getElementById('v1-mock-title').style.textAlign = titleAlign === 'start' ? 'left' : (titleAlign === 'end' ? 'right' : 'center');
    document.getElementById('v1-mock-desc').innerText = descVal;
    document.getElementById('v1-mock-desc').style.color = descCol;
    document.getElementById('v1-mock-body-container').style.backgroundColor = globalBg;
    document.getElementById('v1-mock-footer-container').style.backgroundColor = globalBg;

    const sD = [];
    for(let i=1; i<=4; i++) {
      const type = document.getElementById(`v1-f-s${i}-type`).value;
      const url = document.getElementById(`v1-f-s${i}-url`).value;
      sD.push({ iconUrl: V1_ICONS[type], url, type });
      document.getElementById(`v1-mock-icon-${i}`).src = V1_ICONS[type];
      document.getElementById(`v1-mock-icon-${i}`).style.opacity = '1';
    }

    const bD = [];
    for(let i=1; i<=3; i++) {
      const t = document.getElementById(`v1-f-b${i}-text`).value;
      const u = document.getElementById(`v1-f-b${i}-url`).value;
      const c = document.getElementById(`v1-f-b${i}-color`).value;
      const tc = document.getElementById(`v1-f-b${i}-txt-color`).value;
      bD.push({ t, u, c, tc });
      const mBtn = document.getElementById(`v1-mock-btn-${i}`);
      mBtn.innerText = t || "-"; mBtn.style.backgroundColor = c; mBtn.style.color = tc;
    }

    const flex = {
      "type": "bubble", "size": size,
      "hero": { "type": "video", "url": vUrl, "previewUrl": pUrl, "altContent": { "type": "image", "size": "full", "aspectRatio": aspect, "aspectMode": "cover", "url": pUrl }, "aspectRatio": aspect },
      "body": { 
        "type": "box", "layout": "vertical", "backgroundColor": globalBg, "paddingAll": "sm",
        "contents": [
          { "type": "text", "text": titleVal, "weight": "bold", "size": "md", "wrap": true, "color": titleCol, "align": titleAlign },
          { "type": "text", "text": descVal, "size": "xs", "wrap": true, "color": descCol, "margin": "md" },
          { "type": "box", "layout": "horizontal", "spacing": "sm", "margin": "lg", "contents": sD.map(s => ({ 
              "type": "image", 
              "url": s.iconUrl, 
              "size": "full", 
              "aspectRatio": "1:1", 
              "aspectMode": "cover", 
              "animated": true, // 修正：所有社群按鈕都設定為 true
              "action": { "type": "uri", "label": "icon", "uri": s.url || "https://line.me" } 
          })) }
        ]
      },
      "footer": { 
        "type": "box", "layout": "vertical", "spacing": "sm", "paddingAll": "sm", "backgroundColor": globalBg,
        "contents": bD.map(b => ({
          "type": "box", "layout": "vertical", "contents": [{ "type": "text", "text": b.t || " ", "color": b.tc, "align": "center", "size": "sm", "weight": "bold" }],
          "paddingAll": "md", "cornerRadius": "md", "backgroundColor": b.c, "action": { "type": "uri", "label": "action", "uri": b.u || "https://line.me" }
        }))
      }
    };
    
    const globalOutput = document.getElementById('json-output');
    if (globalOutput) globalOutput.value = JSON.stringify(flex, null, 2);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadFlexTemplate_v1);
  } else {
    loadFlexTemplate_v1();
  }
</script>
