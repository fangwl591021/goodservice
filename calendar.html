<div class="calendar-admin-wrap h-full flex flex-col">
  <div class="flex gap-4 items-center mb-6">
    <div class="flex-1">
      <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">GOOGLE 日曆 ID</label>
      <input id="calInputId" type="text" class="input-field" placeholder="例如：primary 或 您的 Email" />
    </div>
    <div class="flex gap-2 self-end">
      <button class="btn-line px-8 py-2.5 text-sm" onclick="useCalendar()">讀取</button>
      <button class="px-6 py-2.5 border-2 border-gray-200 rounded-lg font-bold text-gray-500 hover:bg-gray-50 text-sm transition-all" onclick="copyCalShareLink()">複製分享連結</button>
    </div>
  </div>

  <div id="calErrorMsg" class="hidden mb-4 p-4 bg-red-50 text-red-600 text-xs rounded-xl border-2 border-red-100 font-bold"></div>

  <div class="flex-1 flex gap-6 overflow-hidden">
    <div class="flex-[1.5] bg-white rounded-2xl shadow-sm border border-gray-100 p-6 overflow-y-auto no-scrollbar">
      <div class="flex justify-between items-center mb-8">
        <button class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-full transition-colors font-bold" onclick="prevCalMonth()">‹</button>
        <div class="text-2xl font-black text-slate-800 tracking-tighter" id="calHeaderTitle">載入中...</div>
        <button class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-full transition-colors font-bold" onclick="nextCalMonth()">›</button>
      </div>
      
      <div class="grid grid-cols-7 gap-3 mb-3">
        <div class="text-center text-[10px] font-black text-slate-300 uppercase">一</div>
        <div class="text-center text-[10px] font-black text-slate-300 uppercase">二</div>
        <div class="text-center text-[10px] font-black text-slate-300 uppercase">三</div>
        <div class="text-center text-[10px] font-black text-slate-300 uppercase">四</div>
        <div class="text-center text-[10px] font-black text-slate-300 uppercase">五</div>
        <div class="text-center text-[10px] font-black text-slate-300 uppercase text-blue-400">六</div>
        <div class="text-center text-[10px] font-black text-rose-400 uppercase">日</div>
      </div>
      <div id="calGrid" class="grid grid-cols-7 gap-3"></div>
    </div>

    <div class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col">
      <h3 class="text-lg font-black text-slate-800 mb-6 flex items-center" id="calSideTitle">
        <div class="w-2 h-6 bg-green-500 rounded-full mr-3"></div>
        請選擇日期
      </h3>
      <div id="calSideEvents" class="flex-1 overflow-y-auto space-y-4 pr-2 no-scrollbar"></div>
    </div>
  </div>
</div>

<script>
  // 強制給予初始值，防止 undefined
  const calState = { 
    year: new Date().getFullYear(), 
    month: new Date().getMonth() + 1, 
    eventsByDate: {} 
  };

  window.initCalendarUI = function() {
    // 獲取後端注入或本地緩存的 ID
    const input = document.getElementById('calInputId');
    if (!input.value) {
      input.value = localStorage.getItem('lastCalId') || 'primary';
    }
    fetchCalendarData();
  };

  function useCalendar() {
    const cid = document.getElementById('calInputId').value;
    localStorage.setItem('lastCalId', cid);
    fetchCalendarData();
  }

  function fetchCalendarData() {
    const cid = document.getElementById('calInputId').value || 'primary';
    const errBox = document.getElementById('calErrorMsg');
    errBox.classList.add('hidden');
    toggleLoader(true);
    
    google.script.run
      .withSuccessHandler(data => {
        toggleLoader(false);
        if (!data || data.errors?.length > 0) {
          errBox.innerText = data?.errors?.[0]?.msg || "讀取日曆失敗，請確認 ID 與權限。";
          errBox.classList.remove('hidden');
        }
        
        calState.eventsByDate = data.eventsByDate || {};
        calState.year = data.year;
        calState.month = data.month;
        
        document.getElementById('calHeaderTitle').innerText = `${data.year} 年 ${String(data.month).padStart(2,'0')} 月`;
        renderCalendarGrid(data.grid);
      })
      .withFailureHandler(err => {
        toggleLoader(false);
        errBox.innerText = "系統連線錯誤: " + err;
        errBox.classList.remove('hidden');
      })
      .fetchMonthEvents(calState.year, calState.month, cid);
  }

  function renderCalendarGrid(cells) {
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const todayYmd = new Date().toISOString().split('T')[0];
    
    cells.forEach(cell => {
      const div = document.createElement('div');
      div.className = `aspect-square border-2 rounded-2xl p-1 relative flex flex-col items-center justify-center cursor-pointer transition-all ${cell.inMonth ? 'bg-white border-slate-50 hover:border-green-400' : 'bg-slate-50/50 text-slate-200 border-transparent'}`;
      
      if (cell.inMonth) {
        div.innerHTML = `<span class="text-sm font-black">${cell.day}</span>`;
        if (cell.count > 0) {
          div.innerHTML += `<div class="absolute bottom-2 w-1.5 h-1.5 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>`;
        }
        div.onclick = () => {
          document.querySelectorAll('#calGrid > div').forEach(d => d.classList.remove('bg-green-50', 'border-green-200'));
          div.classList.add('bg-green-50', 'border-green-200');
          showCalDay(cell.ymd);
        };
      }
      grid.appendChild(div);
    });
  }

  function showCalDay(ymd) {
    const list = calState.eventsByDate[ymd] || [];
    document.getElementById('calSideTitle').innerHTML = `<div class="w-2 h-6 bg-green-500 rounded-full mr-3"></div>${ymd} 活動 (${list.length})`;
    const container = document.getElementById('calSideEvents');
    container.innerHTML = list.length ? '' : '<div class="text-center text-slate-300 italic mt-10">尚無行程</div>';
    
    list.forEach(ev => {
      const item = document.createElement('div');
      item.className = "p-4 bg-slate-50 rounded-2xl border border-slate-100";
      const timeStr = ev.allDay ? '全天活動' : (ev.start.includes('T') ? ev.start.split('T')[1].substring(0,5) : '時間未定');
      item.innerHTML = `<div class="font-black text-slate-800 text-sm mb-1">${ev.summary}</div><div class="text-[10px] text-green-600 font-bold">${timeStr}</div>`;
      container.appendChild(item);
    });
  }

  function prevCalMonth() { calState.month--; if(calState.month < 1){ calState.month=12; calState.year--; } fetchCalendarData(); }
  function nextCalMonth() { calState.month++; if(calState.month > 12){ calState.month=1; calState.year++; } fetchCalendarData(); }
  function copyCalShareLink() {
    const cid = document.getElementById('calInputId').value || 'primary';
    google.script.run.withSuccessHandler(url => {
      const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
      showToast("分享連結已複製");
    }).makeShareUrlLite(cid);
  }
</script>
