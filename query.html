<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>活動查詢</title>

  <!-- 引入 FullCalendar 6 -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* 全域背景與字型 */
    body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; background: #fff; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    
    /* --- 標籤與指示器邏輯 --- */
    /* 1. 物理移除所有點點與事件橫條，確保乾淨 */
    .event-dot, .event-count, .fc-daygrid-event, .fc-event, .fc-daygrid-event-harness { 
      display: none !important; 
    }

    /* 2. 有活動的日期：整格淺綠背景 */
    .has-event { 
      background-color: #f0fdf4 !important; 
    }
    .has-event .fc-daygrid-day-number {
      color: #16a34a !important; 
      font-weight: 900 !important;
    }

    /* 3. 選中日期的樣式：仿 28 號的綠色實線框 */
    .fc-daygrid-day.selected-day { 
      background-color: #dcfce7 !important; 
      box-shadow: inset 0 0 0 2.5px #22c55e !important; 
      z-index: 10;
    }

    /* 4. 縮小日曆高度與間距，確保全月在手機一屏內 */
    .calendar-container {
      height: 52vh;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
      overflow: hidden;
    }
    
    .fc .fc-toolbar { margin-bottom: 0.3em !important; padding: 4px !important; }
    .fc-toolbar-title { font-weight: 900 !important; color: #1e293b; font-size: 1rem !important; }
    .fc-button { padding: 2px 6px !important; font-size: 0.8rem !important; }
    
    /* 格子內字體與內距縮小 */
    .fc-daygrid-day-number { padding: 2px 4px !important; font-size: 0.8rem !important; }
    .fc-col-header-cell-cushion { font-size: 0.75rem !important; padding: 2px 0 !important; }
    .fc-daygrid-day-frame { min-height: 38px !important; }

    /* 列表區域樣式 */
    #eventList {
      flex: 1;
      overflow-y: auto;
      background-color: #f8fafc;
      padding: 12px;
    }
  </style>
</head>
<body class="flex flex-col">

  <!-- 日曆容器 -->
  <div class="calendar-container">
    <div id="calendar" class="h-full"></div>
  </div>

  <!-- 下方活動清單 -->
  <div id="eventList">
    <div class="flex flex-col items-center justify-center h-full text-slate-400" id="listPlaceholder">
      <p class="text-[10px] font-black tracking-widest uppercase">請點擊綠色日期查看活動</p>
    </div>
  </div>

  <script>
    const initCid = "<?= typeof initCid !== 'undefined' ? initCid : '' ?>";
    let calendar;
    let monthData = {};
    let eventCountMap = {};

    document.addEventListener('DOMContentLoaded', function() {
      const calEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calEl, {
        initialView: 'dayGridMonth',
        locale: 'zh-tw',
        height: '100%',
        aspectRatio: 1.6, // 格子扁平化
        firstDay: 1,
        fixedWeekCount: false, // 根據排數縮放
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        
        dayCellClassNames: function(arg) {
          const ymd = arg.date.getFullYear() + "-" + 
                      String(arg.date.getMonth() + 1).padStart(2, '0') + "-" + 
                      String(arg.date.getDate()).padStart(2, '0');
          if (eventCountMap[ymd] > 0) return ['has-event'];
          return [];
        },

        dateClick: function(info) {
          document.querySelectorAll('.fc-daygrid-day').forEach(el => el.classList.remove('selected-day'));
          info.dayEl.classList.add('selected-day');
          renderDayEvents(info.dateStr);
        },

        datesSet: function(info) {
          resetEventList();
          const mid = new Date(info.start.getTime() + (info.end.getTime() - info.start.getTime()) / 2);
          fetchEvents(mid.getFullYear(), mid.getMonth() + 1);
        }
      });
      calendar.render();
    });

    function resetEventList() {
      const list = document.getElementById('eventList');
      list.innerHTML = `
        <div class="flex flex-col items-center justify-center h-full text-slate-400">
          <p class="text-[10px] font-black tracking-widest uppercase">請點擊綠色日期查看活動</p>
        </div>
      `;
    }

    function fetchEvents(year, month) {
      if (typeof google === 'undefined') return;
      google.script.run
        .withSuccessHandler(data => {
          monthData = data.eventsByDate || {};
          eventCountMap = {};
          if (data.grid) data.grid.forEach(cell => { if (cell.ymd) eventCountMap[cell.ymd] = cell.count; });
          calendar.render(); 
        })
        .withFailureHandler(err => {
          // ★ 如果發生錯誤，明確提示
          const list = document.getElementById('eventList');
          list.innerHTML = `<div class="p-6 text-center text-rose-500 font-bold text-xs">無法讀取行事曆資料，請確認後端權限設定</div>`;
        })
        .fetchMonthEvents(year, month, initCid);
    }

    function renderDayEvents(ymd) {
      const list = document.getElementById('eventList');
      const events = monthData[ymd] || [];
      list.innerHTML = `<div class="text-green-600 text-[10px] font-black mb-3 border-l-4 border-green-500 pl-2 uppercase tracking-tighter">${ymd} 活動詳情</div>`;
      
      if (!events.length) {
        list.innerHTML += `<div class="py-8 text-center text-slate-300 text-xs italic font-bold">目前無任何行程安排</div>`;
        return;
      }

      events.forEach(ev => {
        const item = document.createElement('div');
        item.className = "mb-3 p-4 bg-white rounded-xl shadow-sm border border-slate-100 ring-1 ring-black/5";
        const time = ev.allDay ? '整日' : (ev.start.includes('T') ? ev.start.split('T')[1].substring(0, 5) : '整日');
        item.innerHTML = `
          <div class="flex justify-between items-start">
            <div class="font-black text-slate-700 text-sm leading-tight">${ev.summary}</div>
            <div class="text-green-600 text-[9px] font-black bg-green-50 px-2 py-0.5 rounded ml-2">${time}</div>
          </div>
        `;
        list.appendChild(item);
      });
      list.scrollTop = 0;
    }
  </script>
</body>
</html>
