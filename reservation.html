<script>
window.ReservationModule = (function () {
  var API = typeof WORKER_URL !== 'undefined' ? WORKER_URL : '';
  var courses = [], orders = [], members = [];
  var editingOrder = null, editingMember = null;
  var tabs = ['dashboard','orders','add','courses','members'];
  var titles = { dashboard:'營運統計', orders:'訂單管理', add:'新增報名', courses:'課程管理', members:'會員管理' };

  function callAPI(action, payload, userProfile) {
    var body = { action: action, payload: payload || {} };
    if (userProfile) body.userProfile = userProfile;
    return fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
      .then(function(r){ return r.json(); })
      .then(function(d){
        // SI actions return { status, data }; legacy return { success, data }
        if (d.status === 'success') return d.data;
        if (d.success) return d.data || d;
        throw new Error(d.message || d.msg || '操作失敗');
      });
  }

  function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function statusLabel(s) {
    return {PENDING:'待付款',PAID:'已完款',REFUND_REQUESTED:'申退款中',REFUNDED:'已退款',CANCELLED:'已取消'}[s] || s || '-';
  }
  function statusCls(s) {
    return {PENDING:'bg-yellow-100 text-yellow-800',PAID:'bg-green-100 text-green-700',
      REFUND_REQUESTED:'bg-orange-100 text-orange-700',REFUNDED:'bg-red-100 text-red-600',
      CANCELLED:'bg-slate-100 text-slate-500'}[s] || 'bg-slate-100 text-slate-500';
  }

  function setTab(tab) {
    tabs.forEach(function(t) {
      var panel = document.getElementById('res-panel-' + t);
      if (panel) panel.classList.toggle('hidden', t !== tab);
      var nav = document.getElementById('res-nav-' + t);
      if (nav) nav.classList.toggle('active', t === tab);
      var mTab = document.getElementById('res-tab-' + t);
      if (mTab) {
        if (t === tab) { mTab.classList.remove('bg-slate-100','text-slate-600'); mTab.classList.add('bg-[#06C755]','text-white'); }
        else { mTab.classList.remove('bg-[#06C755]','text-white'); mTab.classList.add('bg-slate-100','text-slate-600'); }
      }
    });
    var titleEl = document.getElementById('res-page-title');
    if (titleEl) titleEl.innerText = titles[tab] || '';
    var exportBtn = document.getElementById('res-export-btn');
    if (exportBtn) exportBtn.classList.toggle('hidden', tab !== 'orders');
    if (tab === 'add') refreshCourseSelect();
    if (tab === 'orders') bindOrderFilters();
  }

  function syncAll() {
    if (typeof toggleLoader === 'function') toggleLoader(true);
    callAPI('SI_ADMIN_GET_DATA').then(function(data) {
      courses = data.courses || [];
      orders = (data.orders || []).slice().reverse();
      members = data.users || [];
      renderDashboard();
      renderOrders();
      renderCourses();
      renderMembers();
      refreshCourseFilter();
      if (typeof toggleLoader === 'function') toggleLoader(false);
    }).catch(function(e) {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      alert('同步失敗：' + e.message);
    });
  }

  // ── 統計 ──
  function renderDashboard() {
    var totalPaid=0, totalPending=0, validOrders=0;
    orders.forEach(function(o) {
      if (o.status==='PAID') { totalPaid += Number(o.amount)||0; validOrders++; }
      else if (o.status==='PENDING') { totalPending += Number(o.amount)||0; validOrders++; }
    });
    var cards = [
      { label:'實收金額', val:'$'+totalPaid.toLocaleString(), color:'text-[#06C755]', bg:'bg-green-50', icon:'fa-dollar-sign' },
      { label:'待收金額', val:'$'+totalPending.toLocaleString(), color:'text-amber-500', bg:'bg-amber-50', icon:'fa-hourglass-half' },
      { label:'有效訂單', val:validOrders+'筆', color:'text-blue-600', bg:'bg-blue-50', icon:'fa-file-signature' },
      { label:'課程數',   val:courses.length+'門', color:'text-purple-600', bg:'bg-purple-50', icon:'fa-book-open' },
      { label:'會員數',   val:members.length+'人', color:'text-rose-500', bg:'bg-rose-50', icon:'fa-users' }
    ];
    var el = document.getElementById('res-stat-cards');
    if (el) el.innerHTML = cards.map(function(c) {
      return '<div class="stat-box relative"><p class="text-xs font-bold text-slate-400 mb-1">'+c.label+'</p>'
        +'<h3 class="text-2xl font-black '+c.color+'">'+c.val+'</h3>'
        +'<div class="absolute right-3 top-3 w-9 h-9 '+c.bg+' rounded-xl flex items-center justify-center opacity-70">'
        +'<i class="fas '+c.icon+' '+c.color+'"></i></div></div>';
    }).join('');

    var tbody = document.getElementById('res-course-stats');
    if (!tbody) return;
    tbody.innerHTML = courses.map(function(c) {
      var co = orders.filter(function(o){ return o.courseId===c.id; });
      var paid = co.filter(function(o){ return o.status==='PAID'; });
      var pending = co.filter(function(o){ return o.status==='PENDING'; });
      var paidRev = paid.reduce(function(s,o){ return s+(Number(o.amount)||0); },0);
      var pendingRev = pending.reduce(function(s,o){ return s+(Number(o.amount)||0); },0);
      return '<tr><td class="font-bold">'+esc(c.name)+'</td>'
        +'<td class="text-center">'+(paid.length+pending.length)+'</td>'
        +'<td class="text-center text-green-600 font-bold">'+paid.length+'</td>'
        +'<td class="text-center text-green-600 font-bold">$'+paidRev.toLocaleString()+'</td>'
        +'<td class="text-center text-amber-500">'+pending.length+'</td>'
        +'<td class="text-center text-amber-500">$'+pendingRev.toLocaleString()+'</td></tr>';
    }).join('') || '<tr><td colspan="6" class="text-center py-8 text-slate-400">尚無課程資料</td></tr>';
  }

  // ── 訂單 ──
  function getFilteredOrders() {
    var kw = ((document.getElementById('res-filter-kw')||{}).value||'').toLowerCase();
    var st = (document.getElementById('res-filter-status')||{}).value||'';
    var cv = (document.getElementById('res-filter-course')||{}).value||'';
    return orders.filter(function(o) {
      var ok = true;
      if (kw) ok = ok && [o.name,o.phone,o.orderId].join(' ').toLowerCase().includes(kw);
      if (st) ok = ok && o.status===st;
      if (cv) ok = ok && o.courseId===cv;
      return ok;
    });
  }

  function renderOrders() {
    var list = getFilteredOrders();
    var tbody = document.getElementById('res-order-list');
    if (!tbody) return;
    tbody.innerHTML = list.map(function(o) {
      var cancelled = o.status==='CANCELLED';
      return '<tr class="'+(cancelled?'opacity-50':'')+'">'
        +'<td class="font-mono text-xs text-slate-400">'+(o.orderId||'').slice(-8)+'</td>'
        +'<td class="font-bold '+(cancelled?'line-through':'')+' text-slate-800 max-w-[140px] truncate">'+esc(o.courseName||o.courseId)+'</td>'
        +'<td><div class="font-bold text-slate-800">'+esc(o.name)+'</div><div class="text-xs text-slate-400">'+esc(o.phone)+'</div></td>'
        +'<td class="text-center font-black text-[#06C755]">$'+esc(o.amount)+'</td>'
        +'<td class="text-center"><span class="badge '+statusCls(o.status)+'">'+statusLabel(o.status)+'</span></td>'
        +'<td class="text-center font-mono font-bold text-blue-600">'+(o.remittance||'-')+'</td>'
        +'<td class="text-right"><button onclick="window.ReservationModule.openOrderModal(\''+esc(o.orderId)+'\')" class="res-btn-w text-xs py-1.5 px-3">編輯</button></td>'
        +'</tr>';
    }).join('') || '<tr><td colspan="7" class="text-center py-10 text-slate-400">沒有符合的訂單</td></tr>';
  }

  function bindOrderFilters() {
    ['res-filter-kw','res-filter-status','res-filter-course'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el && !el._bound) { el._bound=true; el.addEventListener('input',renderOrders); el.addEventListener('change',renderOrders); }
    });
  }

  function refreshCourseFilter() {
    var sel = document.getElementById('res-filter-course');
    if (!sel) return;
    sel.innerHTML = '<option value="">全部課程</option>' +
      courses.map(function(c){ return '<option value="'+esc(c.id)+'">'+esc(c.name)+'</option>'; }).join('');
  }

  function openOrderModal(orderId) {
    var o = orders.find(function(x){ return x.orderId===orderId; });
    if (!o) return;
    editingOrder = o;
    document.getElementById('modal-order-id').value = o.orderId;
    document.getElementById('modal-order-status').value = o.status || 'PENDING';
    document.getElementById('modal-order-amount').value = o.amount || 0;
    document.getElementById('modal-order-remittance').value = o.remittance || '';
    document.getElementById('modal-order-note').value = o.note || '';
    var m = document.getElementById('res-order-modal');
    if (m) { m.classList.remove('hidden'); m.classList.add('flex'); }
  }

  function closeOrderModal() {
    var m = document.getElementById('res-order-modal');
    if (m) { m.classList.add('hidden'); m.classList.remove('flex'); }
  }

  function saveOrder() {
    if (!editingOrder) return;
    if (typeof toggleLoader === 'function') toggleLoader(true);
    callAPI('SI_ADMIN_UPDATE_ORDER', { orderData: {
      orderId: editingOrder.orderId,
      status: document.getElementById('modal-order-status').value,
      amount: document.getElementById('modal-order-amount').value,
      remittance: document.getElementById('modal-order-remittance').value,
      note: document.getElementById('modal-order-note').value,
      extraData: editingOrder.extraData || {}
    }}).then(function() {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      if (typeof showToast === 'function') showToast('訂單已更新');
      closeOrderModal(); syncAll();
    }).catch(function(e) {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      alert('更新失敗：' + e.message);
    });
  }

  // ── 課程 ──
  function renderCourses() {
    var kw = ((document.getElementById('res-course-kw')||{}).value||'').toLowerCase();
    var list = courses.filter(function(c){ return !kw || c.name.toLowerCase().includes(kw); });
    var tbody = document.getElementById('res-course-list');
    if (!tbody) return;
    tbody.innerHTML = list.map(function(c) {
      var cOrders = orders.filter(function(o){ return o.courseId===c.id; });
      var paid = cOrders.filter(function(o){ return o.status==='PAID'; }).length;
      var pending = cOrders.filter(function(o){ return o.status==='PENDING'; }).length;
      return '<tr>'
        +'<td><div class="font-bold text-slate-800">'+esc(c.name)+'</div><span class="text-[10px] font-mono text-slate-400">'+esc(c.id)+'</span></td>'
        +'<td><span class="badge bg-blue-50 text-blue-700">'+esc(c.type)+'</span><div class="text-xs text-slate-400 mt-1">'+esc(c.startDate)+' ~ '+esc(c.endDate)+'</div></td>'
        +'<td class="text-center font-black text-[#06C755]">$'+esc(c.price)+'</td>'
        +'<td class="text-center text-slate-600">'+esc(c.enrolled)+' / '+esc(c.capacity)+'</td>'
        +'<td class="text-center text-xs"><span class="text-green-600 font-bold">付:'+paid+'</span> <span class="text-amber-500 font-bold">待:'+pending+'</span></td>'
        +'<td class="text-right"><button onclick="window.ReservationModule.openCourseModal(\''+esc(c.id)+'\')" class="res-btn-w text-xs py-1.5 px-3">編輯</button></td>'
        +'</tr>';
    }).join('') || '<tr><td colspan="6" class="text-center py-10 text-slate-400">尚無課程資料</td></tr>';
  }

  function openCourseModal(courseId) {
    var c = courseId ? courses.find(function(x){ return x.id===courseId; }) : null;
    var title = document.getElementById('res-course-modal-title');
    if (title) title.innerText = c ? '編輯課程' : '新增課程';
    var fields = { 'cm-id':c?c.id:'','cm-name':c?c.name:'','cm-sdate':c?c.startDate:'','cm-edate':c?c.endDate:'',
      'cm-stime':c?c.startTime:'','cm-etime':c?c.endTime:'','cm-location':c?c.location:'','cm-instructor':c?c.instructor:'',
      'cm-price':c?c.price:0,'cm-capacity':c?c.capacity:20,'cm-ebprice':c?c.earlyBirdPrice:0,
      'cm-ebdate':c?c.earlyBirdDate:'','cm-sessions':c?c.totalSessions:1,'cm-image':c?c.image:'','cm-desc':c?c.description:'' };
    Object.keys(fields).forEach(function(id){ var el=document.getElementById(id); if(el) el.value=fields[id]; });
    if (c) document.getElementById('cm-type').value = c.type || '單日課程';
    if (c) document.getElementById('cm-timeslot').value = c.timeSlotType || '全日';
    var m = document.getElementById('res-course-modal');
    if (m) { m.classList.remove('hidden'); m.classList.add('flex'); }
  }

  function closeCourseModal() {
    var m = document.getElementById('res-course-modal');
    if (m) { m.classList.add('hidden'); m.classList.remove('flex'); }
  }

  function saveCourse() {
    var id = document.getElementById('cm-id').value.trim();
    var name = document.getElementById('cm-name').value.trim();
    if (!name) { alert('請填寫課程名稱'); return; }
    var payload = {
      id: id||undefined, name:name, type:document.getElementById('cm-type').value,
      timeSlotType:document.getElementById('cm-timeslot').value,
      startDate:document.getElementById('cm-sdate').value, endDate:document.getElementById('cm-edate').value,
      startTime:document.getElementById('cm-stime').value, endTime:document.getElementById('cm-etime').value,
      location:document.getElementById('cm-location').value, instructor:document.getElementById('cm-instructor').value,
      price:document.getElementById('cm-price').value, capacity:document.getElementById('cm-capacity').value,
      earlyBirdPrice:document.getElementById('cm-ebprice').value, earlyBirdDate:document.getElementById('cm-ebdate').value,
      totalSessions:document.getElementById('cm-sessions').value,
      image:document.getElementById('cm-image').value, description:document.getElementById('cm-desc').value,
      equipmentJson:'[]'
    };
    if (typeof toggleLoader === 'function') toggleLoader(true);
    callAPI(id ? 'SI_ADMIN_UPDATE_COURSE' : 'SI_ADMIN_ADD_COURSE', payload).then(function() {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      if (typeof showToast === 'function') showToast('課程已儲存');
      closeCourseModal(); syncAll();
    }).catch(function(e) {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      alert('儲存失敗：' + e.message);
    });
  }

  // ── 會員 ──
  function renderMembers() {
    var kw = ((document.getElementById('res-member-kw')||{}).value||'').toLowerCase();
    var list = members.filter(function(m){ return !kw || (m.name||'').toLowerCase().includes(kw)||(m.nationalId||'').includes(kw); });
    var tbody = document.getElementById('res-member-list');
    if (!tbody) return;
    tbody.innerHTML = list.map(function(m) {
      var fmCount = 0;
      try { fmCount = JSON.parse(m.familyMembersJson||'[]').length; } catch(e){}
      return '<tr>'
        +'<td class="font-bold text-slate-800">'+esc(m.name)+'</td>'
        +'<td class="text-center text-slate-600">'+esc(m.phone)+'</td>'
        +'<td class="text-center font-mono text-slate-600">'+esc(m.nationalId)+'</td>'
        +'<td class="text-center"><span class="badge bg-blue-50 text-blue-700">'+fmCount+'</span></td>'
        +'<td class="text-right"><button onclick="window.ReservationModule.openMemberModal(\''+esc(m.userId)+'\')" class="text-blue-600 hover:underline text-sm font-bold">詳情</button></td>'
        +'</tr>';
    }).join('') || '<tr><td colspan="5" class="text-center py-10 text-slate-400">尚無會員資料</td></tr>';
  }

  function openMemberModal(userId) {
    var m = members.find(function(x){ return x.userId===userId; });
    if (!m) return;
    editingMember = m;
    document.getElementById('mm-uid').value = m.userId||'';
    document.getElementById('mm-name').value = m.name||'';
    document.getElementById('mm-nid').value = m.nationalId||'';
    document.getElementById('mm-birthday').value = (m.birthday||'').substring(0,10);
    document.getElementById('mm-gender').value = m.gender||'男';
    document.getElementById('mm-phone').value = m.phone||'';
    document.getElementById('mm-address').value = m.address||'';
    document.getElementById('mm-health').value = m.healthNote||'';
    var fmEl = document.getElementById('mm-family');
    try {
      var fms = JSON.parse(m.familyMembersJson||'[]');
      fmEl.innerHTML = fms.map(function(f){
        return '<div class="flex justify-between items-center bg-white border rounded-lg px-3 py-2">'
          +'<span class="font-bold">'+esc(f.name)+'</span>'
          +'<span class="text-xs text-[#06C755] font-bold">'+esc(f.relation)+'</span></div>';
      }).join('') || '<div class="text-slate-400 text-xs">無家人資料</div>';
    } catch(e) { fmEl.innerHTML = '<div class="text-slate-400 text-xs">無家人資料</div>'; }
    var modal = document.getElementById('res-member-modal');
    if (modal) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
  }

  function closeMemberModal() {
    var modal = document.getElementById('res-member-modal');
    if (modal) { modal.classList.add('hidden'); modal.classList.remove('flex'); }
  }

  function saveMember() {
    if (!editingMember) return;
    if (typeof toggleLoader === 'function') toggleLoader(true);
    callAPI('SI_ADMIN_UPDATE_MEMBER', { memberData: {
      userId: document.getElementById('mm-uid').value,
      name: document.getElementById('mm-name').value,
      nationalId: editingMember.nationalId,
      birthday: document.getElementById('mm-birthday').value,
      gender: document.getElementById('mm-gender').value,
      phone: document.getElementById('mm-phone').value,
      address: document.getElementById('mm-address').value,
      healthNote: document.getElementById('mm-health').value
    }}).then(function() {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      if (typeof showToast === 'function') showToast('會員資料已更新');
      closeMemberModal(); syncAll();
    }).catch(function(e) {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      alert('更新失敗：' + e.message);
    });
  }

  // ── 新增報名 ──
  function refreshCourseSelect() {
    var sel = document.getElementById('add-course-sel');
    if (!sel) return;
    sel.innerHTML = '<option value="">-- 請選擇課程 --</option>' +
      courses.map(function(c) {
        var rem = Math.max(0,(c.capacity||0)-(c.enrolled||0));
        return '<option value="'+esc(c.id)+'"'+(rem<=0?' disabled':'')+'>'+esc(c.name)+'　$'+c.price+'　剩'+rem+'名</option>';
      }).join('');
  }

  function onCourseChange() {
    var sel = document.getElementById('add-course-sel');
    var info = document.getElementById('add-course-info');
    var amtEl = document.getElementById('add-amount');
    if (!sel||!info) return;
    var c = courses.find(function(x){ return x.id===sel.value; });
    if (!c) { info.classList.add('hidden'); if(amtEl) amtEl.innerText='$0'; return; }
    var price = Number(c.price)||0;
    if (c.earlyBirdPrice && c.earlyBirdDate) {
      var eb = new Date(c.earlyBirdDate); eb.setHours(23,59,59,999);
      if (new Date()<=eb) price = Number(c.earlyBirdPrice)||price;
    }
    info.innerHTML = '<div>📅 '+esc(c.startDate)+' ~ '+esc(c.endDate)+'</div>'
      +(c.location?'<div>📍 '+esc(c.location)+'</div>':'')
      +'<div>👤 剩餘名額：'+Math.max(0,(c.capacity||0)-(c.enrolled||0))+' 人</div>';
    info.classList.remove('hidden');
    if (amtEl) amtEl.innerText = '$' + price;
    window._addPrice = price;
  }

  function submitAdd() {
    var courseId = (document.getElementById('add-course-sel')||{}).value||'';
    var name = ((document.getElementById('add-name')||{}).value||'').trim();
    var nid = ((document.getElementById('add-nid')||{}).value||'').trim().toUpperCase();
    var phone = ((document.getElementById('add-phone')||{}).value||'').trim();
    var uid = ((document.getElementById('add-uid')||{}).value||'').trim();
    var note = ((document.getElementById('add-note')||{}).value||'');
    if (!courseId) { alert('請選擇課程'); return; }
    if (!name) { alert('請填寫學員姓名'); return; }
    if (!nid) { alert('請填寫身分證字號'); return; }
    if (!phone) { alert('請填寫聯絡電話'); return; }
    var userProfile = { userId: uid || ('ADMIN-' + Date.now()) };
    if (typeof toggleLoader === 'function') toggleLoader(true);
    callAPI('SI_REGISTER', { courseId:courseId, userId:userProfile.userId, name:name, nationalId:nid, phone:phone, note:note, excludedDates:[], equipments:[] }, userProfile)
      .then(function(data) {
        if (typeof toggleLoader === 'function') toggleLoader(false);
        if (typeof showToast === 'function') showToast('報名成功！訂單號：' + (data&&data.orderId?data.orderId:''));
        ['add-name','add-nid','add-phone','add-uid','add-note'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
        document.getElementById('add-course-sel').value='';
        document.getElementById('add-course-info').classList.add('hidden');
        document.getElementById('add-amount').innerText='$0';
        syncAll(); setTab('orders');
      }).catch(function(e) {
        if (typeof toggleLoader === 'function') toggleLoader(false);
        alert('建立失敗：' + e.message);
      });
  }

  // ── CSV 匯出 ──
  function exportCsv() {
    var list = getFilteredOrders();
    if (!list.length) { alert('沒有可匯出的資料'); return; }
    var rows = [['訂單號','課程','學員','電話','金額','狀態','後五碼','建立時間']];
    list.forEach(function(o) {
      rows.push([o.orderId||'',o.courseName||'',o.name||'',o.phone||'',o.amount||0,statusLabel(o.status),o.remittance||'',o.createdAt||'']);
    });
    var csv = '\uFEFF'+rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
    a.download = 'orders_'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  function init() {
    setTab('dashboard');
    syncAll();
  }

  return {
    init:init, setTab:setTab, syncAll:syncAll,
    renderOrders:renderOrders, renderCourses:renderCourses, renderMembers:renderMembers,
    openOrderModal:openOrderModal, closeOrderModal:closeOrderModal, saveOrder:saveOrder,
    openCourseModal:openCourseModal, closeCourseModal:closeCourseModal, saveCourse:saveCourse,
    openMemberModal:openMemberModal, closeMemberModal:closeMemberModal, saveMember:saveMember,
    onCourseChange:onCourseChange, submitAdd:submitAdd, exportCsv:exportCsv
  };
})();

setTimeout(function() {
  if (window.ReservationModule) window.ReservationModule.init();
}, 150);
</script>
</div>
