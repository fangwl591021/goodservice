      <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">

  <script>
    window.ReservationModule = {
      list: [],
      filteredList: [],
      currentTab: 'dashboard',
      activeItem: null,
      filtersBound: false,

      init: function () {
        this.bindFiltersOnce();
        this.setTab('dashboard');
        this.loadReservations();
      },

      bindFiltersOnce: function () {
        if (this.filtersBound) return;
        this.filtersBound = true;

        var self = this;
        ['res-filter-keyword', 'res-filter-status', 'res-filter-service', 'res-filter-from', 'res-filter-to']
          .forEach(function (id) {
            var el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('input', function () { self.renderAll(); });
            el.addEventListener('change', function () { self.renderAll(); });
          });
      },

      setTab: function (tab) {
        this.currentTab = tab;

        var map = ['dashboard', 'orders', 'insights'];
        map.forEach(function (key) {
          var panel = document.getElementById('res-panel-' + key);
          if (panel) panel.classList.toggle('hidden', key !== tab);

          var nav = document.getElementById('res-nav-' + key);
          if (nav) {
            if (key === tab) {
              nav.classList.add('bg-[#f0fbf5]', 'text-[#06C755]', 'border-[#06C755]', 'font-black');
            } else {
              nav.classList.remove('bg-[#f0fbf5]', 'text-[#06C755]', 'border-[#06C755]', 'font-black');
            }
          }

          var mobileTab = document.getElementById('res-tab-' + key);
          if (mobileTab) {
            if (key === tab) {
              mobileTab.classList.remove('bg-slate-100', 'text-slate-600');
              mobileTab.classList.add('bg-[#06C755]', 'text-white', 'shadow-sm');
            } else {
              mobileTab.classList.remove('bg-[#06C755]', 'text-white', 'shadow-sm');
              mobileTab.classList.add('bg-slate-100', 'text-slate-600');
            }
          }
        });

        var titleMap = {
          dashboard: '預約營運統計',
          orders: '預約管理',
          insights: '預約洞察'
        };
        var titleEl = document.getElementById('res-page-title');
        if (titleEl) titleEl.innerText = titleMap[tab] || '預約管理';
      },

      loadReservations: function () {
        var self = this;
        var desktopTbody = document.getElementById('res-admin-list');
        var mobileList = document.getElementById('res-mobile-list');

        if (desktopTbody) {
          desktopTbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-slate-400 font-bold animate-pulse">載入中...</td></tr>';
        }
        if (mobileList) {
          mobileList.innerHTML = '<div class="p-8 text-center text-slate-400 font-bold bg-white rounded-2xl border border-slate-200 animate-pulse">載入中...</div>';
        }

        if (typeof toggleLoader === 'function') toggleLoader(true);

        fetchApi('getReservations')
          .then(function (res) {
            if (typeof toggleLoader === 'function') toggleLoader(false);

            if (!res || !res.success) {
              self.list = [];
              self.renderAll();
              alert('載入失敗：' + ((res && res.msg) || '未知錯誤'));
              return;
            }

            var raw = Array.isArray(res.data) ? res.data : [];
            self.list = raw.map(function (item) {
              return {
                reservationId: item.reservationId || '',
                createdAt: item.createdAt || item.timestamp || '',
                updatedAt: item.updatedAt || item.createdAt || item.timestamp || '',
                name: item.name || '',
                phone: item.phone || '',
                lineId: item.lineId || '',
                date: item.date || item.reserveDate || '',
                time: item.time || item.reserveTime || '',
                service: item.service || '',
                memo: item.memo || '',
                status: item.status || '待確認',
                source: item.source || 'web',
                calendarEventId: item.calendarEventId || '',
                timestamp: item.timestamp || item.createdAt || ''
              };
            });

            self.renderAll();
          })
          .catch(function (err) {
            if (typeof toggleLoader === 'function') toggleLoader(false);
            self.list = [];
            self.renderAll();
            alert('網路錯誤：' + err.message);
          });
      },

      getFilteredList: function () {
        var keyword = (document.getElementById('res-filter-keyword')?.value || '').trim().toLowerCase();
        var status = document.getElementById('res-filter-status')?.value || 'ALL';
        var service = document.getElementById('res-filter-service')?.value || 'ALL';
        var fromDate = document.getElementById('res-filter-from')?.value || '';
        var toDate = document.getElementById('res-filter-to')?.value || '';

        var list = this.list.filter(function (item) {
          var ok = true;

          if (keyword) {
            var text = [
              item.name, item.phone, item.lineId, item.memo, item.service, item.reservationId
            ].join(' ').toLowerCase();
            ok = ok && text.indexOf(keyword) > -1;
          }

          if (status !== 'ALL') ok = ok && item.status === status;
          if (service !== 'ALL') ok = ok && item.service === service;
          if (fromDate) ok = ok && String(item.date || '') >= fromDate;
          if (toDate) ok = ok && String(item.date || '') <= toDate;

          return ok;
        });

        return list;
      },

      renderAll: function () {
        this.renderServiceFilter();
        this.filteredList = this.getFilteredList();
        this.renderStats();
        this.renderDashboard();
        this.renderOrders();
        this.renderInsights();
      },

      renderServiceFilter: function () {
        var el = document.getElementById('res-filter-service');
        if (!el) return;

        var current = el.value || 'ALL';
        var services = {};
        this.list.forEach(function (item) {
          if (item.service) services[item.service] = true;
        });

        var html = '<option value="ALL">全部服務</option>';
        Object.keys(services).sort().forEach(function (name) {
          html += '<option value="' + ReservationModule.escapeHtml(name) + '">' + ReservationModule.escapeHtml(name) + '</option>';
        });

        el.innerHTML = html;
        if ([].slice.call(el.options).some(function (opt) { return opt.value === current; })) {
          el.value = current;
        }
      },

      renderStats: function () {
        var total = this.list.length;
        var pending = this.list.filter(function (x) { return x.status === '待確認'; }).length;
        var confirmed = this.list.filter(function (x) { return x.status === '已確認'; }).length;
        var completed = this.list.filter(function (x) { return x.status === '已完成'; }).length;
        var cancelled = this.list.filter(function (x) { return x.status === '已取消'; }).length;
        var todayStr = this.todayYmd_();
        var todayCount = this.list.filter(function (x) { return x.date === todayStr; }).length;

        var cards = [
          { label: '總預約數', value: total, color: 'text-slate-800', bg: 'bg-white', icon: 'fa-clipboard-list', iconBg: 'bg-slate-100 text-slate-500' },
          { label: '今日預約', value: todayCount, color: 'text-blue-600', bg: 'bg-white', icon: 'fa-calendar-day', iconBg: 'bg-blue-50 text-blue-500' },
          { label: '待確認', value: pending, color: 'text-amber-600', bg: 'bg-white', icon: 'fa-hourglass-half', iconBg: 'bg-amber-50 text-amber-500' },
          { label: '已確認', value: confirmed, color: 'text-green-600', bg: 'bg-white', icon: 'fa-circle-check', iconBg: 'bg-green-50 text-green-500' },
          { label: '已完成/取消', value: completed + cancelled, color: 'text-purple-600', bg: 'bg-white', icon: 'fa-chart-line', iconBg: 'bg-purple-50 text-purple-500' }
        ];

        var html = cards.map(function (card) {
          return `
            <div class="${card.bg} rounded-2xl border border-slate-200 shadow-sm p-5 flex items-center justify-between">
              <div>
                <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">${card.label}</div>
                <div class="text-3xl font-black ${card.color}">${card.value}</div>
              </div>
              <div class="w-14 h-14 rounded-2xl ${card.iconBg} flex items-center justify-center shadow-inner">
                <i class="fas ${card.icon} text-xl"></i>
              </div>
            </div>
          `;
        }).join('');

        var statCards = document.getElementById('res-stat-cards');
        if (statCards) statCards.innerHTML = html;
      },

      renderDashboard: function () {
        var topServices = this.rankBy_(this.list, 'service', 5);
        var sourceRanks = this.rankBy_(this.list, 'source', 5);
        var statusRanks = this.rankBy_(this.list, 'status', 10);

        document.getElementById('res-top-services').innerHTML = this.renderRankList_(topServices, '目前尚無服務資料');
        document.getElementById('res-source-overview').innerHTML = this.renderRankList_(sourceRanks, '目前尚無來源資料');
        document.getElementById('res-status-overview').innerHTML = this.renderRankList_(statusRanks, '目前尚無狀態資料');

        var recent = this.list.slice(0, 8);
        var recentHtml = '';
        if (!recent.length) {
          recentHtml = '<div class="text-center py-10 text-slate-400 font-bold">目前沒有預約資料</div>';
        } else {
          recentHtml = recent.map(function (item, idx) {
            return `
              <div class="flex items-center justify-between gap-3 py-3 ${idx < recent.length - 1 ? 'border-b border-slate-100' : ''}">
                <div class="min-w-0">
                  <div class="font-bold text-slate-800 truncate">${ReservationModule.escapeHtml(item.name)} <span class="text-slate-400 font-normal">/ ${ReservationModule.escapeHtml(item.service || '未分類')}</span></div>

      renderInsights: function () {
        var dateRanks = this.rankBy_(this.list, 'date', 10);
        var timeRanks = this.rankByTime_(this.list);

        document.getElementById('res-date-insights').innerHTML = this.renderRankList_(dateRanks, '目前尚無日期資料');
        document.getElementById('res-time-insights').innerHTML = this.renderRankList_(timeRanks, '目前尚無時間資料');

        var pending = this.list.filter(function (x) { return x.status === '待確認'; }).length;
        var total = this.list.length;
        var pendingRate = total ? Math.round((pending / total) * 100) : 0;

        var topService = this.rankBy_(this.list, 'service', 1)[0];
        var topDate = dateRanks[0];
        var topTime = timeRanks[0];

        var advice = [];
        advice.push('目前總預約數為 <b>' + total + '</b> 筆，待確認比例約 <b>' + pendingRate + '%</b>。');
        if (topService) advice.push('最熱門服務是 <b>' + this.escapeHtml(topService.label) + '</b>，共 <b>' + topService.count + '</b> 筆。');
        if (topDate) advice.push('最集中的預約日期是 <b>' + this.escapeHtml(topDate.label) + '</b>。');
        if (topTime) advice.push('最熱門時間帶是 <b>' + this.escapeHtml(topTime.label) + '</b>。');
        if (pendingRate >= 40) advice.push('建議優先追蹤「待確認」訂單，比例偏高，容易流失。');
        if (pendingRate < 40) advice.push('目前確認率表現不錯，可考慮進一步做服務分眾追蹤。');

        document.getElementById('res-advice-box').innerHTML = advice.map(function (txt) {
          return '<div class="p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm text-slate-700 leading-relaxed">' + txt + '</div>';
        }).join('');
      },

        var item = this.filteredList[idx];
        if (!item) return;

        this.activeItem = item;
        var body = document.getElementById('res-detail-body');
        var modal = document.getElementById('res-detail-modal');

        body.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-1">預約編號</div>
              <div class="font-mono text-sm text-slate-700">${this.escapeHtml(item.reservationId || '-')}</div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-1">建立時間</div>
              <div class="font-mono text-sm text-slate-700">${this.escapeHtml(item.createdAt || '-')}</div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-1">姓名</div>
              <div class="font-bold text-slate-800">${this.escapeHtml(item.name || '-')}</div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-1">電話</div>
              <div class="font-mono text-sky-600">${this.escapeHtml(item.phone || '-')}</div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-1">LINE ID</div>
              <div class="text-slate-700">${this.escapeHtml(item.lineId || '無')}</div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-1">來源</div>
              <div class="text-slate-700 font-bold">${this.escapeHtml(item.source || 'web')}</div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-1">預約日期</div>
              <div class="font-bold text-slate-800">${this.escapeHtml(item.date || '-')}</div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-1">預約時間</div>
              <div class="font-bold text-[#06C755]">${this.escapeHtml(item.time || '-')}</div>
            </div>

            <div class="md:col-span-2 bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-1">服務項目</div>
              <div class="font-bold text-slate-800">${this.escapeHtml(item.service || '未分類')}</div>
            </div>

            <div class="md:col-span-2 bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-1">備註</div>
              <div class="text-slate-700 break-words whitespace-pre-wrap">${this.escapeHtml(item.memo || '無備註')}</div>
            </div>

            <div class="md:col-span-2 bg-slate-50 rounded-2xl p-4 border border-slate-200">
              <div class="text-xs font-bold text-slate-400 mb-2">狀態設定</div>
              <select id="res-detail-status"
                class="w-full border border-slate-300 rounded-xl px-3 py-3 text-sm font-black outline-none focus:border-[#06C755]">
                <option value="待確認" ${item.status === '待確認' ? 'selected' : ''}>待確認</option>
                <option value="已確認" ${item.status === '已確認' ? 'selected' : ''}>已確認</option>
                <option value="已完成" ${item.status === '已完成' ? 'selected' : ''}>已完成</option>
                <option value="已取消" ${item.status === '已取消' ? 'selected' : ''}>已取消</option>
              </select>
            </div>
          </div>
        `;

        document.getElementById('res-detail-save-btn').onclick = function () {
          var newStatus = document.getElementById('res-detail-status').value;
          window.ReservationModule.saveDetailStatus(newStatus);
        };

        document.getElementById('res-detail-delete-btn').onclick = function () {
          window.ReservationModule.deleteActiveItem();
        };

        modal.classList.remove('hidden');
      },

      closeDetailModal: function () {
        document.getElementById('res-detail-modal').classList.add('hidden');
        this.activeItem = null;
      },

      saveDetailStatus: function (status) {
        var item = this.activeItem;
        if (!item) return;
        this.updateStatus(item, status, true);
      },

      deleteActiveItem: function () {
        var item = this.activeItem;
        if (!item) return;
        this.deleteReservationItem(item, true);
      },

      quickStatusChange: function (idx, status) {
        var item = this.filteredList[idx];
        if (!item) return;
        this.updateStatus(item, status, false);
      },

      deleteByIndex: function (idx) {
        var item = this.filteredList[idx];
        if (!item) return;
        this.deleteReservationItem(item, false);
      },

      updateStatus: function (item, status, fromModal) {
        var self = this;
        if (typeof toggleLoader === 'function') toggleLoader(true);

        fetchApi('updateReservationStatus', {
          reservationId: item.reservationId || '',
          timestamp: item.createdAt || item.timestamp || '',
          phone: item.phone || '',
          status: status
        })
          .then(function (res) {
            if (typeof toggleLoader === 'function') toggleLoader(false);

            if (res && res.success) {
              if (typeof showToast === 'function') showToast('狀態已更新');
              if (fromModal) self.closeDetailModal();
              self.loadReservations();
            } else {
              alert('更新失敗：' + ((res && res.msg) || '未知錯誤'));
            }
          })
          .catch(function (err) {
            if (typeof toggleLoader === 'function') toggleLoader(false);
            alert('更新失敗：' + err.message);
          });
      },

      deleteReservationItem: function (item, fromModal) {
        var self = this;
        if (!confirm('確定要刪除這筆預約嗎？此操作無法還原。')) return;

        if (typeof toggleLoader === 'function') toggleLoader(true);

        fetchApi('deleteReservation', {
          reservationId: item.reservationId || '',
          timestamp: item.createdAt || item.timestamp || '',
          phone: item.phone || ''
        })
          .then(function (res) {
            if (typeof toggleLoader === 'function') toggleLoader(false);

            if (res && res.success) {
              if (typeof showToast === 'function') showToast('預約已刪除');
              if (fromModal) self.closeDetailModal();
              self.loadReservations();
            } else {
              alert('刪除失敗：' + ((res && res.msg) || '未知錯誤'));
            }
          })
          .catch(function (err) {
            if (typeof toggleLoader === 'function') toggleLoader(false);
            alert('刪除失敗：' + err.message);
          });
      },

      exportCsv: function () {
        var list = this.filteredList && this.filteredList.length ? this.filteredList : this.list;
        if (!list.length) {
          alert('目前沒有可匯出的資料');
          return;
        }

        var rows = [
          ['預約編號', '建立時間', '更新時間', '姓名', '電話', 'LINE ID', '預約日期', '預約時間', '服務項目', '備註', '狀態', '來源']
        ];

        list.forEach(function (item) {
          rows.push([
            item.reservationId || '',
            item.createdAt || '',
            item.updatedAt || '',
            item.name || '',
            item.phone || '',
            item.lineId || '',
            item.date || '',
            item.time || '',
            item.service || '',
            item.memo || '',
            item.status || '',
            item.source || ''
          ]);
        });

        var csv = '\uFEFF' + rows.map(function (row) {
          return row.map(function (cell) {
            var val = String(cell == null ? '' : cell).replace(/"/g, '""');
            return '"' + val + '"';
          }).join(',');
        }).join('\n');

        var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'reservations_' + this.todayYmd_() + '.csv';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      },

      resetFilters: function () {
        var ids = ['res-filter-keyword', 'res-filter-from', 'res-filter-to'];
        ids.forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.value = '';
        });

        var status = document.getElementById('res-filter-status');
        var service = document.getElementById('res-filter-service');
        if (status) status.value = 'ALL';
        if (service) service.value = 'ALL';

        this.renderAll();
      },

      rankBy_: function (list, key, limit) {
        var map = {};
        list.forEach(function (item) {
          var val = String(item[key] || '').trim() || '未分類';
          map[val] = (map[val] || 0) + 1;
        });

        return Object.keys(map)
          .map(function (k) { return { label: k, count: map[k] }; })
          .sort(function (a, b) { return b.count - a.count; })
          .slice(0, limit || 10);
      },

      rankByTime_: function (list) {
        var map = {};
        list.forEach(function (item) {
          var time = String(item.time || '').trim();
          var label = '未設定';
          if (time) {
            var hour = parseInt(time.split(':')[0], 10);
            if (!isNaN(hour)) {
              if (hour < 12) label = '上午';
              else if (hour < 18) label = '下午';
              else label = '晚上';
            }
          }
          map[label] = (map[label] || 0) + 1;
        });

        return Object.keys(map)
          .map(function (k) { return { label: k, count: map[k] }; })
          .sort(function (a, b) { return b.count - a.count; });
      },

      renderRankList_: function (items, emptyText) {
        if (!items || !items.length) {
          return '<div class="text-center py-10 text-slate-400 font-bold">' + this.escapeHtml(emptyText || '目前沒有資料') + '</div>';
        }

        return items.map(function (item, idx) {
          return `
            <div class="flex items-center justify-between gap-3 py-3 ${idx < items.length - 1 ? 'border-b border-slate-100' : ''}">
              <div class="flex items-center gap-3 min-w-0">
                <div class="w-7 h-7 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-xs font-black shrink-0">${idx + 1}</div>
                <div class="truncate font-bold text-slate-700">${ReservationModule.escapeHtml(item.label)}</div>
              </div>
              <div class="text-[#06C755] font-black">${item.count}</div>
            </div>
          `;
        }).join('');
      },

      statusBadge_: function (status) {
        var cls = {
          '待確認': 'bg-amber-100 text-amber-700 border border-amber-200',
          '已確認': 'bg-green-100 text-green-700 border border-green-200',
          '已完成': 'bg-blue-100 text-blue-700 border border-blue-200',
          '已取消': 'bg-slate-100 text-slate-500 border border-slate-200'
        };
        return '<span class="inline-block px-2.5 py-1 rounded-full text-[11px] font-black ' + (cls[status] || 'bg-slate-100 text-slate-600 border border-slate-200') + '">' + this.escapeHtml(status || '-') + '</span>';
      },

      todayYmd_: function () {
        var d = new Date();
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + day;
      },

      escapeHtml: function (str) {
        return String(str == null ? '' : str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
    };

    // 避免動態載入時 DOM 尚未完成
    setTimeout(function () {
      if (window.ReservationModule) {
        window.ReservationModule.init();
      }
    }, 80);
  </script>
</div>
