<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服務通 - 線上活動預約系統</title>
    <!-- 引入 Tailwind CSS (從 CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #09f; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-xl shadow-lg w-full max-w-lg p-8 m-4">
        
        <!-- 標題與 LOGO -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center justify-center gap-2">
                <svg class="w-8 h-8 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"></path></svg>
                服務通 預約系統
            </h1>
            <p class="text-gray-500 mt-2">請填寫下方表單以完成預約</p>
        </div>

        <!-- 預約表單 -->
        <form id="reservationForm" class="space-y-5">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">預約人姓名 <span class="text-red-500">*</span></label>
                <input type="text" id="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" placeholder="例如：王小明">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">聯絡電話 <span class="text-red-500">*</span></label>
                    <input type="tel" id="phone" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" placeholder="0912-345-678">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">LINE ID</label>
                    <input type="text" id="lineId" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" placeholder="選填">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">預約日期 <span class="text-red-500">*</span></label>
                    <input type="date" id="date" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">預約時間 <span class="text-red-500">*</span></label>
                    <select id="time" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition bg-white">
                        <option value="" disabled selected>請選擇時段</option>
                        <option value="09:00">09:00 - 10:00</option>
                        <option value="10:00">10:00 - 11:00</option>
                        <option value="11:00">11:00 - 12:00</option>
                        <option value="13:00">13:00 - 14:00</option>
                        <option value="14:00">14:00 - 15:00</option>
                        <option value="15:00">15:00 - 16:00</option>
                        <option value="16:00">16:00 - 17:00</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">服務項目 <span class="text-red-500">*</span></label>
                <select id="service" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition bg-white">
                    <option value="" disabled selected>請選擇服務項目</option>
                    <option value="系統諮詢">系統諮詢</option>
                    <option value="活動企劃討論">活動企劃討論</option>
                    <option value="售後技術支援">售後技術支援</option>
                    <option value="其它">其它</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">備註說明</label>
                <textarea id="memo" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" placeholder="有什麼特別需要我們注意的嗎？"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                送出預約
            </button>
        </form>

        <!-- 載入中動畫區塊 -->
        <div id="loading" class="hidden flex-col items-center justify-center py-6 mt-4">
            <div class="spinner mb-4"></div>
            <p class="text-gray-600">正在處理您的預約，請稍候...</p>
        </div>

        <!-- 結果訊息區塊 -->
        <div id="resultMsg" class="hidden mt-6 p-4 rounded-lg text-center font-medium"></div>

    </div>

    <script>
        // =========================================================================
        // 🚨 這裡非常重要！請將下方的 URL 換成您在 Apps Script 發佈為網頁應用程式後的網址
        // =========================================================================
        const GAS_URL = "請填寫您的_APPS_SCRIPT_網頁應用程式網址"; 
        
        // 限制日期只能選今天之後
        const dateInput = document.getElementById('date');
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);

        document.getElementById('reservationForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // 防呆檢查：確保有填寫 GAS URL
            if (GAS_URL === "請填寫您的_APPS_SCRIPT_網頁應用程式網址") {
                alert("錯誤：前端程式尚未綁定後端 API 網址，請先修改原始碼中的 GAS_URL！");
                return;
            }

            // 收集表單資料
            const payload = {
                action: 'book_event',
                data: {
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    lineId: document.getElementById('lineId').value,
                    date: document.getElementById('date').value,
                    time: document.getElementById('time').value,
                    service: document.getElementById('service').value,
                    memo: document.getElementById('memo').value
                }
            };

            // UI 狀態切換
            document.getElementById('reservationForm').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultMsg').classList.add('hidden');

            // 呼叫 GAS API
            fetch(GAS_URL, {
                method: 'POST',
                // 使用 text/plain 可以避免觸發複雜的 CORS Preflight (OPTIONS) 請求
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('loading').classList.add('hidden');
                const resultDiv = document.getElementById('resultMsg');
                resultDiv.classList.remove('hidden');

                if (result.success) {
                    resultDiv.className = "mt-6 p-4 rounded-lg text-center font-medium bg-green-100 text-green-800 border border-green-200";
                    resultDiv.innerHTML = "🎉 " + result.msg + "<br><br><button onclick='location.reload()' class='text-sm underline text-green-700'>返回重新預約</button>";
                } else {
                    resultDiv.className = "mt-6 p-4 rounded-lg text-center font-medium bg-red-100 text-red-800 border border-red-200";
                    resultDiv.innerHTML = "❌ 發生錯誤：" + result.msg + "<br><br><button onclick='resetForm()' class='text-sm underline text-red-700'>返回修改表單</button>";
                }
            })
            .catch(error => {
                document.getElementById('loading').classList.add('hidden');
                const resultDiv = document.getElementById('resultMsg');
                resultDiv.classList.remove('hidden');
                resultDiv.className = "mt-6 p-4 rounded-lg text-center font-medium bg-red-100 text-red-800 border border-red-200";
                resultDiv.innerHTML = "❌ 網路連線錯誤，請稍後再試。<br><br><button onclick='resetForm()' class='text-sm underline text-red-700'>返回表單</button>";
                console.error('Error:', error);
            });
        });

        function resetForm() {
            document.getElementById('reservationForm').classList.remove('hidden');
            document.getElementById('resultMsg').classList.add('hidden');
        }
    </script>
</body>
</html>
