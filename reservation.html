<div id="reservation-workspace" class="workspace-hidden flex-1 w-full h-full overflow-y-auto bg-gray-50 pb-20">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden mt-10 p-8">
        
        <!-- 標題與 LOGO -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center justify-center gap-2">
                <div class="bg-green-100 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-[#54C061]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                </div>
                服務通 預約報名系統
            </h1>
            <p class="text-gray-500 mt-2 font-bold tracking-widest text-sm">請填寫下方表單以完成預約</p>
        </div>

        <!-- 預約表單 -->
        <form id="sysReservationForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-2">預約人姓名 <span class="text-red-500">*</span></label>
                <input type="text" id="res-name" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-0 focus:border-[#54C061] outline-none transition text-sm" placeholder="例如：王小明">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">聯絡電話 <span class="text-red-500">*</span></label>
                    <input type="tel" id="res-phone" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-0 focus:border-[#54C061] outline-none transition text-sm" placeholder="0912-345-678">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">LINE ID</label>
                    <input type="text" id="res-lineId" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-0 focus:border-[#54C061] outline-none transition text-sm" placeholder="選填">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">預約日期 <span class="text-red-500">*</span></label>
                    <input type="date" id="res-date" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-0 focus:border-[#54C061] outline-none transition text-sm">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">預約時間 <span class="text-red-500">*</span></label>
                    <select id="res-time" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-0 focus:border-[#54C061] outline-none transition bg-white text-sm">
                        <option value="" disabled selected>請選擇時段</option>
                        <option value="09:00">09:00 - 10:00</option>
                        <option value="10:00">10:00 - 11:00</option>
                        <option value="11:00">11:00 - 12:00</option>
                        <option value="13:00">13:00 - 14:00</option>
                        <option value="14:00">14:00 - 15:00</option>
                        <option value="15:00">15:00 - 16:00</option>
                        <option value="16:00">16:00 - 17:00</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-600 mb-2">服務項目 <span class="text-red-500">*</span></label>
                <select id="res-service" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-0 focus:border-[#54C061] outline-none transition bg-white text-sm">
                    <option value="" disabled selected>請選擇服務項目</option>
                    <option value="系統諮詢">系統諮詢</option>
                    <option value="活動企劃討論">活動企劃討論</option>
                    <option value="售後技術支援">售後技術支援</option>
                    <option value="其它">其它</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-600 mb-2">備註說明</label>
                <textarea id="res-memo" rows="3" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-0 focus:border-[#54C061] outline-none transition text-sm resize-none" placeholder="有什麼特別需要我們注意的嗎？"></textarea>
            </div>

            <button type="submit" id="res-submitBtn" class="w-full bg-[#54C061] hover:bg-green-600 text-white font-bold py-4 px-4 rounded-lg transition duration-200 shadow-md tracking-wider">
                送出預約報名
            </button>
        </form>

        <!-- 載入中動畫區塊 -->
        <div id="res-loading" class="hidden flex-col items-center justify-center py-10">
            <svg class="animate-spin h-10 w-10 text-[#54C061] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-slate-500 font-bold">正在處理您的預約，請稍候...</p>
        </div>

        <!-- 結果訊息區塊 -->
        <div id="res-resultMsg" class="hidden mt-8 p-6 rounded-xl text-center font-bold"></div>
    </div>
</div>

<script>
    // 限制日期只能選今天之後
    (function() {
        const dateInput = document.getElementById('res-date');
        if (dateInput) {
            const today = new Date().toISOString().split('T')[0];
            dateInput.setAttribute('min', today);
        }

        const form = document.getElementById('sysReservationForm');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const payload = {
                    name: document.getElementById('res-name').value,
                    phone: document.getElementById('res-phone').value,
                    lineId: document.getElementById('res-lineId').value,
                    date: document.getElementById('res-date').value,
                    time: document.getElementById('res-time').value,
                    service: document.getElementById('res-service').value,
                    memo: document.getElementById('res-memo').value
                };

                // UI 狀態切換
                form.classList.add('hidden');
                document.getElementById('res-loading').classList.remove('hidden');
                document.getElementById('res-resultMsg').classList.add('hidden');

                // 使用全域的 fetchApi 呼叫 Worker -> GAS
                if (typeof fetchApi === 'function') {
                    fetchApi('book_event', { data: payload })
                    .then(result => {
                        document.getElementById('res-loading').classList.add('hidden');
                        const resultDiv = document.getElementById('res-resultMsg');
                        resultDiv.classList.remove('hidden');

                        if (result.success) {
                            resultDiv.className = "mt-8 p-6 rounded-xl text-center font-bold bg-green-50 text-green-700 border border-green-100";
                            resultDiv.innerHTML = "🎉 " + result.msg + "<br><br><button onclick='resetResForm()' class='text-sm underline text-green-800 hover:text-green-600 mt-2'>返回重新預約</button>";
                            form.reset(); // 清空表單
                        } else {
                            resultDiv.className = "mt-8 p-6 rounded-xl text-center font-bold bg-red-50 text-red-700 border border-red-100";
                            resultDiv.innerHTML = "❌ 發生錯誤：" + result.msg + "<br><br><button onclick='resetResForm()' class='text-sm underline text-red-800 hover:text-red-600 mt-2'>返回修改表單</button>";
                        }
                    })
                    .catch(error => {
                        document.getElementById('res-loading').classList.add('hidden');
                        const resultDiv = document.getElementById('res-resultMsg');
                        resultDiv.classList.remove('hidden');
                        resultDiv.className = "mt-8 p-6 rounded-xl text-center font-bold bg-red-50 text-red-700 border border-red-100";
                        resultDiv.innerHTML = "❌ 網路連線錯誤，請稍後再試。<br><br><button onclick='resetResForm()' class='text-sm underline text-red-800 hover:text-red-600 mt-2'>返回表單</button>";
                    });
                }
            });
        }
    })();

    function resetResForm() {
        document.getElementById('sysReservationForm').classList.remove('hidden');
        document.getElementById('res-resultMsg').classList.add('hidden');
    }
</script>
