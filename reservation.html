<div id="reservation-workspace" class="workspace-hidden flex-1 h-full w-full bg-[#f0f2f5] overflow-hidden">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
#reservation-workspace .res-nav-item { display:flex; align-items:center; gap:12px; padding:0 20px; height:48px; font-size:15px; font-weight:500; color:#64748b; border-left:4px solid transparent; cursor:pointer; background:none; border-right:none; border-top:none; border-bottom:none; width:100%; text-align:left; transition:all .18s; }
#reservation-workspace .res-nav-item:hover { background:#f8fafc; color:#06C755; }
#reservation-workspace .res-nav-item.active { background:#f0fbf5; color:#06C755; border-left-color:#06C755; font-weight:700; }
#reservation-workspace .res-card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; box-shadow:0 2px 6px rgba(0,0,0,.03); overflow:hidden; margin-bottom:20px; }
#reservation-workspace .res-table { width:100%; border-collapse:collapse; }
#reservation-workspace .res-table th { padding:12px 16px; background:#f9fafb; color:#6b7280; font-size:14px; font-weight:500; border-bottom:1px solid #e5e7eb; white-space:nowrap; text-align:left; }
#reservation-workspace .res-table td { padding:12px 16px; font-size:15px; border-bottom:1px solid #f3f4f6; vertical-align:middle; }
#reservation-workspace .res-table tr:last-child td { border-bottom:none; }
#reservation-workspace .res-table tr:hover td { background:#fafafa; }
#reservation-workspace .badge { display:inline-block; padding:4px 12px; border-radius:999px; font-size:13px; font-weight:400; }
#reservation-workspace .res-input { width:100%; border:1px solid #d1d5db; border-radius:10px; padding:10px 14px; font-size:15px; outline:none; transition:border .18s; box-sizing:border-box; }
#reservation-workspace .res-input:focus { border-color:#06C755; }
#reservation-workspace .res-btn-g { background:#06C755; color:#fff; border:none; border-radius:8px; padding:9px 18px; font-weight:500; font-size:15px; cursor:pointer; transition:.18s; display:inline-flex; align-items:center; gap:6px; }
#reservation-workspace .res-btn-g:hover { background:#05b34c; }
#reservation-workspace .res-btn-w { background:#fff; border:1px solid #d1d5db; color:#374151; border-radius:8px; padding:9px 18px; font-weight:500; font-size:15px; cursor:pointer; transition:.18s; }
#reservation-workspace .res-btn-w:hover { border-color:#06C755; color:#06C755; }
#reservation-workspace .stat-box { background:#fff; border:1px solid #f0f0f0; border-radius:12px; padding:20px; box-shadow:0 2px 4px rgba(0,0,0,.02); }
#reservation-workspace .res-label { display:block; font-size:14px; font-weight:500; color:#6b7280; margin-bottom:5px; }
#reservation-workspace .camp-batch-block { background:#f9fafb; border:1px solid #e5e7eb; border-radius:12px; padding:16px; margin-bottom:12px; position:relative; }
#reservation-workspace .camp-item-row { display:flex; gap:8px; align-items:flex-end; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid #f3f4f6; }
#reservation-workspace .camp-item-row:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
</style>

<div class="flex h-full w-full">

  <!-- 左側選單 -->
  <aside class="hidden md:flex w-[220px] bg-white border-r border-slate-200 flex-col shrink-0 shadow-sm">
    <div class="px-6 py-5 border-b border-slate-100">
      <div class="text-xl font-bold text-[#06C755] tracking-tight">活動報名系統</div>
      <div class="text-sm text-slate-500 mt-1">Course Registration</div>
    </div>
    <div class="flex-1 py-3">
      <button class="res-nav-item" id="res-nav-dashboard" onclick="window.ReservationModule.setTab('dashboard')"><i class="fas fa-chart-pie w-4 text-center"></i> 營運統計</button>
      <button class="res-nav-item" id="res-nav-orders"    onclick="window.ReservationModule.setTab('orders')">  <i class="fas fa-receipt w-4 text-center"></i>    訂單管理</button>
      <button class="res-nav-item" id="res-nav-add"       onclick="window.ReservationModule.setTab('add')">    <i class="fas fa-plus-circle w-4 text-center"></i> 新增報名</button>
      <button class="res-nav-item" id="res-nav-courses"   onclick="window.ReservationModule.setTab('courses')"><i class="fas fa-calendar-check w-4 text-center"></i> 活動管理</button>
      <button class="res-nav-item" id="res-nav-members"   onclick="window.ReservationModule.setTab('members')"><i class="fas fa-users w-4 text-center"></i>        會員管理</button>
      <button class="res-nav-item" id="res-nav-attend"    onclick="window.ReservationModule.setTab('attend')"> <i class="fas fa-user-check w-4 text-center"></i>   簽到管理</button>
    </div>
    <div class="p-4 border-t border-slate-100">
      <button onclick="window.ReservationModule.syncAll()" class="res-btn-w w-full text-sm py-2.5">
        <i class="fas fa-sync-alt mr-1"></i> 同步資料
      </button>
    </div>
  </aside>

  <!-- 主內容 -->
  <main class="flex-1 min-w-0 flex flex-col h-full overflow-hidden">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
      <h2 id="res-page-title" class="text-xl font-bold text-slate-800">營運統計</h2>
      <div class="flex items-center gap-2">
        <button id="res-export-btn" onclick="window.ReservationModule.exportCsv()" class="hidden res-btn-w text-sm">
          <i class="fas fa-file-export mr-1"></i> 匯出 CSV
        </button>
        <button onclick="window.ReservationModule.syncAll()" class="res-btn-w text-sm">
          <i class="fas fa-sync-alt mr-1"></i> 同步
        </button>
      </div>
    </header>

    <!-- 手機 tab -->
    <div class="md:hidden bg-white border-b px-3 py-2 shrink-0">
      <div class="grid grid-cols-6 gap-1 text-sm">
        <button id="res-tab-dashboard" onclick="window.ReservationModule.setTab('dashboard')" class="py-2 rounded-lg bg-slate-100 text-slate-600 font-medium">統計</button>
        <button id="res-tab-orders"    onclick="window.ReservationModule.setTab('orders')"    class="py-2 rounded-lg bg-slate-100 text-slate-600 font-medium">訂單</button>
        <button id="res-tab-add"       onclick="window.ReservationModule.setTab('add')"       class="py-2 rounded-lg bg-slate-100 text-slate-600 font-medium">新增</button>
        <button id="res-tab-courses"   onclick="window.ReservationModule.setTab('courses')"   class="py-2 rounded-lg bg-slate-100 text-slate-600 font-medium">活動</button>
        <button id="res-tab-members"   onclick="window.ReservationModule.setTab('members')"   class="py-2 rounded-lg bg-slate-100 text-slate-600 font-medium">會員</button>
        <button id="res-tab-attend"    onclick="window.ReservationModule.setTab('attend')"    class="py-2 rounded-lg bg-slate-100 text-slate-600 font-medium">簽到</button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 md:p-6">

      <!-- ===== 營運統計 ===== -->
      <div id="res-panel-dashboard">
        <div id="res-stat-cards" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6"></div>
        <div class="res-card">
          <div class="px-5 py-4 border-b font-medium text-slate-700 text-base">各活動營收概覽</div>
          <div class="overflow-x-auto">
            <table class="res-table">
              <thead><tr>
                <th>活動名稱</th><th class="text-center">報名數</th>
                <th class="text-center">已付款</th><th class="text-center">實收</th>
                <th class="text-center">待付款</th><th class="text-center">待收</th>
              </tr></thead>
              <tbody id="res-course-stats"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ===== 訂單管理 ===== -->
      <div id="res-panel-orders" class="hidden">
        <div class="bg-white rounded-xl border border-slate-200 p-4 mb-4 flex flex-wrap gap-3">
          <input id="res-filter-kw" type="text" placeholder="搜尋姓名、電話、訂單號..." class="res-input flex-1 min-w-[160px] text-base">
          <select id="res-filter-status" class="res-input w-40 text-base">
            <option value="">全部狀態</option>
            <option value="PENDING">待付款</option>
            <option value="PAID">已完款</option>
            <option value="REFUND_REQUESTED">申退款</option>
            <option value="REFUNDED">已退款</option>
            <option value="CANCELLED">已取消</option>
          </select>
          <select id="res-filter-course" class="res-input w-48 text-base">
            <option value="">全部活動</option>
          </select>
        </div>
        <div class="res-card overflow-x-auto">
          <table class="res-table">
            <thead><tr>
              <th>訂單號</th><th>活動</th><th>學員</th>
              <th class="text-center">金額</th><th class="text-center">狀態</th>
              <th class="text-center">後五碼</th><th class="text-right">操作</th>
            </tr></thead>
            <tbody id="res-order-list"></tbody>
          </table>
        </div>
      </div>

      <!-- ===== 新增報名 ===== -->
      <div id="res-panel-add" class="hidden">
        <div class="max-w-2xl mx-auto space-y-4">
          <div class="res-card">
            <div class="px-6 py-4 border-b flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-[#06C755] text-white flex items-center justify-center font-bold text-base">1</div>
              <div class="font-bold text-slate-800 text-lg">選擇活動 <span class="text-red-400">*</span></div>
            </div>
            <div class="p-4">
              <select id="add-course-sel" class="res-input text-base" onchange="window.ReservationModule.onCourseChange()">
                <option value="">-- 請選擇活動 --</option>
              </select>
              <div id="add-course-info" class="hidden mt-3 p-4 bg-green-50 border border-green-200 rounded-xl text-sm text-green-800 font-medium space-y-1.5"></div>
            </div>
          </div>
          <div class="res-card">
            <div class="px-6 py-4 border-b flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-[#06C755] text-white flex items-center justify-center font-bold text-base">2</div>
              <div class="font-bold text-slate-800 text-lg">學員資料 <span class="text-red-400">*</span></div>
            </div>
            <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
              <div><label class="res-label">學員姓名 *</label><input id="add-name" class="res-input text-base" placeholder="真實姓名"></div>
              <div><label class="res-label">身分證字號 *</label><input id="add-nid" class="res-input text-base uppercase" placeholder="A123456789"></div>
              <div><label class="res-label">聯絡電話 *</label><input id="add-phone" class="res-input text-base" type="tel" placeholder="0912345678"></div>
              <div><label class="res-label">LINE userId（選填）</label><input id="add-uid" class="res-input text-base font-mono" placeholder="U開頭的LINE userId"></div>
            </div>
          </div>
          <div class="res-card">
            <div class="px-6 py-4 border-b flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-[#06C755] text-white flex items-center justify-center font-bold text-base">3</div>
              <div class="font-bold text-slate-800 text-lg">備註 / 確認金額</div>
            </div>
            <div class="p-4 space-y-3">
              <textarea id="add-note" rows="3" placeholder="特殊狀況或備注..." class="res-input text-base resize-none"></textarea>
              <div class="flex items-center justify-between bg-slate-50 rounded-xl px-5 py-4 border">
                <span class="text-base font-medium text-slate-600">應繳金額</span>
                <span id="add-amount" class="text-2xl font-bold text-[#06C755]">$0</span>
              </div>
            </div>
          </div>
          <button onclick="window.ReservationModule.submitAdd()" class="res-btn-g w-full py-4 text-lg justify-center">
            <i class="fas fa-check"></i> 確認建立報名訂單
          </button>
        </div>
      </div>

      <!-- ===== 活動管理 ===== -->
      <div id="res-panel-courses" class="hidden">
        <div class="flex justify-between items-center mb-4">
          <input id="res-course-kw" type="text" placeholder="搜尋活動..." class="res-input w-64 text-base" oninput="window.ReservationModule.renderCourses()">
          <button onclick="window.ReservationModule.openCourseModal(null)" class="res-btn-g"><i class="fas fa-plus"></i> 新增活動</button>
        </div>

        <!-- 一般活動列表 -->
        <div class="font-medium text-lg text-slate-700 mb-3 border-l-4 border-blue-500 pl-3">一般活動</div>
        <div class="res-card overflow-x-auto mb-8">
          <table class="res-table">
            <thead><tr>
              <th>活動名稱</th><th>類型 / 日期</th><th class="text-center">費用</th>
              <th class="text-center">名額</th><th class="text-center">報名狀況</th><th class="text-right">操作</th>
            </tr></thead>
            <tbody id="res-course-list-normal"></tbody>
          </table>
        </div>

        <!-- 梯次活動群組 -->
        <div class="font-medium text-lg text-slate-700 mb-3 border-l-4 border-green-500 pl-3">梯次活動 <span class="text-sm text-slate-500 font-normal ml-2">(依主題/梯次摺疊)</span></div>
        <div id="res-camp-groups"></div>
      </div>

      <!-- ===== 會員管理 ===== -->
      <div id="res-panel-members" class="hidden">
        <input id="res-member-kw" type="text" placeholder="搜尋姓名、身分證..." class="res-input w-72 text-base mb-4" oninput="window.ReservationModule.renderMembers()">
        <div class="res-card overflow-x-auto">
          <table class="res-table">
            <thead><tr>
              <th>姓名</th><th class="text-center">電話</th><th class="text-center">身分證</th>
              <th class="text-center">家人數</th><th class="text-right">操作</th>
            </tr></thead>
            <tbody id="res-member-list"></tbody>
          </table>
        </div>
      </div>

      <!-- ===== 簽到管理 ===== -->
      <div id="res-panel-attend" class="hidden">
        <div class="bg-white rounded-xl border border-slate-200 p-5 mb-5 flex flex-wrap gap-4 items-end">
          <div class="flex-1 min-w-[200px]">
            <label class="res-label">選擇活動</label>
            <select id="attend-course-sel" class="res-input text-base" onchange="window.ReservationModule.onAttendCourseChange()">
              <option value="">-- 請選擇活動 --</option>
            </select>
          </div>
          <div>
            <label class="res-label">上課日期</label>
            <input id="attend-date" type="date" class="res-input text-base" onchange="window.ReservationModule.loadAttendList()">
          </div>
          <button onclick="window.ReservationModule.saveAttendance()" class="res-btn-g py-3"><i class="fas fa-save"></i> 儲存簽到</button>
        </div>
        <div class="res-card overflow-x-auto">
          <table class="res-table">
            <thead><tr>
              <th>學員姓名</th><th class="text-center">電話</th><th class="text-center">出席狀態</th>
            </tr></thead>
            <tbody id="res-attend-list"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- 訂單編輯 Modal -->
<div id="res-order-modal" class="fixed inset-0 bg-black/60 z-[500] hidden items-center justify-center">
  <div class="bg-white w-[95%] max-w-md rounded-2xl shadow-2xl overflow-hidden">
    <div class="h-16 border-b px-6 flex justify-between items-center">
      <h3 class="font-bold text-xl">編輯訂單</h3>
      <button onclick="window.ReservationModule.closeOrderModal()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times text-2xl"></i></button>
    </div>
    <div class="p-6 space-y-4">
      <input type="hidden" id="modal-order-id">
      <div class="grid grid-cols-2 gap-4">
        <div><label class="res-label">狀態</label>
          <select id="modal-order-status" class="res-input text-base">
            <option value="PENDING">待付款</option><option value="PAID">已完款</option>
            <option value="REFUND_REQUESTED">申退款</option><option value="REFUNDED">已退款</option>
            <option value="CANCELLED">已取消</option>
          </select>
        </div>
        <div><label class="res-label">實收金額</label>
          <input id="modal-order-amount" type="number" class="res-input text-base">
        </div>
      </div>
      <div><label class="res-label">匯款後五碼</label>
        <input id="modal-order-remittance" maxlength="5" class="res-input text-center font-mono text-2xl tracking-widest">
      </div>
      <div><label class="res-label">備註</label>
        <textarea id="modal-order-note" rows="3" class="res-input text-base resize-none"></textarea>
      </div>
    </div>
    <div class="h-16 border-t px-6 flex justify-end items-center gap-4">
      <button onclick="window.ReservationModule.closeOrderModal()" class="res-btn-w py-2 px-6">取消</button>
      <button onclick="window.ReservationModule.saveOrder()" class="res-btn-g py-2 px-6">更新訂單</button>
    </div>
  </div>
</div>

<!-- 活動編輯 Modal -->
<div id="res-course-modal" class="fixed inset-0 bg-black/60 z-[500] hidden items-center justify-center">
  <div class="bg-white w-[95%] max-w-3xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
    <div class="h-16 border-b px-6 flex justify-between items-center shrink-0">
      <h3 id="res-course-modal-title" class="font-bold text-xl">新增活動</h3>
      <button onclick="window.ReservationModule.closeCourseModal()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times text-2xl"></i></button>
    </div>
    <div class="flex-1 overflow-y-auto p-6 space-y-4">
      <input type="hidden" id="cm-id">

      <!-- 類型選擇 -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="res-label">類型</label>
          <select id="cm-type" class="res-input text-base" onchange="window.ReservationModule.onCmTypeChange()">
            <option value="單日活動">單日活動</option>
            <option value="梯次活動">梯次活動</option>
            <option value="常態活動">常態活動</option>
          </select>
        </div>
        <div>
          <label class="res-label">時段類型</label>
          <select id="cm-timeslot" class="res-input text-base">
            <option>全日</option><option>上午</option><option>下午</option><option>晚間</option>
          </select>
        </div>
      </div>

      <!-- 一般活動欄位 -->
      <div id="cm-normal-fields">
        <div class="mb-4"><label class="res-label">活動名稱 *</label><input id="cm-name" class="res-input text-base" placeholder="活動名稱"></div>
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div><label class="res-label">開始日期</label><input id="cm-sdate" type="date" class="res-input text-base"></div>
          <div><label class="res-label">結束日期</label><input id="cm-edate" type="date" class="res-input text-base"></div>
          <div><label class="res-label">開始時間</label><input id="cm-stime" type="time" class="res-input text-base"></div>
          <div><label class="res-label">結束時間</label><input id="cm-etime" type="time" class="res-input text-base"></div>
          <div><label class="res-label">活動地點</label><input id="cm-location" class="res-input text-base"></div>
          <div><label class="res-label">教練/老師</label><input id="cm-instructor" class="res-input text-base"></div>
          <div><label class="res-label">原價</label><input id="cm-price" type="number" class="res-input text-base"></div>
          <div><label class="res-label">總名額</label><input id="cm-capacity" type="number" class="res-input text-base" value="20"></div>
          <div><label class="res-label">早鳥價</label><input id="cm-ebprice" type="number" class="res-input text-base"></div>
          <div><label class="res-label">早鳥截止日</label><input id="cm-ebdate" type="date" class="res-input text-base"></div>
          <div><label class="res-label">總堂數</label><input id="cm-sessions" type="number" value="1" class="res-input text-base"></div>
          <div><label class="res-label">圖片網址</label><input id="cm-image" class="res-input text-base" placeholder="https://..."></div>
        </div>
        <div><label class="res-label">活動說明</label><textarea id="cm-desc" rows="4" class="res-input text-base resize-none"></textarea></div>
      </div>

      <!-- 梯次活動專屬欄位 -->
      <div id="cm-camp-fields" class="hidden space-y-4">
        <div class="bg-green-50 border border-green-200 rounded-xl p-5">
          <label class="res-label text-green-800"><i class="fas fa-flag mr-1"></i> 活動大主題 *</label>
          <input id="cm-camp-theme" class="res-input text-base border-green-300" placeholder="如: 2026 運動島夏令營">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div><label class="res-label">開始時間</label><input id="cm-camp-stime" type="time" class="res-input text-base"></div>
          <div><label class="res-label">結束時間</label><input id="cm-camp-etime" type="time" class="res-input text-base"></div>
          <div><label class="res-label">活動地點</label><input id="cm-camp-location" class="res-input text-base"></div>
          <div><label class="res-label">教練/老師</label><input id="cm-camp-instructor" class="res-input text-base"></div>
          <div><label class="res-label">總堂數</label><input id="cm-camp-sessions" type="number" value="5" class="res-input text-base"></div>
        </div>

        <div id="cm-camp-batches"></div>

        <button type="button" onclick="window.ReservationModule.addCampBatch()" class="w-full py-4 border border-dashed border-blue-300 text-blue-600 rounded-xl font-medium hover:bg-blue-50 transition text-base">
          <i class="fas fa-plus mr-1"></i> 新增下一梯次
        </button>

        <div class="bg-yellow-50 text-yellow-700 text-sm p-4 rounded-xl border border-yellow-200">
          <i class="fas fa-info-circle mr-1"></i> 儲存後系統將自動為每個「梯次 × 項目」建立獨立活動。
        </div>
      </div>

      <!-- 梯次活動單筆編輯模式 -->
      <div id="cm-camp-edit-fields" class="hidden">
        <div class="bg-green-50 border border-green-200 rounded-xl p-5 mb-4">
          <div class="text-base font-medium text-green-800 mb-3"><i class="fas fa-flag mr-1"></i> 單筆梯次活動編輯</div>
          <div class="grid grid-cols-3 gap-4">
            <div><label class="res-label text-green-700">大主題</label><input id="cm-camp-edit-theme" class="res-input text-base border-green-300"></div>
            <div><label class="res-label text-green-700">梯次名稱</label><input id="cm-camp-edit-batch" class="res-input text-base border-green-300"></div>
            <div><label class="res-label text-green-700">活動項目</label><input id="cm-camp-edit-item" class="res-input text-base border-green-300"></div>
          </div>
          <div class="mt-3 text-sm text-slate-600 bg-white p-3 rounded-lg border border-green-100">
            預覽：<span id="cm-camp-edit-preview" class="font-medium text-slate-800"></span>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="res-label">開始日期</label><input id="cm-camp-edit-sdate" type="date" class="res-input text-base"></div>
          <div><label class="res-label">結束日期</label><input id="cm-camp-edit-edate" type="date" class="res-input text-base"></div>
          <div><label class="res-label">開始時間</label><input id="cm-camp-edit-stime" type="time" class="res-input text-base"></div>
          <div><label class="res-label">結束時間</label><input id="cm-camp-edit-etime" type="time" class="res-input text-base"></div>
          <div><label class="res-label">活動地點</label><input id="cm-camp-edit-location" class="res-input text-base"></div>
          <div><label class="res-label">教練/老師</label><input id="cm-camp-edit-instructor" class="res-input text-base"></div>
          <div><label class="res-label">原價</label><input id="cm-camp-edit-price" type="number" class="res-input text-base"></div>
          <div><label class="res-label">總名額</label><input id="cm-camp-edit-capacity" type="number" class="res-input text-base"></div>
          <div><label class="res-label">早鳥價</label><input id="cm-camp-edit-ebprice" type="number" class="res-input text-base"></div>
          <div><label class="res-label">早鳥截止日</label><input id="cm-camp-edit-ebdate" type="date" class="res-input text-base"></div>
          <div><label class="res-label">總堂數</label><input id="cm-camp-edit-sessions" type="number" value="5" class="res-input text-base"></div>
        </div>
      </div>
    </div>

    <div class="h-16 border-t px-6 flex justify-between items-center gap-4 shrink-0">
      <div id="cm-progress" class="text-base text-slate-500 font-medium hidden"><i class="fas fa-spinner fa-spin mr-2"></i> 建立中 <span id="cm-progress-text"></span></div>
      <div class="flex gap-4 ml-auto">
        <button onclick="window.ReservationModule.closeCourseModal()" class="res-btn-w py-2 px-6">取消</button>
        <button onclick="window.ReservationModule.saveCourse()" class="res-btn-g py-2 px-6" id="cm-save-btn"><i class="fas fa-save"></i> 儲存活動</button>
      </div>
    </div>
  </div>
</div>

<!-- 會員詳情 Modal -->
<div id="res-member-modal" class="fixed inset-0 bg-black/60 z-[500] hidden items-center justify-center">
  <div class="bg-white w-[95%] max-w-2xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
    <div class="h-16 border-b px-6 flex justify-between items-center shrink-0">
      <h3 class="font-bold text-xl">會員資料</h3>
      <button onclick="window.ReservationModule.closeMemberModal()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times text-2xl"></i></button>
    </div>
    <div class="flex-1 overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
      <input type="hidden" id="mm-uid">
      <div><label class="res-label">姓名</label><input id="mm-name" class="res-input text-base"></div>
      <div><label class="res-label">身分證（不可改）</label><input id="mm-nid" class="res-input text-base bg-slate-100" readonly></div>
      <div><label class="res-label">生日</label><input id="mm-birthday" type="date" class="res-input text-base"></div>
      <div><label class="res-label">性別</label><select id="mm-gender" class="res-input text-base"><option>男</option><option>女</option></select></div>
      <div><label class="res-label">電話</label><input id="mm-phone" class="res-input text-base"></div>
      <div><label class="res-label">地址</label><input id="mm-address" class="res-input text-base"></div>
      <div class="md:col-span-2"><label class="res-label">健康備註</label><textarea id="mm-health" rows="3" class="res-input text-base resize-none"></textarea></div>
      <div class="md:col-span-2">
        <div class="res-label mb-2">家人名單</div>
        <div id="mm-family" class="bg-slate-50 border rounded-xl p-4 min-h-[60px] text-base text-slate-600 space-y-2"></div>
      </div>
    </div>
    <div class="h-16 border-t px-6 flex justify-end items-center gap-4 shrink-0">
      <button onclick="window.ReservationModule.closeMemberModal()" class="res-btn-w py-2 px-6">取消</button>
      <button onclick="window.ReservationModule.saveMember()" class="res-btn-g py-2 px-6">儲存</button>
    </div>
  </div>
</div>

<script>
window.ReservationModule = (function () {
  var API = typeof WORKER_URL !== 'undefined' ? WORKER_URL : '';
  var courses = [], orders = [], members = [];
  var editingOrder = null, editingMember = null, editingCourseId = null;
  var campBatchData = [];
  var expandedBatches = {};
  var attendList = [];
  var tabs = ['dashboard','orders','add','courses','members','attend'];
  var titles = { dashboard:'營運統計', orders:'訂單管理', add:'新增報名', courses:'活動管理', members:'會員管理', attend:'簽到管理' };

  function callAPI(action, payload, userProfile) {
    var body = { action: action, payload: payload || {} };
    if (userProfile) body.userProfile = userProfile;
    return fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.status === 'success') return d.data;
        if (d.success) return d.data || d;
        throw new Error(d.message || d.msg || '操作失敗');
      });
  }

  function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(d) { if (!d) return ''; return String(d).substring(0,10); }

  function statusLabel(s) {
    return {PENDING:'待付款',PAID:'已完款',REFUND_REQUESTED:'申退款中',REFUNDED:'已退款',CANCELLED:'已取消'}[s] || s || '-';
  }
  function statusCls(s) {
    return {PENDING:'bg-yellow-100 text-yellow-800',PAID:'bg-green-100 text-green-700',
      REFUND_REQUESTED:'bg-orange-100 text-orange-700',REFUNDED:'bg-red-100 text-red-600',
      CANCELLED:'bg-slate-100 text-slate-500'}[s] || 'bg-slate-100 text-slate-500';
  }

  function parseCampName(name) {
    if (!name) return { theme:'', batch:'', item:'' };
    var parts = String(name).split(/\s*-\s*/);
    if (parts.length >= 3) {
      return { theme: parts[0], batch: parts.slice(1, parts.length-1).join('-'), item: parts[parts.length-1] };
    }
    return { theme:'其他梯次活動', batch:'', item: name };
  }

  function setTab(tab) {
    tabs.forEach(function(t) {
      var panel = document.getElementById('res-panel-' + t);
      if (panel) panel.classList.toggle('hidden', t !== tab);
      var nav = document.getElementById('res-nav-' + t);
      if (nav) nav.classList.toggle('active', t === tab);
      var mTab = document.getElementById('res-tab-' + t);
      if (mTab) {
        if (t === tab) { mTab.classList.remove('bg-slate-100','text-slate-600'); mTab.classList.add('bg-[#06C755]','text-white'); }
        else { mTab.classList.remove('bg-[#06C755]','text-white'); mTab.classList.add('bg-slate-100','text-slate-600'); }
      }
    });
    var titleEl = document.getElementById('res-page-title');
    if (titleEl) titleEl.innerText = titles[tab] || '';
    var exportBtn = document.getElementById('res-export-btn');
    if (exportBtn) exportBtn.classList.toggle('hidden', tab !== 'orders');
    if (tab === 'add') refreshCourseSelect();
    if (tab === 'orders') bindOrderFilters();
    if (tab === 'attend') refreshAttendCourseSelect();
  }

  function syncAll() {
    if (typeof toggleLoader === 'function') toggleLoader(true);
    callAPI('SI_ADMIN_GET_DATA').then(function(data) {
      courses = data.courses || [];
      orders = (data.orders || []).slice().reverse();
      members = data.users || [];
      renderDashboard();
      renderOrders();
      renderCourses();
      renderMembers();
      refreshCourseFilter();
      if (typeof toggleLoader === 'function') toggleLoader(false);
    }).catch(function(e) {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      alert('同步失敗：' + e.message);
    });
  }

  function renderDashboard() {
    var totalPaid=0, totalPending=0, validOrders=0;
    orders.forEach(function(o) {
      if (o.status==='PAID') { totalPaid += Number(o.amount)||0; validOrders++; }
      else if (o.status==='PENDING') { totalPending += Number(o.amount)||0; validOrders++; }
    });
    var cards = [
      { label:'實收金額', val:'$'+totalPaid.toLocaleString(), color:'text-[#06C755]', bg:'bg-green-50', icon:'fa-dollar-sign' },
      { label:'待收金額', val:'$'+totalPending.toLocaleString(), color:'text-amber-500', bg:'bg-amber-50', icon:'fa-hourglass-half' },
      { label:'有效訂單', val:validOrders+'筆', color:'text-blue-600', bg:'bg-blue-50', icon:'fa-file-signature' },
      { label:'活動數',   val:courses.length+'項', color:'text-purple-600', bg:'bg-purple-50', icon:'fa-calendar-check' },
      { label:'會員數',   val:members.length+'人', color:'text-rose-500', bg:'bg-rose-50', icon:'fa-users' }
    ];
    var el = document.getElementById('res-stat-cards');
    if (el) el.innerHTML = cards.map(function(c) {
      return '<div class="stat-box relative"><p class="text-sm font-medium text-slate-500 mb-1">'+c.label+'</p>'
        +'<h3 class="text-2xl font-bold '+c.color+'">'+c.val+'</h3>'
        +'<div class="absolute right-4 top-4 w-10 h-10 '+c.bg+' rounded-xl flex items-center justify-center opacity-70">'
        +'<i class="fas '+c.icon+' '+c.color+'"></i></div></div>';
    }).join('');

    var tbody = document.getElementById('res-course-stats');
    if (!tbody) return;
    tbody.innerHTML = courses.map(function(c) {
      var co = orders.filter(function(o){ return o.courseId===c.id; });
      var paid = co.filter(function(o){ return o.status==='PAID'; });
      var pending = co.filter(function(o){ return o.status==='PENDING'; });
      var paidRev = paid.reduce(function(s,o){ return s+(Number(o.amount)||0); },0);
      var pendingRev = pending.reduce(function(s,o){ return s+(Number(o.amount)||0); },0);
      return '<tr><td class="font-medium text-slate-800">'+esc(c.name)+'</td>'
        +'<td class="text-center text-slate-700">'+(paid.length+pending.length)+'</td>'
        +'<td class="text-center text-green-600 font-medium">'+paid.length+'</td>'
        +'<td class="text-center text-green-600 font-medium">$'+paidRev.toLocaleString()+'</td>'
        +'<td class="text-center text-amber-500">'+pending.length+'</td>'
        +'<td class="text-center text-amber-500">$'+pendingRev.toLocaleString()+'</td></tr>';
    }).join('') || '<tr><td colspan="6" class="text-center py-8 text-slate-400">尚無活動資料</td></tr>';
  }

  function getFilteredOrders() {
    var kw = ((document.getElementById('res-filter-kw')||{}).value||'').toLowerCase();
    var st = (document.getElementById('res-filter-status')||{}).value||'';
    var cv = (document.getElementById('res-filter-course')||{}).value||'';
    return orders.filter(function(o) {
      var ok = true;
      if (kw) ok = ok && [o.name,o.phone,o.orderId].join(' ').toLowerCase().includes(kw);
      if (st) ok = ok && o.status===st;
      if (cv) ok = ok && o.courseId===cv;
      return ok;
    });
  }

  function renderOrders() {
    var list = getFilteredOrders();
    var tbody = document.getElementById('res-order-list');
    if (!tbody) return;
    tbody.innerHTML = list.map(function(o) {
      var cancelled = o.status==='CANCELLED';
      return '<tr class="'+(cancelled?'opacity-50':'')+'">'
        +'<td class="font-mono text-sm text-slate-500">'+(o.orderId||'').slice(-8)+'</td>'
        +'<td class="font-medium '+(cancelled?'line-through':'')+' text-slate-800 max-w-[140px] truncate">'+esc(o.courseName||o.courseId)+'</td>'
        +'<td><div class="font-medium text-slate-800">'+esc(o.name)+'</div><div class="text-sm text-slate-500">'+esc(o.phone)+'</div></td>'
        +'<td class="text-center font-bold text-[#06C755]">$'+esc(o.amount)+'</td>'
        +'<td class="text-center"><span class="badge '+statusCls(o.status)+'">'+statusLabel(o.status)+'</span></td>'
        +'<td class="text-center font-mono font-medium text-blue-600">'+(o.remittance||'-')+'</td>'
        +'<td class="text-right"><button onclick="window.ReservationModule.openOrderModal(\''+esc(o.orderId)+'\')" class="res-btn-w text-sm py-1.5 px-4">編輯</button></td>'
        +'</tr>';
    }).join('') || '<tr><td colspan="7" class="text-center py-10 text-slate-400">沒有符合的訂單</td></tr>';
  }

  function bindOrderFilters() {
    ['res-filter-kw','res-filter-status','res-filter-course'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el && !el._bound) { el._bound=true; el.addEventListener('input',renderOrders); el.addEventListener('change',renderOrders); }
    });
  }

  function refreshCourseFilter() {
    var sel = document.getElementById('res-filter-course');
    if (!sel) return;
    sel.innerHTML = '<option value="">全部活動</option>' +
      courses.map(function(c){ return '<option value="'+esc(c.id)+'">'+esc(c.name)+'</option>'; }).join('');
  }

  function openOrderModal(orderId) {
    var o = orders.find(function(x){ return x.orderId===orderId; });
    if (!o) return;
    editingOrder = o;
    document.getElementById('modal-order-id').value = o.orderId;
    document.getElementById('modal-order-status').value = o.status || 'PENDING';
    document.getElementById('modal-order-amount').value = o.amount || 0;
    document.getElementById('modal-order-remittance').value = o.remittance || '';
    document.getElementById('modal-order-note').value = o.note || '';
    var m = document.getElementById('res-order-modal');
    if (m) { m.classList.remove('hidden'); m.classList.add('flex'); }
  }

  function closeOrderModal() {
    var m = document.getElementById('res-order-modal');
    if (m) { m.classList.add('hidden'); m.classList.remove('flex'); }
  }

  function saveOrder() {
    if (!editingOrder) return;
    if (typeof toggleLoader === 'function') toggleLoader(true);
    callAPI('SI_ADMIN_UPDATE_ORDER', { orderData: {
      orderId: editingOrder.orderId,
      status: document.getElementById('modal-order-status').value,
      amount: document.getElementById('modal-order-amount').value,
      remittance: document.getElementById('modal-order-remittance').value,
      note: document.getElementById('modal-order-note').value,
      extraData: editingOrder.extraData || {}
    }}).then(function() {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      if (typeof showToast === 'function') showToast('訂單已更新');
      closeOrderModal(); syncAll();
    }).catch(function(e) {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      alert('更新失敗：' + e.message);
    });
  }

  function getPaidCount(courseId) { return orders.filter(function(o){ return o.courseId===courseId && o.status==='PAID'; }).length; }
  function getPendingCount(courseId) { return orders.filter(function(o){ return o.courseId===courseId && o.status==='PENDING'; }).length; }

  function renderCourses() {
    var kw = ((document.getElementById('res-course-kw')||{}).value||'').toLowerCase();
    var list = courses.filter(function(c){ return !kw || c.name.toLowerCase().includes(kw); });

    var normalList = list.filter(function(c){ return c.type !== '梯次活動' || parseCampName(c.name).theme === '其他梯次活動'; });
    var normalTbody = document.getElementById('res-course-list-normal');
    if (normalTbody) {
      normalTbody.innerHTML = normalList.map(function(c) {
        var paid = getPaidCount(c.id), pending = getPendingCount(c.id);
        return '<tr>'
          +'<td><div class="font-medium text-slate-800">'+esc(c.name)+'</div><span class="text-sm font-mono text-slate-500">'+esc(c.id)+'</span></td>'
          +'<td><span class="badge bg-blue-50 text-blue-700">'+esc(c.type)+'</span><div class="text-sm text-slate-500 mt-1.5">'+esc(c.startDate)+' ~ '+esc(c.endDate)+'</div></td>'
          +'<td class="text-center font-bold text-[#06C755]">$'+esc(c.price)+'</td>'
          +'<td class="text-center text-slate-600">'+esc(c.enrolled)+' / '+esc(c.capacity)+'</td>'
          +'<td class="text-center text-sm"><span class="text-green-600 font-medium">付:'+paid+'</span> <span class="text-amber-500 font-medium ml-1">待:'+pending+'</span></td>'
          +'<td class="text-right space-x-2">'
          +'<button onclick="window.ReservationModule.goAttend(\''+esc(c.id)+'\')" class="text-green-600 hover:text-green-700 text-sm font-medium">簽到</button>'
          +'<button onclick="window.ReservationModule.openCourseModal(\''+esc(c.id)+'\')" class="res-btn-w text-sm py-1.5 px-3">編輯</button>'
          +'</td></tr>';
      }).join('') || '<tr><td colspan="6" class="text-center py-8 text-slate-400">尚無一般活動資料</td></tr>';
    }

    var campList = list.filter(function(c){ return c.type === '梯次活動' && parseCampName(c.name).theme !== '其他梯次活動'; });
    var groups = {};
    campList.forEach(function(c) {
      var p = parseCampName(c.name);
      if (!groups[p.theme]) groups[p.theme] = {};
      if (!groups[p.theme][p.batch]) groups[p.theme][p.batch] = [];
      groups[p.theme][p.batch].push({ course: c, itemName: p.item });
    });

    var campEl = document.getElementById('res-camp-groups');
    if (!campEl) return;
    if (!Object.keys(groups).length) {
      campEl.innerHTML = '<div class="text-center py-10 text-slate-400 bg-white rounded-xl border border-slate-100 text-base font-medium">尚無梯次活動資料</div>';
      return;
    }
    var html = '';
    Object.keys(groups).forEach(function(theme) {
      html += '<div class="res-card mb-5 border border-green-200">'
        +'<div class="bg-green-50 px-6 py-4 border-b border-green-200">'
        +'<span class="font-bold text-green-800 text-lg"><i class="fas fa-flag mr-2 opacity-70"></i>'+esc(theme)+'</span></div>'
        +'<div class="p-4 space-y-3">';
      Object.keys(groups[theme]).forEach(function(batch) {
        var bkey = theme + '_' + batch;
        var items = groups[theme][batch];
        var isOpen = !!expandedBatches[bkey];
        html += '<div class="border border-gray-200 rounded-xl overflow-hidden">'
          +'<button onclick="window.ReservationModule.toggleBatch(\''+esc(bkey)+'\')" class="w-full text-left px-5 py-4 bg-gray-50 hover:bg-green-50 flex justify-between items-center font-medium text-base transition">'
          +'<span><i class="far fa-calendar-alt mr-2 text-blue-500"></i>'+esc(batch)+' <span class="text-sm text-slate-500 font-normal ml-2">'+items.length+' 項目</span></span>'
          +'<i class="fas '+(isOpen?'fa-chevron-up text-green-600':'fa-chevron-down text-gray-400')+'"></i>'
          +'</button>';
        if (isOpen) {
          html += '<div class="overflow-x-auto"><table class="res-table"><thead><tr>'
            +'<th>活動項目</th><th class="text-center">費用</th><th class="text-center">名額</th>'
            +'<th class="text-center">繳費狀況</th><th class="text-right">操作</th>'
            +'</tr></thead><tbody>';
          items.forEach(function(item) {
            var c = item.course;
            var paid = getPaidCount(c.id), pending = getPendingCount(c.id);
            html += '<tr>'
              +'<td><div class="font-medium text-slate-800">'+esc(item.itemName)+'</div><span class="text-sm font-mono text-slate-500">'+esc(c.id)+'</span></td>'
              +'<td class="text-center font-bold text-[#06C755]">$'+esc(c.price)+'</td>'
              +'<td class="text-center text-slate-600">'+esc(c.enrolled)+' / '+esc(c.capacity)+'</td>'
              +'<td class="text-center text-sm"><span class="text-green-600 font-medium">付:'+paid+'</span> <span class="text-amber-500 font-medium ml-1">待:'+pending+'</span></td>'
              +'<td class="text-right space-x-3">'
              +'<button onclick="window.ReservationModule.goAttend(\''+esc(c.id)+'\')" class="text-green-600 hover:underline text-sm font-medium">簽到</button>'
              +'<button onclick="window.ReservationModule.openCourseModal(\''+esc(c.id)+'\')" class="res-btn-w text-sm py-1.5 px-3">編輯</button>'
              +'</td></tr>';
          });
          html += '</tbody></table></div>';
        }
        html += '</div>';
      });
      html += '</div></div>';
    });
    campEl.innerHTML = html;
  }

  function toggleBatch(key) {
    expandedBatches[key] = !expandedBatches[key];
    renderCourses();
  }

  function onCmTypeChange() {
    var type = document.getElementById('cm-type').value;
    var isEditing = !!editingCourseId;
    document.getElementById('cm-normal-fields').classList.toggle('hidden', type === '梯次活動');
    document.getElementById('cm-camp-fields').classList.toggle('hidden', type !== '梯次活動' || isEditing);
    document.getElementById('cm-camp-edit-fields').classList.toggle('hidden', type !== '梯次活動' || !isEditing);
  }

  function renderCampBatches() {
    var container = document.getElementById('cm-camp-batches');
    if (!container) return;
    var html = '';
    campBatchData.forEach(function(b, bIdx) {
      html += '<div class="camp-batch-block">'
        +(campBatchData.length > 1 ? '<button type="button" onclick="window.ReservationModule.removeCampBatch('+bIdx+')" style="position:absolute;top:12px;right:16px;color:#ef4444;background:none;border:none;cursor:pointer;font-size:16px;"><i class="fas fa-trash"></i></button>' : '')

  function saveCourse() {
    var type = document.getElementById('cm-type').value;
    var isEditing = !!editingCourseId;

    if (type === '梯次活動' && isEditing) {
      var theme = document.getElementById('cm-camp-edit-theme').value.trim();
      var batch = document.getElementById('cm-camp-edit-batch').value.trim();
      var item  = document.getElementById('cm-camp-edit-item').value.trim();
      if (!theme || !batch || !item) { alert('梯次活動的「大主題」、「梯次名稱」、「活動項目」皆為必填！'); return; }
      var payload = {
        id: editingCourseId,
        name: theme + ' - ' + batch + ' - ' + item,
        type: '梯次活動',
        timeSlotType: document.getElementById('cm-timeslot').value,
        startDate: document.getElementById('cm-camp-edit-sdate').value,
        endDate: document.getElementById('cm-camp-edit-edate').value,
        startTime: document.getElementById('cm-camp-edit-stime').value,
        endTime: document.getElementById('cm-camp-edit-etime').value,
        location: document.getElementById('cm-camp-edit-location').value,
        instructor: document.getElementById('cm-camp-edit-instructor').value,
        price: document.getElementById('cm-camp-edit-price').value,
        capacity: document.getElementById('cm-camp-edit-capacity').value,
        earlyBirdPrice: document.getElementById('cm-camp-edit-ebprice').value,
        earlyBirdDate: document.getElementById('cm-camp-edit-ebdate').value,
        totalSessions: document.getElementById('cm-camp-edit-sessions').value,
        equipmentJson: '[]'
      };
      if (typeof toggleLoader === 'function') toggleLoader(true);
      callAPI('SI_ADMIN_UPDATE_COURSE', payload).then(function() {
        if (typeof toggleLoader === 'function') toggleLoader(false);
        if (typeof showToast === 'function') showToast('活動已更新');
        closeCourseModal(); syncAll();
      }).catch(function(e) { if (typeof toggleLoader === 'function') toggleLoader(false); alert('失敗：' + e.message); });
      return;
    }

    if (type === '梯次活動' && !isEditing) {
      var campTheme = document.getElementById('cm-camp-theme').value.trim();
      if (!campTheme) { alert('請填寫活動大主題'); return; }
      for (var bi=0; bi<campBatchData.length; bi++) {
        var b = campBatchData[bi];
        if (!b.name || !b.startDate || !b.endDate) { alert('第'+(bi+1)+'梯次資訊不完整'); return; }
        for (var ii=0; ii<b.items.length; ii++) {
          var it = b.items[ii];
          if (!it.name || !it.price || !it.capacity) { alert('第'+(bi+1)+'梯次第'+(ii+1)+'項目資訊不完整'); return; }
        }
      }
      var total = campBatchData.reduce(function(s,b){ return s+b.items.length; }, 0);
      if (!confirm('即將建立 '+total+' 項梯次活動，確定嗎？')) return;

      var timeslot = document.getElementById('cm-timeslot').value;
      var campStime = document.getElementById('cm-camp-stime').value;
      var campEtime = document.getElementById('cm-camp-etime').value;
      var campLoc   = document.getElementById('cm-camp-location').value;
      var campInstr = document.getElementById('cm-camp-instructor').value;
      var campSess  = document.getElementById('cm-camp-sessions').value;

      var prog = document.getElementById('cm-progress');
      var progText = document.getElementById('cm-progress-text');
      var saveBtn = document.getElementById('cm-save-btn');
      if (prog) prog.classList.remove('hidden');
      if (saveBtn) saveBtn.disabled = true;
      if (typeof toggleLoader === 'function') toggleLoader(true);

      var current = 0;
      var promises = [];
      campBatchData.forEach(function(b) {
        b.items.forEach(function(item) {
          promises.push(function() {
            var newId = 'CAMP-' + Date.now().toString().slice(-4) + Math.floor(Math.random()*10000);
            var payload = {
              id: newId,
              name: campTheme + ' - ' + b.name.trim() + ' - ' + item.name.trim(),
              type: '梯次活動',
              timeSlotType: timeslot,
              startDate: b.startDate, endDate: b.endDate,
              startTime: campStime, endTime: campEtime,
              location: campLoc, instructor: campInstr,
              price: item.price, capacity: item.capacity,
              totalSessions: campSess,
              earlyBirdPrice: 0, earlyBirdDate: '', equipmentJson: '[]'
            };
            return callAPI('SI_ADMIN_ADD_COURSE', payload).then(function() {
              current++;
              if (progText) progText.innerText = '(' + current + '/' + total + ')';
            });
          });
        });
      });

      promises.reduce(function(chain, fn) { return chain.then(fn); }, Promise.resolve())
        .then(function() {
          if (typeof toggleLoader === 'function') toggleLoader(false);
          if (typeof showToast === 'function') showToast('全部 '+total+' 項梯次活動建立成功！');
          if (prog) prog.classList.add('hidden');
          if (saveBtn) saveBtn.disabled = false;
          closeCourseModal(); syncAll();
        }).catch(function(e) {
          if (typeof toggleLoader === 'function') toggleLoader(false);
          if (prog) prog.classList.add('hidden');
          if (saveBtn) saveBtn.disabled = false;
          alert('建立過程中發生錯誤：' + e.message);
        });
      return;
    }

    var name = document.getElementById('cm-name').value.trim();
    if (!name) { alert('請填寫活動名稱'); return; }
    var payload = {
      id: editingCourseId || undefined,
      name: name, type: type,
      timeSlotType: document.getElementById('cm-timeslot').value,
      startDate: document.getElementById('cm-sdate').value,
      endDate: document.getElementById('cm-edate').value,
      startTime: document.getElementById('cm-stime').value,
      endTime: document.getElementById('cm-etime').value,
      location: document.getElementById('cm-location').value,
      instructor: document.getElementById('cm-instructor').value,
      price: document.getElementById('cm-price').value,
      capacity: document.getElementById('cm-capacity').value,
      earlyBirdPrice: document.getElementById('cm-ebprice').value,
      earlyBirdDate: document.getElementById('cm-ebdate').value,
      totalSessions: document.getElementById('cm-sessions').value,
      image: document.getElementById('cm-image').value,
      description: document.getElementById('cm-desc').value,
      equipmentJson: '[]'
    };
    if (!editingCourseId) {
      payload.id = 'C' + Date.now().toString().slice(-5) + Math.floor(Math.random()*1000);
    }
    if (typeof toggleLoader === 'function') toggleLoader(true);
    callAPI(editingCourseId ? 'SI_ADMIN_UPDATE_COURSE' : 'SI_ADMIN_ADD_COURSE', payload).then(function() {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      if (typeof showToast === 'function') showToast('活動已儲存');
      closeCourseModal(); syncAll();
    }).catch(function(e) { if (typeof toggleLoader === 'function') toggleLoader(false); alert('儲存失敗：' + e.message); });
  }

      courses.map(function(c) {

  function onCourseChange() {
    var sel = document.getElementById('add-course-sel');
    var info = document.getElementById('add-course-info');
    var amtEl = document.getElementById('add-amount');
    if (!sel||!info) return;
    var c = courses.find(function(x){ return x.id===sel.value; });
    if (!c) { info.classList.add('hidden'); if(amtEl) amtEl.innerText='$0'; return; }
    var price = Number(c.price)||0;
    if (c.earlyBirdPrice && c.earlyBirdDate) {
      var eb = new Date(c.earlyBirdDate); eb.setHours(23,59,59,999);
      if (new Date()<=eb) price = Number(c.earlyBirdPrice)||price;
    }
    info.innerHTML = '<div>📅 '+esc(c.startDate)+' ~ '+esc(c.endDate)+'</div>'
      +(c.location?'<div>📍 '+esc(c.location)+'</div>':'')
      +'<div>👤 剩餘名額：'+Math.max(0,(c.capacity||0)-(c.enrolled||0))+' 人</div>';
    info.classList.remove('hidden');
    if (amtEl) amtEl.innerText = '$' + price;
    window._addPrice = price;

  function refreshAttendCourseSelect() {
    var sel = document.getElementById('attend-course-sel');
    if (!sel) return;
    sel.innerHTML = '<option value="">-- 請選擇活動 --</option>' +
      courses.map(function(c){ return '<option value="'+esc(c.id)+'">'+esc(c.name)+'</option>'; }).join('');
  }
  function onAttendCourseChange() {
    var sel = document.getElementById('attend-course-sel');
    var c = courses.find(function(x){ return x.id===(sel?sel.value:''); });
    var today = new Date().toISOString().split('T')[0];
    var dateEl = document.getElementById('attend-date');
    if (dateEl) {
      if (c && c.startDate && today < c.startDate) dateEl.value = fmtDate(c.startDate);
      else if (c && c.endDate && today > c.endDate) dateEl.value = fmtDate(c.endDate);
      else dateEl.value = today;
    }
    loadAttendList();
  }
  function loadAttendList() {
    var courseId = (document.getElementById('attend-course-sel')||{}).value||'';
    var date = (document.getElementById('attend-date')||{}).value||'';
    var tbody = document.getElementById('res-attend-list');
    if (!tbody) return;
    if (!courseId) { tbody.innerHTML = '<tr><td colspan="3" class="text-center py-8 text-slate-400">請先選擇活動</td></tr>'; return; }
    var courseOrders = orders.filter(function(o){ return o.courseId===courseId && !['CANCELLED','REFUNDED'].includes(o.status); });
    attendList = courseOrders.map(function(o) {
      var att = (o.extraData && o.extraData.attendance) ? o.extraData.attendance : {};
      return { orderId: o.orderId, name: o.name, phone: o.phone, status: att[date] || 'NONE' };
    });
    renderAttendList();
  }
  function renderAttendList() {
    var tbody = document.getElementById('res-attend-list');
    if (!tbody) return;
    if (!attendList.length) { tbody.innerHTML = '<tr><td colspan="3" class="text-center py-10 text-slate-400">此活動尚無有效報名學員</td></tr>'; return; }
    tbody.innerHTML = attendList.map(function(p, idx) {
      var btnBase = 'padding:6px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid;transition:.15s;';
      var present = p.status==='PRESENT' ? 'background:#22c55e;color:#fff;border-color:#22c55e;' : 'background:#fff;color:#374151;border-color:#d1d5db;';
      var absent  = p.status==='ABSENT'  ? 'background:#ef4444;color:#fff;border-color:#ef4444;' : 'background:#fff;color:#374151;border-color:#d1d5db;';
      var leave   = p.status==='LEAVE'   ? 'background:#eab308;color:#fff;border-color:#eab308;' : 'background:#fff;color:#374151;border-color:#d1d5db;';
      return '<tr>'
        +'<td class="font-medium text-slate-800">'+esc(p.name)+'</td>'
        +'<td class="text-center text-slate-600">'+esc(p.phone)+'</td>'
        +'<td class="text-center" style="white-space:nowrap;">'
        +'<button style="'+btnBase+present+'" onclick="window.ReservationModule.setAttendStatus('+idx+',\'PRESENT\')">出席</button> '
        +'<button style="'+btnBase+absent+'"  onclick="window.ReservationModule.setAttendStatus('+idx+',\'ABSENT\')">缺席</button> '
        +'<button style="'+btnBase+leave+'"   onclick="window.ReservationModule.setAttendStatus('+idx+',\'LEAVE\')">請假</button>'
        +(p.status!=='NONE' ? ' <button style="'+btnBase+'background:#fff;color:#94a3b8;border-color:#e2e8f0;" onclick="window.ReservationModule.setAttendStatus('+idx+',\'NONE\')">清除</button>' : '')
        +'</td></tr>';
    }).join('');
  }
  function setAttendStatus(idx, status) {
    attendList[idx].status = status;
    renderAttendList();
  }
  function saveAttendance() {
    var courseId = (document.getElementById('attend-course-sel')||{}).value||'';
    var date = (document.getElementById('attend-date')||{}).value||'';
    if (!courseId || !date) { alert('請先選擇活動和日期'); return; }
    if (!attendList.length) { alert('沒有學員資料可以儲存'); return; }
    if (typeof toggleLoader === 'function') toggleLoader(true);
    callAPI('SI_ADMIN_UPDATE_ATTENDANCE', {
      courseId: courseId, date: date,
      attendanceData: attendList.map(function(a){ return { orderId: a.orderId, status: a.status }; })
    }).then(function() {
      if (typeof toggleLoader === 'function') toggleLoader(false);
      if (typeof showToast === 'function') showToast('簽到資料已儲存！');
      syncAll();
    }).catch(function(e) { if (typeof toggleLoader === 'function') toggleLoader(false); alert('儲存失敗：' + e.message); });
  }
  function goAttend(courseId) {
    setTab('attend');
    setTimeout(function() {
      var sel = document.getElementById('attend-course-sel');
      if (sel) { sel.value = courseId; onAttendCourseChange(); }
    }, 100);
  }

  // ── CSV 匯出 ──
  function exportCsv() {
    var list = getFilteredOrders();
    if (!list.length) { alert('沒有可匯出的資料'); return; }
    var rows = [['訂單號','活動','學員','電話','金額','狀態','後五碼','建立時間']];
    list.forEach(function(o) {
      rows.push([o.orderId||'',o.courseName||'',o.name||'',o.phone||'',o.amount||0,statusLabel(o.status),o.remittance||'',o.createdAt||'']);
    });
    var csv = '\uFEFF'+rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
    a.download = 'orders_'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  function init() {
    setTab('dashboard');
    syncAll();
  }

  return {
    init:init, setTab:setTab, syncAll:syncAll,
    renderOrders:renderOrders, renderCourses:renderCourses, renderMembers:renderMembers,
    openOrderModal:openOrderModal, closeOrderModal:closeOrderModal, saveOrder:saveOrder,
    openCourseModal:openCourseModal, closeCourseModal:closeCourseModal, saveCourse:saveCourse,
    onCmTypeChange:onCmTypeChange, updateCampEditPreview:updateCampEditPreview,
    addCampBatch:addCampBatch, removeCampBatch:removeCampBatch,
    addCampItem:addCampItem, removeItem:removeItem, updateBatch:updateBatch, updateItem:updateItem,
    toggleBatch:toggleBatch,
    openMemberModal:openMemberModal, closeMemberModal:closeMemberModal, saveMember:saveMember,
    onCourseChange:onCourseChange, submitAdd:submitAdd, exportCsv:exportCsv,
    refreshAttendCourseSelect:refreshAttendCourseSelect, onAttendCourseChange:onAttendCourseChange,
    loadAttendList:loadAttendList, setAttendStatus:setAttendStatus, saveAttendance:saveAttendance,
    goAttend:goAttend
  };
})();

setTimeout(function() {
  if (window.ReservationModule) window.ReservationModule.init();
}, 150);
</script>
</div>
