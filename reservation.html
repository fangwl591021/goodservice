<div id="reservation-workspace" class="workspace-hidden flex flex-col h-full bg-slate-50 w-full overflow-y-auto">
    <div class="p-8">
        
        <!-- 標題與操作列 -->
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-blue-100 text-blue-600 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-black text-slate-800 tracking-wider">預約報名後台管理</h2>
            </div>
            <div class="flex gap-3">
                <button onclick="window.ReservationModule.loadReservations()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 font-bold py-2.5 px-4 rounded-lg shadow-sm transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    重新整理
                </button>
                <a href="booking.html" target="_blank" class="bg-[#54C061] hover:bg-green-600 text-white font-bold py-2.5 px-5 rounded-lg shadow-md transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                    </svg>
                    開啟前台預約頁面
                </a>
            </div>
        </div>

        <!-- 數據統計區塊 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">總預約數</div>
                    <div class="text-3xl font-black text-slate-700" id="res-stat-total">0</div>
                </div>
                <div class="bg-slate-50 p-3 rounded-full text-slate-400">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <div class="text-xs font-bold text-amber-500 uppercase tracking-wider mb-1">待確認</div>
                    <div class="text-3xl font-black text-amber-600" id="res-stat-pending">0</div>
                </div>
                <div class="bg-amber-50 p-3 rounded-full text-amber-400">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <div class="text-xs font-bold text-green-500 uppercase tracking-wider mb-1">已確認 / 已完成</div>
                    <div class="text-3xl font-black text-green-600" id="res-stat-confirmed">0</div>
                </div>
                <div class="bg-green-50 p-3 rounded-full text-green-400">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- 訂單清單表格 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 text-slate-500 font-black tracking-widest border-b border-slate-200">
                    <tr>
                        <th class="p-4">預約編號 / 建立時間</th>
                        <th class="p-4">預約日期與時段</th>
                        <th class="p-4">姓名 / 聯絡方式</th>
                        <th class="p-4">服務項目與備註</th>
                        <th class="p-4">訂單狀態</th>
                        <th class="p-4 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="res-admin-list" class="divide-y divide-slate-100">
                    <!-- 動態載入 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        window.ReservationModule = {
            list: [],

            init: function() {
                this.loadReservations();
            },

            loadReservations: function() {
                var tbody = document.getElementById('res-admin-list');
                tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-400 font-bold animate-pulse">連線讀取資料中...</td></tr>';

                if (typeof fetchApi === 'function') {
                    fetchApi('getReservations')
                    .then((res) => {
                        if (res.success) {
                            this.list = res.data || [];
                            this.render();
                        } else {
                            tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-red-400">載入失敗: ' + (res.msg || '未知錯誤') + '</td></tr>';
                        }
                    })
                    .catch(() => {
                        tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-red-400">網路錯誤，請稍後再試。</td></tr>';
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-red-400">fetchApi 尚未載入</td></tr>';
                }
            },

            render: function() {
                var tbody = document.getElementById('res-admin-list');
                tbody.innerHTML = '';

                var pending = 0;
                var confirmed = 0;

                if (this.list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-400 font-bold">目前沒有任何預約紀錄</td></tr>';
                    document.getElementById('res-stat-total').innerText = '0';
                    document.getElementById('res-stat-pending').innerText = '0';
                    document.getElementById('res-stat-confirmed').innerText = '0';
                    return;
                }

                this.list.forEach((item) => {
                    if (item.status === '待確認') pending++;
                    if (item.status === '已確認' || item.status === '已完成') confirmed++;

                    var statusColors = {
                        '待確認': 'bg-amber-50 text-amber-700 border-amber-200 focus:border-amber-400',
                        '已確認': 'bg-green-50 text-green-700 border-green-200 focus:border-green-400',
                        '已完成': 'bg-blue-50 text-blue-700 border-blue-200 focus:border-blue-400',
                        '已取消': 'bg-slate-50 text-slate-500 border-slate-200 focus:border-slate-400'
                    };

                    var colorClass = statusColors[item.status] || 'bg-slate-50 text-slate-700 border-slate-200';

                    var tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition";

                    tr.innerHTML = `
                        <td class="p-4 align-top pt-4">
                            <div class="font-mono text-[11px] text-slate-400 mb-2">${item.reservationId || '-'}</div>
                            <div class="text-[11px] text-slate-500">${item.createdAt || '-'}</div>
                            ${item.source ? `<div class="mt-2 inline-block bg-slate-100 text-slate-500 text-[10px] font-bold px-2 py-1 rounded">${item.source}</div>` : ''}
                        </td>
                        <td class="p-4 align-top pt-4">
                            <div class="font-black text-slate-700 text-base">${item.date || '-'}</div>
                            <div class="text-xs font-bold text-[#54C061] mt-1">${item.time || '-'}</div>
                        </td>
                        <td class="p-4 align-top pt-4">
                            <div class="font-bold text-slate-800 flex items-center gap-2">
                                ${item.name || '-'}
                                ${item.lineId ? `<span class="bg-[#06C755] text-white text-[9px] px-1.5 py-0.5 rounded shadow-sm" title="LINE ID: ${item.lineId}">LINE</span>` : ''}
                            </div>
                            <div class="text-xs text-sky-600 font-mono mt-1">${item.phone || '-'}</div>
                            ${item.lineId ? `<div class="text-[10px] text-slate-400 mt-1">LINE ID: ${item.lineId}</div>` : ''}
                        </td>
                        <td class="p-4 align-top pt-4">
                            <div class="font-bold text-slate-700 bg-slate-100 inline-block px-2 py-1 rounded text-xs">${item.service || '-'}</div>
                            ${item.memo ? `<div class="text-xs text-slate-500 mt-2 p-2 bg-white border border-slate-100 rounded-lg max-w-xs break-words">${item.memo}</div>` : '<div class="text-xs text-slate-300 mt-2 italic">無備註</div>'}
                        </td>
                        <td class="p-4 align-top pt-4">
                            <select onchange="window.ReservationModule.updateStatus('${item.reservationId}', this.value)" class="text-xs font-black px-3 py-1.5 rounded-lg border-2 outline-none cursor-pointer transition ${colorClass}">
                                <option value="待確認" ${item.status==='待確認'?'selected':''}>待確認</option>
                                <option value="已確認" ${item.status==='已確認'?'selected':''}>已確認</option>
                                <option value="已完成" ${item.status==='已完成'?'selected':''}>已完成</option>
                                <option value="已取消" ${item.status==='已取消'?'selected':''}>已取消</option>
                            </select>
                        </td>
                        <td class="p-4 text-right align-top pt-4">
                            <button onclick="window.ReservationModule.deleteRes('${item.reservationId}')" class="px-3 py-1.5 bg-white border border-rose-200 text-rose-500 hover:bg-rose-500 hover:text-white rounded-lg font-bold transition text-xs shadow-sm">刪除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.getElementById('res-stat-total').innerText = this.list.length;
                document.getElementById('res-stat-pending').innerText = pending;
                document.getElementById('res-stat-confirmed').innerText = confirmed;
            },

            updateStatus: function(reservationId, newStatus) {
                if (!reservationId) {
                    alert('缺少 reservationId');
                    return;
                }

                toggleLoader(true);
                fetchApi('updateReservationStatus', {
                    reservationId: reservationId,
                    status: newStatus
                })
                .then((res) => {
                    toggleLoader(false);
                    if (res.success) {
                        showToast('狀態已更新');
                        this.loadReservations();
                    } else {
                        alert(res.msg || '更新失敗');
                    }
                })
                .catch(() => {
                    toggleLoader(false);
                    alert('網路錯誤');
                });
            },

            deleteRes: function(reservationId) {
                if (!reservationId) {
                    alert('缺少 reservationId');
                    return;
                }

                if (!confirm('⚠️ 警告：確定要刪除這筆預約嗎？此操作無法還原。')) return;

                toggleLoader(true);
                fetchApi('deleteReservation', {
                    reservationId: reservationId
                })
                .then((res) => {
                    toggleLoader(false);
                    if (res.success) {
                        showToast('預約已刪除');
                        this.loadReservations();
                    } else {
                        alert(res.msg || '刪除失敗');
                    }
                })
                .catch(() => {
                    toggleLoader(false);
                    alert('網路錯誤');
                });
            }
        };
    </script>
</div>
