<div id="admin-workspace" class="workspace-hidden flex flex-col h-full bg-slate-50 w-full overflow-y-auto">
    <div class="p-8">
        <!-- 標題與新增按鈕 -->
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-green-100 text-green-600 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </div>
                <h2 class="text-2xl font-black text-slate-800 tracking-wider">帳號管理與權限系統</h2>
            </div>
            <button onclick="window.AdminModule.showUserModal()" class="bg-[#2B3245] hover:bg-slate-800 text-white font-bold py-2.5 px-5 rounded-lg shadow-md transition flex items-center gap-2">
                <span>＋ 新增用戶</span>
            </button>
        </div>

        <!-- 使用者列表表格 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 text-slate-500 font-black tracking-widest border-b border-slate-200">
                    <tr>
                        <th class="p-4">公司</th>
                        <th class="p-4">姓名</th>
                        <th class="p-4">帳號</th>
                        <th class="p-4">狀態</th>
                        <th class="p-4 text-center">權限</th>
                        <th class="p-4 text-center">RM配額</th>
                        <th class="p-4 text-center">FLEX配額</th>
                        <th class="p-4">到期日</th>
                        <th class="p-4 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="admin-user-list" class="divide-y divide-slate-100">
                    <!-- 動態載入的資料將會放在這裡 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 新增/編輯用戶彈出視窗 (Modal) -->
    <div id="admin-user-modal" class="fixed inset-0 z-[800] bg-slate-900/50 hidden flex items-center justify-center">
        <div class="bg-white w-[500px] rounded-xl shadow-2xl flex flex-col">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-black text-lg text-slate-800" id="admin-modal-title">新增/編輯用戶</h3>
                <button onclick="window.AdminModule.closeUserModal()" class="text-slate-400 hover:text-red-500 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-4 flex-1 overflow-y-auto no-scrollbar">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">公司名稱</label><input type="text" id="adm-company" class="w-full border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-[#54C061] outline-none"></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">聯絡人姓名</label><input type="text" id="adm-name" class="w-full border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-[#54C061] outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">登入帳號 (不可重複)</label><input type="text" id="adm-account" class="w-full border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-[#54C061] outline-none"></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">登入密碼</label><input type="text" id="adm-password" class="w-full border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-[#54C061] outline-none"></div>
                </div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">聯絡電話</label><input type="text" id="adm-phone" class="w-full border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-[#54C061] outline-none"></div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">狀態</label>
                        <select id="adm-status" class="w-full border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-[#54C061] outline-none">
                            <option value="ACTIVE">ACTIVE (啟用)</option>
                            <option value="SUSPEND">SUSPEND (停權)</option>
                        </select>
                    </div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">到期日</label><input type="date" id="adm-expire" class="w-full border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-[#54C061] outline-none"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">RM 配額 (總數)</label><input type="number" id="adm-rmQuota" class="w-full border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-[#54C061] outline-none" value="1"></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">FLEX 配額 (總數)</label><input type="number" id="adm-flexQuota" class="w-full border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-[#54C061] outline-none" value="3"></div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2">模組權限設定 (輸入數字組合，如 12345)</label>
                    <input type="text" id="adm-perms" class="w-full border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-[#54C061] outline-none" value="1234">
                    <p class="text-[10px] text-slate-400 mt-1">1:圖文選單, 2:自由版(Flex), 3:行事曆, 4:網址擷取, 5:帳號管理(Admin)</p>
                </div>
            </div>
            <div class="p-5 border-t border-slate-100 flex justify-end gap-3 bg-slate-50 rounded-b-xl">
                <button onclick="window.AdminModule.closeUserModal()" class="px-5 py-2 font-bold text-slate-500 hover:bg-slate-200 rounded-lg transition text-sm">取消</button>
                <button onclick="window.AdminModule.saveUser()" class="px-5 py-2 font-bold text-white bg-[#54C061] hover:bg-green-600 rounded-lg transition text-sm shadow-md">儲存設定</button>
            </div>
        </div>
    </div>

    <!-- 核心 JS 模組控制 -->
    <script>
        window.AdminModule = {
            users: [],
            loadUsers: function() {
                var tbody = document.getElementById('admin-user-list');
                tbody.innerHTML = '<tr><td colspan="9" class="p-8 text-center text-slate-400 font-bold animate-pulse">載入中...</td></tr>';
                
                // 【核心修改】改用 fetchApi 取代原有的 google.script.run
                fetchApi('getAllUsers')
                .then(function(res) {
                    if (res.success) {
                        window.AdminModule.users = res.data;
                        window.AdminModule.renderUsers(res.data);
                    } else {
                        tbody.innerHTML = '<tr><td colspan="9" class="p-8 text-center text-red-400">載入失敗: ' + res.msg + '</td></tr>';
                    }
                })
                .catch(function(err){
                    tbody.innerHTML = '<tr><td colspan="9" class="p-8 text-center text-red-400">網路連線錯誤，請稍後再試。</td></tr>';
                });
            },
            renderUsers: function(data) {
                var tbody = document.getElementById('admin-user-list');
                tbody.innerHTML = '';
                data.forEach(function(u, idx) {
                    var statusTag = u.status.toUpperCase() === 'ACTIVE' 
                        ? '<span class="px-2 py-1 bg-green-100 text-green-700 text-[10px] font-black rounded">ACTIVE</span>'
                        : '<span class="px-2 py-1 bg-red-100 text-red-700 text-[10px] font-black rounded">SUSPEND</span>';
                        
                    var tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition";
                    tr.innerHTML = `
                        <td class="p-4 font-bold text-slate-700">${u.company}</td>
                        <td class="p-4 text-slate-600">${u.name}</td>
                        <td class="p-4 font-bold text-slate-800">${u.account}</td>
                        <td class="p-4">${statusTag}</td>
                        <td class="p-4 text-center"><span class="px-2 py-1 border border-slate-200 text-slate-500 font-mono text-[10px] rounded">${u.permissions}</span></td>
                        <td class="p-4 text-center font-black text-blue-600">${u.rmQuota}</td>
                        <td class="p-4 text-center font-black text-purple-600">${u.flexQuota}</td>
                        <td class="p-4 text-slate-500 text-xs font-mono">${u.expireDate}</td>
                        <td class="p-4 text-right">
                            <button onclick="window.AdminModule.editUser(${idx})" class="px-4 py-1.5 border border-[#54C061] text-[#54C061] hover:bg-green-50 rounded font-bold transition text-xs">編輯</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            },
            showUserModal: function() {
                document.getElementById('admin-user-modal').classList.remove('hidden');
                document.getElementById('adm-company').value = '';
                document.getElementById('adm-name').value = '';
                document.getElementById('adm-account').value = '';
                document.getElementById('adm-password').value = '';
                document.getElementById('adm-phone').value = '';
                document.getElementById('adm-status').value = 'ACTIVE';
                document.getElementById('adm-expire').value = '';
                document.getElementById('adm-rmQuota').value = '1';
                document.getElementById('adm-flexQuota').value = '3';
                document.getElementById('adm-perms').value = '1234';
                document.getElementById('adm-account').disabled = false;
                document.getElementById('admin-modal-title').innerText = "新增用戶";
            },
            closeUserModal: function() {
                document.getElementById('admin-user-modal').classList.add('hidden');
            },
            editUser: function(idx) {
                var u = this.users[idx];
                document.getElementById('adm-company').value = u.company;
                document.getElementById('adm-name').value = u.name;
                document.getElementById('adm-account').value = u.account;
                document.getElementById('adm-password').value = u.password;
                document.getElementById('adm-phone').value = u.phone;
                document.getElementById('adm-status').value = u.status.toUpperCase() === 'ACTIVE' ? 'ACTIVE' : 'SUSPEND';
                document.getElementById('adm-expire').value = u.expireDate;
                document.getElementById('adm-rmQuota').value = u.rmQuota || 1;
                document.getElementById('adm-flexQuota').value = u.flexQuota || 3;
                document.getElementById('adm-perms').value = u.permissions;
                
                document.getElementById('adm-account').disabled = true; // 編輯模式不允許更改登入帳號 ID
                document.getElementById('admin-modal-title').innerText = "編輯用戶";
                document.getElementById('admin-user-modal').classList.remove('hidden');
            },
            saveUser: function() {
                var userData = {
                    company: document.getElementById('adm-company').value,
                    name: document.getElementById('adm-name').value,
                    account: document.getElementById('adm-account').value,
                    password: document.getElementById('adm-password').value,
                    phone: document.getElementById('adm-phone').value,
                    status: document.getElementById('adm-status').value,
                    expireDate: document.getElementById('adm-expire').value,
                    rmQuota: parseInt(document.getElementById('adm-rmQuota').value) || 1,
                    flexQuota: parseInt(document.getElementById('adm-flexQuota').value) || 3,
                    permissions: document.getElementById('adm-perms').value
                };

                if (!userData.account || !userData.password) {
                    alert('【帳號】與【密碼】為必填欄位！');
                    return;
                }

                toggleLoader(true);
                // 【核心修改】使用 fetchApi 傳送儲存請求給後端 Worker
                fetchApi('saveUserData', { userData: userData })
                .then(function(res) {
                    toggleLoader(false);
                    if (res.success) {
                        showToast("儲存成功！");
                        window.AdminModule.closeUserModal();
                        window.AdminModule.loadUsers(); // 重新載入列表
                    } else {
                        alert('儲存失敗: ' + res.msg);
                    }
                })
                .catch(function(err){
                    toggleLoader(false);
                    alert('網路連線失敗，請檢查網路狀態');
                });
            }
        };
    </script>
</div>
